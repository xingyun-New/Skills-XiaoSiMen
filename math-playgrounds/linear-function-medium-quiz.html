<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>一次函数中等难度练习 - 八年级数学</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      color: #e0e0e0;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }
    .header h1 {
      font-size: 2.4em;
      background: linear-gradient(135deg, #e2b714, #f7971e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .header p { color: #8892b0; font-size: 1.1em; }

    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 25px;
      flex-wrap: wrap;
    }
    .stat-box {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      padding: 12px 24px;
      border-radius: 14px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.1);
      min-width: 100px;
    }
    .stat-box .label { font-size: 0.85em; color: #8892b0; margin-bottom: 4px; }
    .stat-box .value { font-size: 1.6em; font-weight: bold; }
    .stat-box .value.score { color: #e2b714; }
    .stat-box .value.streak { color: #f97316; }
    .stat-box .value.progress { color: #22d3ee; }

    .progress-bar-container {
      width: 100%;
      height: 10px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      margin-bottom: 25px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #22d3ee, #6366f1);
      border-radius: 10px;
      transition: width 0.5s ease;
    }

    .question-card {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 35px;
      margin-bottom: 20px;
      transition: all 0.3s ease;
    }
    .question-card.correct-flash {
      border-color: #22c55e;
      box-shadow: 0 0 30px rgba(34,197,94,0.2);
    }
    .question-card.wrong-flash {
      border-color: #ef4444;
      box-shadow: 0 0 30px rgba(239,68,68,0.2);
    }

    .question-number {
      display: inline-block;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      padding: 5px 16px;
      border-radius: 20px;
      font-size: 0.9em;
      font-weight: bold;
      margin-bottom: 15px;
    }
    .question-type {
      display: inline-block;
      background: rgba(226,183,20,0.15);
      color: #e2b714;
      padding: 4px 12px;
      border-radius: 10px;
      font-size: 0.8em;
      margin-left: 8px;
    }

    .question-text {
      font-size: 1.25em;
      line-height: 1.8;
      margin-bottom: 20px;
      color: #f0f0f0;
    }
    .question-text .math {
      font-family: 'Cambria Math', 'Times New Roman', serif;
      font-style: italic;
      color: #93c5fd;
    }

    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 15px;
    }
    @media (max-width: 600px) {
      .options-grid { grid-template-columns: 1fr; }
    }

    .option-btn {
      background: rgba(255,255,255,0.05);
      border: 2px solid rgba(255,255,255,0.12);
      color: #e0e0e0;
      padding: 14px 20px;
      border-radius: 12px;
      font-size: 1.05em;
      cursor: pointer;
      transition: all 0.25s ease;
      text-align: left;
    }
    .option-btn:hover:not(.disabled) {
      background: rgba(99,102,241,0.15);
      border-color: #6366f1;
      transform: translateY(-2px);
    }
    .option-btn.selected {
      background: rgba(99,102,241,0.25);
      border-color: #6366f1;
    }
    .option-btn.correct {
      background: rgba(34,197,94,0.2);
      border-color: #22c55e;
      color: #86efac;
    }
    .option-btn.wrong {
      background: rgba(239,68,68,0.2);
      border-color: #ef4444;
      color: #fca5a5;
    }
    .option-btn.disabled { cursor: default; opacity: 0.7; }
    .option-btn .option-label {
      display: inline-block;
      background: rgba(255,255,255,0.1);
      width: 28px;
      height: 28px;
      line-height: 28px;
      text-align: center;
      border-radius: 50%;
      margin-right: 10px;
      font-weight: bold;
      font-size: 0.9em;
    }

    .feedback-area {
      min-height: 50px;
      margin-top: 15px;
      padding: 15px;
      border-radius: 12px;
      display: none;
      line-height: 1.7;
    }
    .feedback-area.show { display: block; }
    .feedback-area.correct-feedback {
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.3);
      color: #86efac;
    }
    .feedback-area.wrong-feedback {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
    }

    .nav-buttons {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 20px;
    }
    .nav-btn {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      border: none;
      padding: 14px 36px;
      font-size: 1.1em;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.25s ease;
    }
    .nav-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(99,102,241,0.4); }
    .nav-btn:active { transform: translateY(0); }
    .nav-btn:disabled { opacity: 0.4; cursor: default; transform: none; box-shadow: none; }
    .nav-btn.hint-btn {
      background: linear-gradient(135deg, #f59e0b, #d97706);
    }
    .nav-btn.hint-btn:hover { box-shadow: 0 8px 25px rgba(245,158,11,0.4); }

    .canvas-area {
      width: 100%;
      height: 300px;
      background: #0d1117;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      margin: 15px 0;
    }

    .result-card {
      display: none;
      text-align: center;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 50px 35px;
    }
    .result-card h2 { font-size: 2.2em; margin-bottom: 10px; }
    .result-card .big-score {
      font-size: 4em;
      font-weight: bold;
      background: linear-gradient(135deg, #e2b714, #f7971e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 15px 0;
    }
    .result-card .accuracy { font-size: 1.3em; color: #8892b0; margin-bottom: 20px; }
    .result-card .rating { font-size: 1.8em; margin: 15px 0; }
    .result-card .details {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin: 25px 0;
    }
    .result-card .detail-item {
      background: rgba(255,255,255,0.05);
      padding: 15px;
      border-radius: 12px;
    }
    .result-card .detail-item .d-label { font-size: 0.85em; color: #8892b0; }
    .result-card .detail-item .d-value { font-size: 1.5em; font-weight: bold; margin-top: 5px; }

    .review-section {
      margin-top: 30px;
      text-align: left;
    }
    .review-section h3 { margin-bottom: 15px; font-size: 1.3em; }
    .review-item {
      background: rgba(255,255,255,0.04);
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 12px;
      border-left: 4px solid;
    }
    .review-item.review-correct { border-left-color: #22c55e; }
    .review-item.review-wrong { border-left-color: #ef4444; }
    .review-item .review-q { font-weight: bold; margin-bottom: 6px; }
    .review-item .review-a { font-size: 0.95em; color: #8892b0; }

    .confetti-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
    }

    .achievement-popup {
      position: fixed;
      top: 20px;
      right: 20px;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: #1a1a2e;
      padding: 18px 28px;
      border-radius: 14px;
      font-weight: bold;
      font-size: 1.1em;
      box-shadow: 0 10px 40px rgba(245,158,11,0.4);
      transform: translateX(400px);
      transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 1000;
    }
    .achievement-popup.show { transform: translateX(0); }

    .score-float {
      position: fixed;
      font-size: 1.8em;
      font-weight: bold;
      color: #e2b714;
      pointer-events: none;
      z-index: 1000;
      text-shadow: 0 2px 10px rgba(226,183,20,0.5);
      animation: floatUp 1.2s ease-out forwards;
    }
    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-80px) scale(1.3); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>一次函数 · 中等难度挑战</h1>
      <p>八年级数学 | 10 道进阶题目 | 参数讨论 · 面积 · 不等式 · 综合</p>
    </div>

    <div class="stats-bar">
      <div class="stat-box">
        <div class="label">得分</div>
        <div class="value score" id="score">0</div>
      </div>
      <div class="stat-box">
        <div class="label">连击</div>
        <div class="value streak" id="streak">0</div>
      </div>
      <div class="stat-box">
        <div class="label">进度</div>
        <div class="value progress" id="progressText">0/10</div>
      </div>
    </div>

    <div class="progress-bar-container">
      <div class="progress-bar-fill" id="progressBar" style="width: 0%"></div>
    </div>

    <div id="quizArea">
      <div class="question-card" id="questionCard">
        <div>
          <span class="question-number" id="qNumber">第 1 题</span>
          <span class="question-type" id="qType">概念</span>
        </div>
        <div class="question-text" id="qText"></div>
        <canvas class="canvas-area" id="graphCanvas" style="display:none"></canvas>
        <div class="options-grid" id="optionsGrid"></div>
        <div class="feedback-area" id="feedback"></div>
        <div class="nav-buttons">
          <button class="nav-btn hint-btn" id="hintBtn" onclick="showHint()">提示 💡</button>
          <button class="nav-btn" id="nextBtn" onclick="nextQuestion()" disabled>下一题 →</button>
        </div>
      </div>
    </div>

    <div class="result-card" id="resultCard">
      <h2 id="resultTitle">练习完成！</h2>
      <div class="big-score" id="finalScore">0</div>
      <div class="accuracy" id="accuracy">正确率: 0%</div>
      <div class="rating" id="rating"></div>
      <div class="details">
        <div class="detail-item">
          <div class="d-label">正确</div>
          <div class="d-value" id="correctCount" style="color:#22c55e">0</div>
        </div>
        <div class="detail-item">
          <div class="d-label">错误</div>
          <div class="d-value" id="wrongCount" style="color:#ef4444">0</div>
        </div>
        <div class="detail-item">
          <div class="d-label">最长连击</div>
          <div class="d-value" id="maxStreak" style="color:#f97316">0</div>
        </div>
      </div>
      <button class="nav-btn" onclick="restartQuiz()" style="margin-top: 10px">重新练习 🔄</button>
      <div class="review-section" id="reviewSection">
        <h3>答题回顾</h3>
        <div id="reviewList"></div>
      </div>
    </div>
  </div>

  <script>
    const questions = [
      {
        type: "参数讨论",
        text: '一次函数 <span class="math">y = (m\u22122)x + m\u00b2\u22124</span> 是正比例函数，则 <span class="math">m</span> 的值为：',
        options: [
          "<span class='math'>m = 2</span>",
          "<span class='math'>m = \u22122</span>",
          "<span class='math'>m = 2</span> 或 <span class='math'>m = \u22122</span>",
          "<span class='math'>m = \u22124</span>"
        ],
        answer: 1,
        hint: "正比例函数要求 b = 0（过原点）且 k \u2260 0。先令 m\u00b2\u22124 = 0 解出 m，再检验 k = m\u22122 \u2260 0。",
        explanation: "正比例函数 \u21d2 b = 0 且 k \u2260 0<br>m\u00b2 \u2212 4 = 0 \u21d2 m = 2 或 m = \u22122<br>检验 k = m \u2212 2 \u2260 0：<br>\u2022 m = 2 时 k = 0\uff08不是一次函数\uff09\u2718<br>\u2022 m = \u22122 时 k = \u22124 \u2260 0 \u2714<br>所以 m = \u22122",
        showGraph: true,
        graphFn: function(ctx, w, h) { drawLinearGraph(ctx, w, h, -4, 0, "#93c5fd"); }
      },
      {
        type: "面积计算",
        text: '一次函数 <span class="math">y = 2x \u2212 4</span> 的图像与 x 轴、y 轴围成的三角形面积是多少？',
        options: ["2", "3", "4", "8"],
        answer: 2,
        hint: "分别求出与 x 轴和 y 轴的交点坐标，以这两个截距的绝对值为底和高计算三角形面积。",
        explanation: "与 x 轴交点：令 y = 0\uff0c2x \u2212 4 = 0\uff0cx = 2 \u2192 (2, 0)<br>与 y 轴交点：令 x = 0\uff0cy = \u22124 \u2192 (0, \u22124)<br>三角形底 = |2| = 2\uff0c高 = |\u22124| = 4<br>面积 = \u00bd \u00d7 2 \u00d7 4 = <strong>4</strong>",
        showGraph: true,
        graphFn: function(ctx, w, h) {
          drawLinearGraph(ctx, w, h, 2, -4, "#93c5fd");
          drawPoint(ctx, w, h, 2, 0, "(2,0)");
          drawPoint(ctx, w, h, 0, -4, "(0,\u22124)");
          fillTriangle(ctx, w, h, [[0,0],[2,0],[0,-4]], "rgba(147,197,253,0.15)");
        }
      },
      {
        type: "不等式应用",
        text: '已知 <span class="math">y\u2081 = 2x + 1</span> 和 <span class="math">y\u2082 = \u2212x + 4</span>\uff0c当 <span class="math">y\u2081 > y\u2082</span> 时\uff0c<span class="math">x</span> 的取值范围是：',
        options: [
          "<span class='math'>x > 1</span>",
          "<span class='math'>x < 1</span>",
          "<span class='math'>x > 3</span>",
          "<span class='math'>x < 3</span>"
        ],
        answer: 0,
        hint: "先求两条直线的交点（令 y\u2081 = y\u2082），再判断交点右侧哪条直线在上方。斜率大的直线在交点右侧更高。",
        explanation: "令 y\u2081 = y\u2082\uff1a2x + 1 = \u2212x + 4 \u21d2 3x = 3 \u21d2 x = 1<br>交点为 (1, 3)<br>y\u2081 的斜率 2 > y\u2082 的斜率 \u22121<br>\u2234 当 x > 1 时\uff0cy\u2081 的图像在 y\u2082 上方\uff0c即 y\u2081 > y\u2082",
        showGraph: true,
        graphFn: function(ctx, w, h) {
          drawLinearGraph(ctx, w, h, 2, 1, "#93c5fd");
          drawLinearGraph(ctx, w, h, -1, 4, "#f9a8d4");
          drawPoint(ctx, w, h, 1, 3, "(1,3)");
          drawLabel(ctx, w, h, 1.5, 5, "y\u2081=2x+1", "#93c5fd");
          drawLabel(ctx, w, h, 2.5, 2, "y\u2082=\u2212x+4", "#f9a8d4");
        }
      },
      {
        type: "垂直条件",
        text: '若直线 <span class="math">y = 2x + 1</span> 与直线 <span class="math">y = kx \u2212 3</span> 互相垂直\uff0c则 <span class="math">k</span> 的值为：',
        options: [
          "<span class='math'>\u22122</span>",
          "<span class='math'>2</span>",
          "<span class='math'>\u00bd</span>",
          "<span class='math'>\u2212\u00bd</span>"
        ],
        answer: 3,
        hint: "两条直线互相垂直的条件是它们的斜率之积等于 \u22121\uff0c即 k\u2081 \u00d7 k\u2082 = \u22121。",
        explanation: "两直线垂直 \u21d4 k\u2081 \u00d7 k\u2082 = \u22121<br>2 \u00d7 k = \u22121<br>k = \u2212\u00bd<br><br>验证：斜率分别为 2 和 \u2212\u00bd\uff0c乘积 = 2 \u00d7 (\u2212\u00bd) = \u22121 \u2714",
        showGraph: true,
        graphFn: function(ctx, w, h) {
          drawLinearGraph(ctx, w, h, 2, 1, "#93c5fd");
          drawLinearGraph(ctx, w, h, -0.5, -3, "#f9a8d4");
          drawLabel(ctx, w, h, 1, 4, "y=2x+1", "#93c5fd");
          drawLabel(ctx, w, h, 2, -4.5, "y=\u2212\u00bdx\u22123", "#f9a8d4");
        }
      },
      {
        type: "图像性质",
        text: '已知一次函数 <span class="math">y = kx + b</span> 满足 <span class="math">kb > 0</span> 且 <span class="math">k + b < 0</span>\uff0c则该函数图像<strong>不</strong>经过：',
        options: ["第一象限", "第二象限", "第三象限", "第四象限"],
        answer: 0,
        hint: "从 kb > 0 得出 k 与 b 同号，结合 k + b < 0 判断 k 和 b 各自的正负。",
        explanation: "kb > 0 \u21d2 k 与 b 同号（同正或同负）<br>k + b < 0 \u21d2 k 与 b 之和为负<br>\u2234 k < 0 且 b < 0（两个负数之和才为负\uff0c乘积才为正）<br><br>k < 0\uff1a直线从左上到右下 \u2192 经过二、四象限<br>b < 0\uff1ay 轴截距在下方 \u2192 经过第三象限<br>\u2234 不经过<strong>第一象限</strong>",
        showGraph: true,
        graphFn: function(ctx, w, h) {
          drawLinearGraph(ctx, w, h, -1.5, -1, "#93c5fd");
          drawLabel(ctx, w, h, -3, 4, "k<0, b<0", "#fbbf24");
        }
      },
      {
        type: "求范围",
        text: '一次函数 <span class="math">y = kx + b</span> 的图像经过 <span class="math">A(3, 5)</span> 和 <span class="math">B(\u22121, 9)</span>\uff0c当 <span class="math">y < 0</span> 时\uff0c<span class="math">x</span> 的取值范围是：',
        options: [
          "<span class='math'>x > 5</span>",
          "<span class='math'>x > 8</span>",
          "<span class='math'>x < 8</span>",
          "<span class='math'>x < \u22128</span>"
        ],
        answer: 1,
        hint: "先用待定系数法求出 k 和 b，得到解析式后令 y < 0 解不等式。",
        explanation: "代入 A(3,5)\uff1a5 = 3k + b \u2026①<br>代入 B(\u22121,9)\uff1a9 = \u2212k + b \u2026②<br>① \u2212 ②\uff1a\u22124 = 4k \u21d2 k = \u22121<br>代入 ②\uff1ab = 9 + k = 8<br>\u2234 y = \u2212x + 8<br><br>y < 0\uff1a\u2212x + 8 < 0 \u21d2 x > 8",
        showGraph: true,
        graphFn: function(ctx, w, h) {
          drawLinearGraph(ctx, w, h, -1, 8, "#93c5fd");
          drawPoint(ctx, w, h, 3, 5, "A(3,5)");
          drawPoint(ctx, w, h, -1, 9, "B(\u22121,9)");
          drawPoint(ctx, w, h, 8, 0, "(8,0)");
        }
      },
      {
        type: "图像与不等式",
        text: '一次函数 <span class="math">y = kx + 4</span> 的图像与 x 轴交于点 <span class="math">A(8, 0)</span>\uff0c则不等式 <span class="math">kx + 4 \u2264 0</span> 的解集为：',
        options: [
          "<span class='math'>x > 8</span>",
          "<span class='math'>x < 8</span>",
          "<span class='math'>x \u2265 8</span>",
          "<span class='math'>x \u2264 8</span>"
        ],
        answer: 2,
        hint: "先由图像过 (8, 0) 和截距 b = 4 求出 k，然后用图像理解：y \u2264 0 对应图像在 x 轴下方（含交点）的部分。",
        explanation: "过 A(8,0)\uff1a0 = 8k + 4 \u21d2 k = \u2212\u00bd<br>y = \u2212\u00bdx + 4<br><br>kx + 4 \u2264 0 即 y \u2264 0<br>图像在 x 轴下方（含交点 A）的部分对应 x \u2265 8<br>或直接解\uff1a\u2212\u00bdx + 4 \u2264 0 \u21d2 x \u2265 8",
        showGraph: true,
        graphFn: function(ctx, w, h) {
          drawLinearGraph(ctx, w, h, -0.5, 4, "#93c5fd");
          drawPoint(ctx, w, h, 8, 0, "A(8,0)");
          drawPoint(ctx, w, h, 0, 4, "(0,4)");
        }
      },
      {
        type: "复合平移",
        text: '将正比例函数 <span class="math">y = 3x</span> 的图像先向右平移 2 个单位\uff0c再向下平移 1 个单位\uff0c所得直线的解析式是：',
        options: [
          "<span class='math'>y = 3x \u2212 5</span>",
          "<span class='math'>y = 3x + 7</span>",
          "<span class='math'>y = 3x + 5</span>",
          "<span class='math'>y = 3x \u2212 7</span>"
        ],
        answer: 3,
        hint: "向右平移 a 个单位：用 (x\u2212a) 替换 x\uff1b向下平移 b 个单位：y 减 b。斜率不变。",
        explanation: "原函数\uff1ay = 3x<br>向右平移 2 个单位\uff1ay = 3(x \u2212 2) = 3x \u2212 6<br>再向下平移 1 个单位\uff1ay = 3x \u2212 6 \u2212 1 = <strong>3x \u2212 7</strong><br><br>\u8bb0\u5fc6\u53e3\u8bc0\uff1a\u201c\u5de6\u52a0\u53f3\u51cf\uff0c\u4e0a\u52a0\u4e0b\u51cf\u201d",
        showGraph: true,
        graphFn: function(ctx, w, h) {
          drawLinearGraph(ctx, w, h, 3, 0, "rgba(147,197,253,0.3)");
          drawLinearGraph(ctx, w, h, 3, -6, "rgba(249,168,212,0.3)");
          drawLinearGraph(ctx, w, h, 3, -7, "#93c5fd");
          drawLabel(ctx, w, h, 0.5, 2.5, "y=3x", "rgba(147,197,253,0.5)");
          drawLabel(ctx, w, h, 2.5, 2, "y=3x\u22126", "rgba(249,168,212,0.5)");
          drawLabel(ctx, w, h, 3, 3, "y=3x\u22127", "#93c5fd");
        }
      },
      {
        type: "围成面积",
        text: '直线 <span class="math">y = \u22122x + 6</span> 与 <span class="math">y = x</span> 的交点\uff0c以及这两条直线与 x 轴围成的三角形面积是多少？',
        options: ["2", "3", "4", "6"],
        answer: 3,
        hint: "先求两直线交点 P，再求各直线与 x 轴的交点。以 x 轴上两个交点的距离为底，P 点纵坐标为高。",
        explanation: "交点 P\uff1a\u22122x + 6 = x \u21d2 3x = 6\uff0cx = 2\uff0cy = 2 \u2192 P(2, 2)<br>y = \u22122x + 6 与 x 轴交点\uff1ax = 3 \u2192 A(3, 0)<br>y = x 与 x 轴交点\uff1a原点 O(0, 0)<br><br>底 = OA = 3\uff0c高 = P 的纵坐标 = 2<br>面积 = \u00bd \u00d7 3 \u00d7 2 = <strong>3</strong>",
        showGraph: true,
        graphFn: function(ctx, w, h) {
          drawLinearGraph(ctx, w, h, -2, 6, "#93c5fd");
          drawLinearGraph(ctx, w, h, 1, 0, "#f9a8d4");
          fillTriangle(ctx, w, h, [[0,0],[3,0],[2,2]], "rgba(147,197,253,0.15)");
          drawPoint(ctx, w, h, 2, 2, "P(2,2)");
          drawPoint(ctx, w, h, 3, 0, "A(3,0)");
          drawPoint(ctx, w, h, 0, 0, "O");
          drawLabel(ctx, w, h, -1.5, 5, "y=\u22122x+6", "#93c5fd");
          drawLabel(ctx, w, h, 3.5, 3.5, "y=x", "#f9a8d4");
        }
      },
      {
        type: "参数范围",
        text: '一次函数 <span class="math">y = (a\u22121)x + a\u00b2\u22121</span> 的图像经过第一、二、四象限\uff0c则 <span class="math">a</span> 的取值范围是：',
        options: [
          "<span class='math'>a < 1</span>",
          "<span class='math'>\u22121 < a < 1</span>",
          "<span class='math'>a < \u22121</span>",
          "<span class='math'>a > 1</span>"
        ],
        answer: 2,
        hint: "图像过一、二、四象限意味着 k < 0（从左上到右下）且 b > 0（y 轴截距为正）。分别对 k 和 b 列不等式求交集。",
        explanation: "经过一、二、四象限 \u21d2 k < 0 且 b > 0<br><br>k = a \u2212 1 < 0 \u21d2 a < 1 \u2026\u2460<br>b = a\u00b2 \u2212 1 > 0 \u21d2 a\u00b2 > 1 \u21d2 a > 1 或 a < \u22121 \u2026\u2461<br><br>\u2460 \u2229 \u2461\uff1aa < 1 \u4e14 (a > 1 \u6216 a < \u22121)<br>\u21d2 <strong>a < \u22121</strong><br><br>\u8fd8\u9700\u9a8c\u8bc1 k \u2260 0\uff1aa \u2260 1\uff0c\u5728 a < \u22121 \u8303\u56f4\u5185\u6210\u7acb \u2714",
        showGraph: true,
        graphFn: function(ctx, w, h) {
          drawLinearGraph(ctx, w, h, -3, 8, "#93c5fd");
          drawLabel(ctx, w, h, -2, 5, "a=\u22122: y=\u22123x+3", "#fbbf24");
        }
      }
    ];

    let currentQ = 0;
    let score = 0;
    let streakCount = 0;
    let maxStreakCount = 0;
    let correctTotal = 0;
    let wrongTotal = 0;
    let answers = [];
    let answered = false;

    function drawLinearGraph(ctx, w, h, k, b, color) {
      var cx = w / 2, cy = h / 2;
      var scale = Math.min(w, h) / 14;

      ctx.strokeStyle = "rgba(255,255,255,0.08)";
      ctx.lineWidth = 1;
      for (var i = -6; i <= 6; i++) {
        ctx.beginPath();
        ctx.moveTo(cx + i * scale, 0);
        ctx.lineTo(cx + i * scale, h);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, cy + i * scale);
        ctx.lineTo(w, cy + i * scale);
        ctx.stroke();
      }

      ctx.strokeStyle = "rgba(255,255,255,0.3)";
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(w, cy); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, h); ctx.stroke();

      ctx.fillStyle = "rgba(255,255,255,0.4)";
      ctx.font = "12px sans-serif";
      ctx.textAlign = "center";
      for (var i = -6; i <= 6; i++) {
        if (i === 0) continue;
        ctx.fillText(i, cx + i * scale, cy + 16);
        ctx.fillText(i, cx - 18, cy - i * scale + 4);
      }
      ctx.fillText("O", cx - 12, cy + 16);
      ctx.fillText("x", w - 12, cy + 16);
      ctx.fillText("y", cx + 10, 14);

      ctx.strokeStyle = color;
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      for (var px = 0; px < w; px++) {
        var x = (px - cx) / scale;
        var y = k * x + b;
        var py = cy - y * scale;
        if (px === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.stroke();
    }

    function drawPoint(ctx, w, h, x, y, label) {
      var cx = w / 2, cy = h / 2;
      var scale = Math.min(w, h) / 14;
      var px = cx + x * scale;
      var py = cy - y * scale;

      ctx.fillStyle = "#f59e0b";
      ctx.beginPath();
      ctx.arc(px, py, 5, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#fbbf24";
      ctx.font = "bold 13px sans-serif";
      ctx.textAlign = "left";
      ctx.fillText(label, px + 8, py - 8);
    }

    function drawLabel(ctx, w, h, x, y, text, color) {
      var cx = w / 2, cy = h / 2;
      var scale = Math.min(w, h) / 14;
      var px = cx + x * scale;
      var py = cy - y * scale;
      ctx.fillStyle = color;
      ctx.font = "bold 13px sans-serif";
      ctx.textAlign = "left";
      ctx.fillText(text, px, py);
    }

    function fillTriangle(ctx, w, h, points, color) {
      var cx = w / 2, cy = h / 2;
      var scale = Math.min(w, h) / 14;
      ctx.fillStyle = color;
      ctx.beginPath();
      points.forEach(function(p, i) {
        var px = cx + p[0] * scale;
        var py = cy - p[1] * scale;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      });
      ctx.closePath();
      ctx.fill();
    }

    function renderQuestion() {
      var q = questions[currentQ];
      answered = false;

      document.getElementById("qNumber").textContent = "\u7b2c " + (currentQ + 1) + " \u9898";
      document.getElementById("qType").textContent = q.type;
      document.getElementById("qText").innerHTML = q.text;

      var canvas = document.getElementById("graphCanvas");
      if (q.showGraph) {
        canvas.style.display = "block";
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        var ctx = canvas.getContext("2d");
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        q.graphFn(ctx, canvas.width, canvas.height);
      } else {
        canvas.style.display = "none";
      }

      var grid = document.getElementById("optionsGrid");
      grid.innerHTML = "";
      var labels = ["A", "B", "C", "D"];
      q.options.forEach(function(opt, i) {
        var btn = document.createElement("button");
        btn.className = "option-btn";
        btn.innerHTML = '<span class="option-label">' + labels[i] + '</span>' + opt;
        btn.onclick = function() { selectAnswer(i); };
        grid.appendChild(btn);
      });

      document.getElementById("feedback").className = "feedback-area";
      document.getElementById("feedback").innerHTML = "";
      document.getElementById("nextBtn").disabled = true;
      document.getElementById("hintBtn").disabled = false;
      document.getElementById("hintBtn").textContent = "\u63d0\u793a \ud83d\udca1";

      document.getElementById("questionCard").className = "question-card";
    }

    function selectAnswer(idx) {
      if (answered) return;
      answered = true;

      var q = questions[currentQ];
      var btns = document.querySelectorAll(".option-btn");
      var feedback = document.getElementById("feedback");
      var card = document.getElementById("questionCard");

      btns.forEach(function(btn, i) {
        btn.classList.add("disabled");
        if (i === q.answer) btn.classList.add("correct");
        if (i === idx && idx !== q.answer) btn.classList.add("wrong");
      });

      if (idx === q.answer) {
        var points = 10 + streakCount * 2;
        score += points;
        streakCount++;
        correctTotal++;
        if (streakCount > maxStreakCount) maxStreakCount = streakCount;

        card.classList.add("correct-flash");
        feedback.className = "feedback-area show correct-feedback";
        feedback.innerHTML = "\u2705 <strong>\u56de\u7b54\u6b63\u786e\uff01+" + points + " \u5206</strong><br>" + q.explanation;
        showScoreFloat(points);

        if (streakCount === 3) showAchievement("\ud83d\udd25 \u4e09\u8fde\u51fb\uff01");
        if (streakCount === 5) showAchievement("\u26a1 \u4e94\u8fde\u51fb\uff01\u592a\u5f3a\u4e86\uff01");
        if (correctTotal === 10) showAchievement("\ud83c\udfc6 \u5168\u90e8\u7b54\u5bf9\uff01\u5b8c\u7f8e\uff01");

        answers.push({ correct: true, qIdx: currentQ });
      } else {
        streakCount = 0;
        wrongTotal++;

        card.classList.add("wrong-flash");
        feedback.className = "feedback-area show wrong-feedback";
        feedback.innerHTML = "\u274c <strong>\u56de\u7b54\u9519\u8bef</strong>\uff0c\u6b63\u786e\u7b54\u6848\u662f <strong>" + ["A","B","C","D"][q.answer] + "</strong><br>" + q.explanation;

        answers.push({ correct: false, qIdx: currentQ, chose: idx });
      }

      updateStats();
      document.getElementById("nextBtn").disabled = false;
      document.getElementById("hintBtn").disabled = true;
    }

    function showHint() {
      var q = questions[currentQ];
      var feedback = document.getElementById("feedback");
      feedback.className = "feedback-area show";
      feedback.style.background = "rgba(245,158,11,0.1)";
      feedback.style.borderColor = "rgba(245,158,11,0.3)";
      feedback.style.color = "#fbbf24";
      feedback.innerHTML = "\ud83d\udca1 <strong>\u63d0\u793a\uff1a</strong>" + q.hint;
      document.getElementById("hintBtn").disabled = true;
      document.getElementById("hintBtn").textContent = "\u5df2\u63d0\u793a";
    }

    function nextQuestion() {
      currentQ++;
      if (currentQ >= questions.length) {
        showResults();
        return;
      }
      renderQuestion();
      updateStats();
    }

    function updateStats() {
      document.getElementById("score").textContent = score;
      document.getElementById("streak").textContent = streakCount;
      document.getElementById("progressText").textContent = Math.min(currentQ + 1, questions.length) + "/10";
      document.getElementById("progressBar").style.width = ((currentQ + (answered ? 1 : 0)) / questions.length * 100) + "%";
    }

    function showResults() {
      document.getElementById("quizArea").style.display = "none";
      document.getElementById("resultCard").style.display = "block";

      var pct = Math.round((correctTotal / questions.length) * 100);
      document.getElementById("finalScore").textContent = score;
      document.getElementById("accuracy").textContent = "\u6b63\u786e\u7387: " + pct + "%";
      document.getElementById("correctCount").textContent = correctTotal;
      document.getElementById("wrongCount").textContent = wrongTotal;
      document.getElementById("maxStreak").textContent = maxStreakCount;

      var rating;
      if (pct === 100) rating = "\ud83c\udfc6 \u5b8c\u7f8e\uff01\u4e00\u6b21\u51fd\u6570\u8fdb\u9636\u9898\u5168\u5bf9\uff01";
      else if (pct >= 80) rating = "\u2b50 \u4f18\u79c0\uff01\u638c\u63e1\u5f97\u5f88\u597d\uff01";
      else if (pct >= 60) rating = "\ud83d\udc4d \u4e0d\u9519\uff01\u7ee7\u7eed\u52a0\u6cb9\uff01";
      else if (pct >= 40) rating = "\ud83d\udcaa \u8fd8\u9700\u8981\u591a\u7ec3\u4e60\uff01";
      else rating = "\ud83d\udcd6 \u5efa\u8bae\u590d\u4e60\u4e00\u4e0b\u4e00\u6b21\u51fd\u6570\u7684\u77e5\u8bc6\u70b9";
      document.getElementById("rating").textContent = rating;

      if (pct === 100) {
        document.getElementById("resultTitle").textContent = "\ud83c\udf89 \u6ee1\u5206\u901a\u5173\uff01";
        celebrateConfetti();
      }

      var reviewList = document.getElementById("reviewList");
      reviewList.innerHTML = "";
      answers.forEach(function(a, i) {
        var q = questions[a.qIdx];
        var div = document.createElement("div");
        div.className = "review-item " + (a.correct ? "review-correct" : "review-wrong");
        div.innerHTML =
          '<div class="review-q">\u7b2c ' + (i + 1) + ' \u9898 [' + q.type + ']\uff1a' + (a.correct ? "\u2705 \u6b63\u786e" : "\u274c \u9519\u8bef") + '</div>' +
          '<div class="review-a">' + (a.correct ? "" : "\u4f60\u9009\u4e86 " + ["A","B","C","D"][a.chose] + " | ") + "\u6b63\u786e\u7b54\u6848\uff1a" + ["A","B","C","D"][q.answer] + ". " + q.options[q.answer] + '</div>';
        reviewList.appendChild(div);
      });
    }

    function restartQuiz() {
      currentQ = 0;
      score = 0;
      streakCount = 0;
      maxStreakCount = 0;
      correctTotal = 0;
      wrongTotal = 0;
      answers = [];
      answered = false;

      document.getElementById("quizArea").style.display = "block";
      document.getElementById("resultCard").style.display = "none";
      renderQuestion();
      updateStats();
    }

    function showScoreFloat(pts) {
      var el = document.createElement("div");
      el.className = "score-float";
      el.textContent = "+" + pts;
      el.style.left = (window.innerWidth / 2 - 30) + "px";
      el.style.top = (window.innerHeight / 2 - 50) + "px";
      document.body.appendChild(el);
      setTimeout(function() { el.remove(); }, 1200);
    }

    function showAchievement(text) {
      var popup = document.createElement("div");
      popup.className = "achievement-popup";
      popup.textContent = text;
      document.body.appendChild(popup);
      requestAnimationFrame(function() { popup.classList.add("show"); });
      setTimeout(function() {
        popup.classList.remove("show");
        setTimeout(function() { popup.remove(); }, 500);
      }, 2500);
    }

    function celebrateConfetti() {
      var canvas = document.createElement("canvas");
      canvas.className = "confetti-canvas";
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      document.body.appendChild(canvas);
      var ctx = canvas.getContext("2d");

      var colors = ["#ef4444","#f59e0b","#22c55e","#3b82f6","#a855f7","#ec4899"];
      var pieces = [];
      for (var i = 0; i < 80; i++) {
        pieces.push({
          x: Math.random() * canvas.width,
          y: -20 - Math.random() * 100,
          vx: (Math.random() - 0.5) * 6,
          vy: Math.random() * 3 + 2,
          color: colors[Math.floor(Math.random() * colors.length)],
          size: Math.random() * 8 + 4,
          rot: Math.random() * 360,
          rotSpeed: (Math.random() - 0.5) * 12
        });
      }

      var frame = 0;
      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        var active = 0;
        pieces.forEach(function(p) {
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.08;
          p.rot += p.rotSpeed;
          if (p.y < canvas.height + 20) {
            active++;
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rot * Math.PI / 180);
            ctx.fillStyle = p.color;
            ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
            ctx.restore();
          }
        });
        frame++;
        if (active > 0 && frame < 300) requestAnimationFrame(animate);
        else canvas.remove();
      }
      animate();
    }

    renderQuestion();
    updateStats();
  </script>
</body>
</html>
