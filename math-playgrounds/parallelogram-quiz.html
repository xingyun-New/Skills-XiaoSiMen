<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>平行四边形专项练习 - 八年级数学</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      color: #e0e0e0;
      padding: 20px;
    }
    .container { max-width: 900px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 30px; }
    .header h1 {
      font-size: 2.4em;
      background: linear-gradient(135deg, #e2b714, #f7971e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .header p { color: #8892b0; font-size: 1.1em; }
    .stats-bar { display: flex; justify-content: center; gap: 20px; margin-bottom: 25px; flex-wrap: wrap; }
    .stat-box {
      background: rgba(255,255,255,0.08); backdrop-filter: blur(10px);
      padding: 12px 24px; border-radius: 14px; text-align: center;
      border: 1px solid rgba(255,255,255,0.1); min-width: 100px;
    }
    .stat-box .label { font-size: 0.85em; color: #8892b0; margin-bottom: 4px; }
    .stat-box .value { font-size: 1.6em; font-weight: bold; }
    .stat-box .value.score { color: #e2b714; }
    .stat-box .value.streak { color: #f97316; }
    .stat-box .value.progress { color: #22d3ee; }
    .progress-bar-container {
      width: 100%; height: 10px; background: rgba(255,255,255,0.1);
      border-radius: 10px; margin-bottom: 25px; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%; background: linear-gradient(90deg, #22d3ee, #6366f1);
      border-radius: 10px; transition: width 0.5s ease;
    }
    .question-card {
      background: rgba(255,255,255,0.06); backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
      padding: 35px; margin-bottom: 20px; transition: all 0.3s ease;
    }
    .question-card.correct-flash { border-color: #22c55e; box-shadow: 0 0 30px rgba(34,197,94,0.2); }
    .question-card.wrong-flash { border-color: #ef4444; box-shadow: 0 0 30px rgba(239,68,68,0.2); }
    .question-number {
      display: inline-block; background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white; padding: 5px 16px; border-radius: 20px;
      font-size: 0.9em; font-weight: bold; margin-bottom: 15px;
    }
    .question-type {
      display: inline-block; background: rgba(226,183,20,0.15); color: #e2b714;
      padding: 4px 12px; border-radius: 10px; font-size: 0.8em; margin-left: 8px;
    }
    .question-text { font-size: 1.25em; line-height: 1.8; margin-bottom: 20px; color: #f0f0f0; }
    .question-text .math {
      font-family: 'Cambria Math', 'Times New Roman', serif;
      font-style: italic; color: #93c5fd;
    }
    .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
    @media (max-width: 600px) { .options-grid { grid-template-columns: 1fr; } }
    .option-btn {
      background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.12);
      color: #e0e0e0; padding: 14px 20px; border-radius: 12px;
      font-size: 1.05em; cursor: pointer; transition: all 0.25s ease; text-align: left;
    }
    .option-btn:hover:not(.disabled) {
      background: rgba(99,102,241,0.15); border-color: #6366f1; transform: translateY(-2px);
    }
    .option-btn.selected { background: rgba(99,102,241,0.25); border-color: #6366f1; }
    .option-btn.correct { background: rgba(34,197,94,0.2); border-color: #22c55e; color: #86efac; }
    .option-btn.wrong { background: rgba(239,68,68,0.2); border-color: #ef4444; color: #fca5a5; }
    .option-btn.disabled { cursor: default; opacity: 0.7; }
    .option-btn .option-label {
      display: inline-block; background: rgba(255,255,255,0.1);
      width: 28px; height: 28px; line-height: 28px; text-align: center;
      border-radius: 50%; margin-right: 10px; font-weight: bold; font-size: 0.9em;
    }
    .feedback-area {
      min-height: 50px; margin-top: 15px; padding: 15px;
      border-radius: 12px; display: none; line-height: 1.7;
    }
    .feedback-area.show { display: block; }
    .feedback-area.correct-feedback {
      background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #86efac;
    }
    .feedback-area.wrong-feedback {
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5;
    }
    .nav-buttons { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }
    .nav-btn {
      background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; border: none;
      padding: 14px 36px; font-size: 1.1em; border-radius: 12px; cursor: pointer;
      font-weight: bold; transition: all 0.25s ease;
    }
    .nav-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(99,102,241,0.4); }
    .nav-btn:active { transform: translateY(0); }
    .nav-btn:disabled { opacity: 0.4; cursor: default; transform: none; box-shadow: none; }
    .nav-btn.hint-btn { background: linear-gradient(135deg, #f59e0b, #d97706); }
    .nav-btn.hint-btn:hover { box-shadow: 0 8px 25px rgba(245,158,11,0.4); }
    .canvas-area {
      width: 100%; height: 280px; background: #0d1117;
      border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; margin: 15px 0;
    }
    .result-card {
      display: none; text-align: center;
      background: rgba(255,255,255,0.06); backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 50px 35px;
    }
    .result-card h2 { font-size: 2.2em; margin-bottom: 10px; }
    .result-card .big-score {
      font-size: 4em; font-weight: bold;
      background: linear-gradient(135deg, #e2b714, #f7971e);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 15px 0;
    }
    .result-card .accuracy { font-size: 1.3em; color: #8892b0; margin-bottom: 20px; }
    .result-card .rating { font-size: 1.8em; margin: 15px 0; }
    .result-card .details { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 25px 0; }
    .result-card .detail-item { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; }
    .result-card .detail-item .d-label { font-size: 0.85em; color: #8892b0; }
    .result-card .detail-item .d-value { font-size: 1.5em; font-weight: bold; margin-top: 5px; }
    .review-section { margin-top: 30px; text-align: left; }
    .review-section h3 { margin-bottom: 15px; font-size: 1.3em; }
    .review-item {
      background: rgba(255,255,255,0.04); border-radius: 12px;
      padding: 18px; margin-bottom: 12px; border-left: 4px solid;
    }
    .review-item.review-correct { border-left-color: #22c55e; }
    .review-item.review-wrong { border-left-color: #ef4444; }
    .review-item .review-q { font-weight: bold; margin-bottom: 6px; }
    .review-item .review-a { font-size: 0.95em; color: #8892b0; }
    .confetti-canvas {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 9999;
    }
    .achievement-popup {
      position: fixed; top: 20px; right: 20px;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: #1a1a2e; padding: 18px 28px; border-radius: 14px;
      font-weight: bold; font-size: 1.1em;
      box-shadow: 0 10px 40px rgba(245,158,11,0.4);
      transform: translateX(400px);
      transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 1000;
    }
    .achievement-popup.show { transform: translateX(0); }
    .score-float {
      position: fixed; font-size: 1.8em; font-weight: bold; color: #e2b714;
      pointer-events: none; z-index: 1000;
      text-shadow: 0 2px 10px rgba(226,183,20,0.5);
      animation: floatUp 1.2s ease-out forwards;
    }
    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-80px) scale(1.3); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>平行四边形专项练习</h1>
      <p>八年级数学 | 10 道精选题目 | 互动学习</p>
    </div>
    <div class="stats-bar">
      <div class="stat-box"><div class="label">得分</div><div class="value score" id="score">0</div></div>
      <div class="stat-box"><div class="label">连击</div><div class="value streak" id="streak">0</div></div>
      <div class="stat-box"><div class="label">进度</div><div class="value progress" id="progressText">0/10</div></div>
    </div>
    <div class="progress-bar-container">
      <div class="progress-bar-fill" id="progressBar" style="width: 0%"></div>
    </div>
    <div id="quizArea">
      <div class="question-card" id="questionCard">
        <div>
          <span class="question-number" id="qNumber">第 1 题</span>
          <span class="question-type" id="qType">概念</span>
        </div>
        <div class="question-text" id="qText"></div>
        <canvas class="canvas-area" id="graphCanvas" style="display:none"></canvas>
        <div class="options-grid" id="optionsGrid"></div>
        <div class="feedback-area" id="feedback"></div>
        <div class="nav-buttons">
          <button class="nav-btn hint-btn" id="hintBtn" onclick="showHint()">提示</button>
          <button class="nav-btn" id="nextBtn" onclick="nextQuestion()" disabled>下一题 →</button>
        </div>
      </div>
    </div>
    <div class="result-card" id="resultCard">
      <h2 id="resultTitle">练习完成！</h2>
      <div class="big-score" id="finalScore">0</div>
      <div class="accuracy" id="accuracy">正确率: 0%</div>
      <div class="rating" id="rating"></div>
      <div class="details">
        <div class="detail-item"><div class="d-label">正确</div><div class="d-value" id="correctCount" style="color:#22c55e">0</div></div>
        <div class="detail-item"><div class="d-label">错误</div><div class="d-value" id="wrongCount" style="color:#ef4444">0</div></div>
        <div class="detail-item"><div class="d-label">最长连击</div><div class="d-value" id="maxStreak" style="color:#f97316">0</div></div>
      </div>
      <button class="nav-btn" onclick="restartQuiz()" style="margin-top: 10px">重新练习</button>
      <div class="review-section" id="reviewSection">
        <h3>答题回顾</h3>
        <div id="reviewList"></div>
      </div>
    </div>
  </div>

  <script>
    function drawParallelogram(ctx, w, h, pts, color, fill) {
      ctx.strokeStyle = color; ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.moveTo(pts[0][0], pts[0][1]);
      for (var i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
      ctx.closePath();
      if (fill) { ctx.fillStyle = fill; ctx.fill(); }
      ctx.stroke();
    }
    function drawDiagonals(ctx, pts, color) {
      ctx.strokeStyle = color || "rgba(255,200,50,0.6)"; ctx.lineWidth = 1.5;
      ctx.setLineDash([6, 4]);
      ctx.beginPath(); ctx.moveTo(pts[0][0], pts[0][1]); ctx.lineTo(pts[2][0], pts[2][1]); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(pts[1][0], pts[1][1]); ctx.lineTo(pts[3][0], pts[3][1]); ctx.stroke();
      ctx.setLineDash([]);
    }
    function labelPoint(ctx, x, y, text, color, ox, oy) {
      ctx.fillStyle = color || "#fbbf24";
      ctx.font = "bold 15px 'Microsoft YaHei', sans-serif";
      ctx.textAlign = "center";
      ctx.fillText(text, x + (ox || 0), y + (oy || 0));
    }
    function drawAngleArc(ctx, cx, cy, r, sa, ea, color) {
      ctx.strokeStyle = color || "#f97316"; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(cx, cy, r, sa, ea); ctx.stroke();
    }
    function markEqual(ctx, x1, y1, x2, y2, count, color) {
      var mx = (x1+x2)/2, my = (y1+y2)/2;
      var angle = Math.atan2(y2-y1, x2-x1);
      var perp = angle + Math.PI/2, tick = 8;
      ctx.strokeStyle = color || "#22d3ee"; ctx.lineWidth = 2;
      for (var i = 0; i < count; i++) {
        var off = (i - (count-1)/2) * 8;
        var bx = mx + Math.cos(angle)*off, by = my + Math.sin(angle)*off;
        ctx.beginPath();
        ctx.moveTo(bx - Math.cos(perp)*tick, by - Math.sin(perp)*tick);
        ctx.lineTo(bx + Math.cos(perp)*tick, by + Math.sin(perp)*tick);
        ctx.stroke();
      }
    }
    function drawMidpoint(ctx, x, y, label, color) {
      ctx.fillStyle = color || "#f59e0b";
      ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI*2); ctx.fill();
      if (label) labelPoint(ctx, x, y, label, color, 0, -12);
    }
    function drawLengthLabel(ctx, x1, y1, x2, y2, text, color, offset) {
      var mx = (x1+x2)/2, my = (y1+y2)/2;
      var angle = Math.atan2(y2-y1, x2-x1);
      var perp = angle + Math.PI/2, d = offset || 18;
      ctx.fillStyle = color || "#93c5fd";
      ctx.font = "14px 'Microsoft YaHei', sans-serif";
      ctx.textAlign = "center";
      ctx.fillText(text, mx + Math.cos(perp)*d, my + Math.sin(perp)*d);
    }

    var questions = [
      {
        type: "基本性质",
        text: '在平行四边形 <span class="math">ABCD</span> 中，已知 <span class="math">&ang;A = 70&deg;</span>，则 <span class="math">&ang;B</span>、<span class="math">&ang;C</span>、<span class="math">&ang;D</span> 分别是多少度？',
        options: [
          "&ang;B = 110&deg;, &ang;C = 70&deg;, &ang;D = 110&deg;",
          "&ang;B = 70&deg;, &ang;C = 110&deg;, &ang;D = 110&deg;",
          "&ang;B = 110&deg;, &ang;C = 110&deg;, &ang;D = 70&deg;",
          "&ang;B = 70&deg;, &ang;C = 70&deg;, &ang;D = 70&deg;"
        ],
        answer: 0,
        hint: "平行四边形的对角相等，邻角互补（和为 180&deg;）。",
        explanation: "平行四边形性质：对角相等，邻角互补。<br>&ang;A = &ang;C = 70&deg;（对角相等）<br>&ang;B = &ang;D = 180&deg; - 70&deg; = 110&deg;（邻角互补）",
        showGraph: true,
        graphFn: function(ctx, w, h) {
          var pts = [[w*0.2, h*0.7], [w*0.45, h*0.2], [w*0.8, h*0.3], [w*0.55, h*0.8]];
          drawParallelogram(ctx, w, h, pts, "#93c5fd", "rgba(99,102,241,0.08)");
          labelPoint(ctx, pts[0][0], pts[0][1], "A", "#fbbf24", -16, 6);
          labelPoint(ctx, pts[1][0], pts[1][1], "B", "#fbbf24", -4, -14);
          labelPoint(ctx, pts[2][0], pts[2][1], "C", "#fbbf24", 16, -6);
          labelPoint(ctx, pts[3][0], pts[3][1], "D", "#fbbf24", 4, 18);
          drawAngleArc(ctx, pts[0][0], pts[0][1], 25, -1.1, -0.15, "#f97316");
          labelPoint(ctx, pts[0][0]+38, pts[0][1]-14, "70\u00b0", "#f97316", 0, 0);
        }
      },
      {
        type: "边长计算",
        text: '平行四边形 <span class="math">ABCD</span> 的周长为 <span class="math">40 cm</span>，已知 <span class="math">AB = 12 cm</span>，求 <span class="math">BC</span> 的长。',
        options: ["8 cm", "10 cm", "12 cm", "16 cm"],
        answer: 0,
        hint: "平行四边形对边相等，所以 AB = CD，BC = AD。周长 = 2(AB + BC)。",
        explanation: "平行四边形对边相等：AB = CD = 12 cm<br>周长 = 2(AB + BC)<br>40 = 2(12 + BC)<br>20 = 12 + BC<br>BC = 8 cm",
        showGraph: true,
        graphFn: function(ctx, w, h) {
          var pts = [[w*0.15, h*0.7], [w*0.35, h*0.2], [w*0.85, h*0.2], [w*0.65, h*0.7]];
          drawParallelogram(ctx, w, h, pts, "#93c5fd", "rgba(99,102,241,0.08)");
          labelPoint(ctx, pts[0][0], pts[0][1], "A", "#fbbf24", -16, 16);
          labelPoint(ctx, pts[1][0], pts[1][1], "B", "#fbbf24", -10, -14);
          labelPoint(ctx, pts[2][0], pts[2][1], "C", "#fbbf24", 14, -14);
          labelPoint(ctx, pts[3][0], pts[3][1], "D", "#fbbf24", 14, 16);
          markEqual(ctx, pts[0][0], pts[0][1], pts[1][0], pts[1][1], 2, "#22d3ee");
          markEqual(ctx, pts[2][0], pts[2][1], pts[3][0], pts[3][1], 2, "#22d3ee");
          markEqual(ctx, pts[1][0], pts[1][1], pts[2][0], pts[2][1], 1, "#f9a8d4");
          markEqual(ctx, pts[0][0], pts[0][1], pts[3][0], pts[3][1], 1, "#f9a8d4");
          drawLengthLabel(ctx, pts[1][0], pts[1][1], pts[2][0], pts[2][1], "12 cm", "#93c5fd", -18);
        }
      },
      {
        type: "对角线性质",
        text: '平行四边形 <span class="math">ABCD</span> 中，对角线 <span class="math">AC</span> 与 <span class="math">BD</span> 交于点 <span class="math">O</span>。已知 <span class="math">AC = 16 cm</span>，<span class="math">BD = 12 cm</span>，则 <span class="math">OA</span> 和 <span class="math">OB</span> 分别是多少？',
        options: ["OA = 8 cm, OB = 6 cm", "OA = 4 cm, OB = 3 cm", "OA = 8 cm, OB = 12 cm", "OA = 16 cm, OB = 6 cm"],
        answer: 0,
        hint: "平行四边形的对角线互相平分，即交点 O 是两条对角线的中点。",
        explanation: "平行四边形的对角线互相平分：<br>OA = OC = AC / 2 = 16 / 2 = 8 cm<br>OB = OD = BD / 2 = 12 / 2 = 6 cm",
        showGraph: true,
        graphFn: function(ctx, w, h) {
          var pts = [[w*0.12, h*0.65], [w*0.38, h*0.18], [w*0.88, h*0.35], [w*0.62, h*0.82]];
          drawParallelogram(ctx, w, h, pts, "#93c5fd", "rgba(99,102,241,0.08)");
          drawDiagonals(ctx, pts);
          var ox = (pts[0][0]+pts[2][0])/2, oy = (pts[0][1]+pts[2][1])/2;
          drawMidpoint(ctx, ox, oy, "O", "#f59e0b");
          labelPoint(ctx, pts[0][0], pts[0][1], "A", "#fbbf24", -16, 8);
          labelPoint(ctx, pts[1][0], pts[1][1], "B", "#fbbf24", -8, -14);
          labelPoint(ctx, pts[2][0], pts[2][1], "C", "#fbbf24", 16, -4);
          labelPoint(ctx, pts[3][0], pts[3][1], "D", "#fbbf24", 6, 18);
          drawLengthLabel(ctx, pts[0][0], pts[0][1], pts[2][0], pts[2][1], "AC=16", "#93c5fd", -20);
          drawLengthLabel(ctx, pts[1][0], pts[1][1], pts[3][0], pts[3][1], "BD=12", "#f9a8d4", 20);
        }
      },
      {
        type: "判定条件",
        text: '下列条件中，<strong>不能</strong>判定四边形 <span class="math">ABCD</span> 是平行四边形的是：',
        options: [
          "AB // CD 且 AB = CD",
          "AB = CD 且 AD = BC",
          "AB // CD 且 AD // BC",
          "AB = CD 且 &ang;A = &ang;C"
        ],
        answer: 3,
        hint: "平行四边形的判定方法有：两组对边分别平行、两组对边分别相等、一组对边平行且相等、对角线互相平分。",
        explanation: "判定平行四边形的方法：<br>A. 一组对边平行且相等 &rarr; 是平行四边形<br>B. 两组对边分别相等 &rarr; 是平行四边形<br>C. 两组对边分别平行 &rarr; 是平行四边形（定义）<br>D. 一组对边相等 + 一组对角相等 &rarr; <strong>不一定</strong>，等腰梯形也满足此条件",
        showGraph: false
      },
      {
        type: "面积计算",
        text: '平行四边形 <span class="math">ABCD</span> 中，底 <span class="math">AB = 15 cm</span>，对应的高 <span class="math">h = 8 cm</span>，则平行四边形的面积是：',
        options: ["120 cm&sup2;", "60 cm&sup2;", "92 cm&sup2;", "46 cm&sup2;"],
        answer: 0,
        hint: "平行四边形面积 = 底 &times; 高",
        explanation: "平行四边形面积 = 底 &times; 高<br>S = AB &times; h = 15 &times; 8 = 120 cm&sup2;",
        showGraph: true,
        graphFn: function(ctx, w, h) {
          var pts = [[w*0.1, h*0.75], [w*0.35, h*0.25], [w*0.9, h*0.25], [w*0.65, h*0.75]];
          drawParallelogram(ctx, w, h, pts, "#93c5fd", "rgba(99,102,241,0.08)");
          labelPoint(ctx, pts[0][0], pts[0][1], "A", "#fbbf24", -14, 16);
          labelPoint(ctx, pts[1][0], pts[1][1], "B", "#fbbf24", -10, -14);
          labelPoint(ctx, pts[2][0], pts[2][1], "C", "#fbbf24", 14, -14);
          labelPoint(ctx, pts[3][0], pts[3][1], "D", "#fbbf24", 14, 16);
          ctx.strokeStyle = "#ef4444"; ctx.lineWidth = 2; ctx.setLineDash([5, 3]);
          var hx = pts[1][0];
          ctx.beginPath(); ctx.moveTo(hx, pts[1][1]); ctx.lineTo(hx, pts[0][1]); ctx.stroke();
          ctx.setLineDash([]);
          labelPoint(ctx, hx, (pts[1][1]+pts[0][1])/2, "h=8", "#ef4444", -28, 0);
          drawLengthLabel(ctx, pts[0][0], pts[0][1], pts[3][0], pts[3][1], "AB=15", "#93c5fd", 18);
        }
      },
      {
        type: "角度计算",
        text: '平行四边形 <span class="math">ABCD</span> 中，<span class="math">&ang;A</span> 比 <span class="math">&ang;B</span> 大 <span class="math">40&deg;</span>，求 <span class="math">&ang;A</span> 的度数。',
        options: ["110&deg;", "100&deg;", "120&deg;", "70&deg;"],
        answer: 0,
        hint: "平行四边形邻角互补：&ang;A + &ang;B = 180&deg;，又 &ang;A - &ang;B = 40&deg;。",
        explanation: "设 &ang;B = x，则 &ang;A = x + 40&deg;<br>邻角互补：&ang;A + &ang;B = 180&deg;<br>(x + 40) + x = 180<br>2x = 140，x = 70&deg;<br>&ang;A = 70 + 40 = 110&deg;",
        showGraph: true,
        graphFn: function(ctx, w, h) {
          var pts = [[w*0.15, h*0.72], [w*0.4, h*0.2], [w*0.85, h*0.28], [w*0.6, h*0.8]];
          drawParallelogram(ctx, w, h, pts, "#93c5fd", "rgba(99,102,241,0.08)");
          labelPoint(ctx, pts[0][0], pts[0][1], "A", "#fbbf24", -16, 8);
          labelPoint(ctx, pts[1][0], pts[1][1], "B", "#fbbf24", -6, -14);
          labelPoint(ctx, pts[2][0], pts[2][1], "C", "#fbbf24", 16, -6);
          labelPoint(ctx, pts[3][0], pts[3][1], "D", "#fbbf24", 6, 18);
          drawAngleArc(ctx, pts[0][0], pts[0][1], 28, -1.15, -0.1, "#f97316");
          labelPoint(ctx, pts[0][0]+42, pts[0][1]-16, "?", "#f97316", 0, 0);
          drawAngleArc(ctx, pts[1][0], pts[1][1], 24, 0.35, 1.95, "#22d3ee");
        }
      },
      {
        type: "对角线与面积",
        text: '平行四边形 <span class="math">ABCD</span> 中，对角线 <span class="math">AC</span> 和 <span class="math">BD</span> 交于点 <span class="math">O</span>。若 <span class="math">S<sub>\u25b3AOB</sub> = 15 cm&sup2;</span>，则平行四边形 <span class="math">ABCD</span> 的面积是：',
        options: ["60 cm&sup2;", "30 cm&sup2;", "45 cm&sup2;", "90 cm&sup2;"],
        answer: 0,
        hint: "对角线将平行四边形分成 4 个面积相等的三角形。",
        explanation: "平行四边形的两条对角线将其分成 4 个面积相等的三角形。<br>S<sub>ABCD</sub> = 4 &times; S<sub>\u25b3AOB</sub> = 4 &times; 15 = 60 cm&sup2;",
        showGraph: true,
        graphFn: function(ctx, w, h) {
          var pts = [[w*0.1, h*0.7], [w*0.35, h*0.15], [w*0.9, h*0.3], [w*0.65, h*0.85]];
          drawParallelogram(ctx, w, h, pts, "#93c5fd", "rgba(99,102,241,0.05)");
          drawDiagonals(ctx, pts, "rgba(255,200,50,0.5)");
          var ox = (pts[0][0]+pts[2][0])/2, oy = (pts[0][1]+pts[2][1])/2;
          ctx.fillStyle = "rgba(34,211,238,0.12)";
          ctx.beginPath(); ctx.moveTo(pts[0][0], pts[0][1]); ctx.lineTo(ox, oy); ctx.lineTo(pts[1][0], pts[1][1]); ctx.closePath();
          ctx.fill(); ctx.strokeStyle = "#22d3ee"; ctx.lineWidth = 2; ctx.stroke();
          drawMidpoint(ctx, ox, oy, "O", "#f59e0b");
          labelPoint(ctx, pts[0][0], pts[0][1], "A", "#fbbf24", -16, 8);
          labelPoint(ctx, pts[1][0], pts[1][1], "B", "#fbbf24", -6, -14);
          labelPoint(ctx, pts[2][0], pts[2][1], "C", "#fbbf24", 16, -4);
          labelPoint(ctx, pts[3][0], pts[3][1], "D", "#fbbf24", 6, 18);
          labelPoint(ctx, (pts[0][0]+pts[1][0]+ox)/3, (pts[0][1]+pts[1][1]+oy)/3, "15", "#22d3ee", 0, 0);
        }
      },
      {
        type: "坐标几何",
        text: '在平面直角坐标系中，平行四边形 <span class="math">ABCD</span> 的三个顶点坐标为 <span class="math">A(1, 1)</span>、<span class="math">B(4, 1)</span>、<span class="math">C(5, 4)</span>，求顶点 <span class="math">D</span> 的坐标。',
        options: ["(2, 4)", "(3, 4)", "(6, 4)", "(0, 4)"],
        answer: 0,
        hint: "在平行四边形 ABCD 中，向量 DC = 向量 AB。",
        explanation: "向量 AB = (4-1, 1-1) = (3, 0)<br>在平行四边形 ABCD 中，DC = AB<br>设 D(x, y)，则 C - D = (3, 0)<br>(5-x, 4-y) = (3, 0)<br>x = 2, y = 4 &rarr; D(2, 4)",
        showGraph: true,
        graphFn: function(ctx, w, h) {
          var ox = 60, oy = h - 50;
          var scale = Math.min((w-120)/6, (h-100)/5);
          ctx.strokeStyle = "rgba(255,255,255,0.08)"; ctx.lineWidth = 1;
          for (var i = 0; i <= 6; i++) { ctx.beginPath(); ctx.moveTo(ox+i*scale, 20); ctx.lineTo(ox+i*scale, oy+10); ctx.stroke(); }
          for (var i = 0; i <= 5; i++) { ctx.beginPath(); ctx.moveTo(ox-10, oy-i*scale); ctx.lineTo(w-20, oy-i*scale); ctx.stroke(); }
          ctx.strokeStyle = "rgba(255,255,255,0.3)"; ctx.lineWidth = 1.5;
          ctx.beginPath(); ctx.moveTo(ox, 20); ctx.lineTo(ox, oy+10); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(ox-10, oy); ctx.lineTo(w-20, oy); ctx.stroke();
          ctx.fillStyle = "rgba(255,255,255,0.4)"; ctx.font = "12px sans-serif"; ctx.textAlign = "center";
          for (var i = 1; i <= 6; i++) ctx.fillText(i, ox+i*scale, oy+20);
          for (var i = 1; i <= 5; i++) ctx.fillText(i, ox-20, oy-i*scale+4);
          ctx.fillText("O", ox-14, oy+16);
          function toX(x) { return ox + x * scale; }
          function toY(y) { return oy - y * scale; }
          var pts = [[toX(1),toY(1)],[toX(4),toY(1)],[toX(5),toY(4)],[toX(2),toY(4)]];
          drawParallelogram(ctx, w, h, pts, "#93c5fd", "rgba(99,102,241,0.1)");
          var labels = ["A(1,1)","B(4,1)","C(5,4)","D(?,?)"];
          var offsets = [[0,18],[0,18],[0,-12],[0,-12]];
          var colors = ["#fbbf24","#fbbf24","#fbbf24","#ef4444"];
          for (var j = 0; j < pts.length; j++) {
            ctx.fillStyle = colors[j]; ctx.beginPath(); ctx.arc(pts[j][0],pts[j][1],5,0,Math.PI*2); ctx.fill();
            labelPoint(ctx, pts[j][0], pts[j][1], labels[j], colors[j], offsets[j][0], offsets[j][1]);
          }
        }
      },
      {
        type: "综合应用",
        text: '平行四边形 <span class="math">ABCD</span> 中，<span class="math">E</span> 是 <span class="math">BC</span> 的中点，连接 <span class="math">AE</span> 与对角线 <span class="math">BD</span> 交于点 <span class="math">F</span>。若 <span class="math">S<sub>\u25b3BEF</sub> = 2 cm&sup2;</span>，则平行四边形 <span class="math">ABCD</span> 的面积是：',
        options: ["24 cm&sup2;", "18 cm&sup2;", "36 cm&sup2;", "12 cm&sup2;"],
        answer: 0,
        hint: "AD // BE 且 BE = AD/2，所以 \u25b3BEF \u223d \u25b3DAF，相似比 1:2，从而 BF:FD = 1:2。",
        explanation: "AD // BE 且 BE = AD/2 &rarr; \u25b3BEF \u223d \u25b3DAF，相似比 1:2<br>BF:FD = 1:2，即 BF = BD/3<br>共顶点 A 看：S<sub>\u25b3ABF</sub>/S<sub>\u25b3ABD</sub> = BF/BD = 1/3<br>S<sub>\u25b3ABD</sub> = S/2 &rarr; S<sub>\u25b3ABF</sub> = S/6<br>又共顶点 B 看 AE 上两段：EF:AF = 1:2<br>S<sub>\u25b3BEF</sub>:S<sub>\u25b3ABF</sub> = EF:AF = 1:2<br>S<sub>\u25b3ABF</sub> = 2 &times; 2 = 4<br>S/6 = 4 &rarr; S = 24 cm&sup2;",
        showGraph: true,
        graphFn: function(ctx, w, h) {
          var pts = [[w*0.1, h*0.78], [w*0.3, h*0.15], [w*0.85, h*0.18], [w*0.65, h*0.82]];
          drawParallelogram(ctx, w, h, pts, "#93c5fd", "rgba(99,102,241,0.06)");
          var ex = (pts[1][0]+pts[2][0])/2, ey = (pts[1][1]+pts[2][1])/2;
          drawMidpoint(ctx, ex, ey, "E", "#22d3ee");
          ctx.strokeStyle = "rgba(34,211,238,0.5)"; ctx.lineWidth = 1.5;
          ctx.beginPath(); ctx.moveTo(pts[0][0], pts[0][1]); ctx.lineTo(ex, ey); ctx.stroke();
          drawDiagonals(ctx, pts, "rgba(255,200,50,0.4)");
          var t = 1/3;
          var fx = pts[1][0] + t*(pts[3][0]-pts[1][0]);
          var fy = pts[1][1] + t*(pts[3][1]-pts[1][1]);
          drawMidpoint(ctx, fx, fy, "F", "#ef4444");
          labelPoint(ctx, pts[0][0], pts[0][1], "A", "#fbbf24", -16, 8);
          labelPoint(ctx, pts[1][0], pts[1][1], "B", "#fbbf24", -6, -14);
          labelPoint(ctx, pts[2][0], pts[2][1], "C", "#fbbf24", 14, -12);
          labelPoint(ctx, pts[3][0], pts[3][1], "D", "#fbbf24", 10, 16);
        }
      },
      {
        type: "证明推理",
        text: '已知四边形 <span class="math">ABCD</span> 的对角线 <span class="math">AC</span> 和 <span class="math">BD</span> 互相平分，以下说法正确的是：',
        options: [
          "该四边形一定是平行四边形",
          "该四边形一定是矩形",
          "该四边形一定是菱形",
          "该四边形不一定是平行四边形"
        ],
        answer: 0,
        hint: "对角线互相平分是平行四边形的判定定理之一。",
        explanation: "对角线互相平分是平行四边形的充要条件之一：<br>若四边形的对角线互相平分，则该四边形是平行四边形。<br>但不能确定是矩形（还需对角线相等）或菱形（还需对角线互相垂直）。",
        showGraph: true,
        graphFn: function(ctx, w, h) {
          var pts = [[w*0.1, h*0.65], [w*0.4, h*0.12], [w*0.9, h*0.35], [w*0.6, h*0.88]];
          drawParallelogram(ctx, w, h, pts, "#93c5fd", "rgba(99,102,241,0.08)");
          drawDiagonals(ctx, pts, "rgba(255,200,50,0.6)");
          var ox = (pts[0][0]+pts[2][0])/2, oy = (pts[0][1]+pts[2][1])/2;
          drawMidpoint(ctx, ox, oy, "O", "#f59e0b");
          markEqual(ctx, pts[0][0], pts[0][1], ox, oy, 1, "#22d3ee");
          markEqual(ctx, ox, oy, pts[2][0], pts[2][1], 1, "#22d3ee");
          markEqual(ctx, pts[1][0], pts[1][1], ox, oy, 2, "#f9a8d4");
          markEqual(ctx, ox, oy, pts[3][0], pts[3][1], 2, "#f9a8d4");
          labelPoint(ctx, pts[0][0], pts[0][1], "A", "#fbbf24", -16, 6);
          labelPoint(ctx, pts[1][0], pts[1][1], "B", "#fbbf24", -4, -14);
          labelPoint(ctx, pts[2][0], pts[2][1], "C", "#fbbf24", 16, -4);
          labelPoint(ctx, pts[3][0], pts[3][1], "D", "#fbbf24", 6, 18);
        }
      }
    ];

    var currentQ = 0, score = 0, streakCount = 0, maxStreakCount = 0;
    var correctTotal = 0, wrongTotal = 0, answers = [], answered = false;

    function renderQuestion() {
      var q = questions[currentQ]; answered = false;
      document.getElementById("qNumber").textContent = "\u7b2c " + (currentQ + 1) + " \u9898";
      document.getElementById("qType").textContent = q.type;
      document.getElementById("qText").innerHTML = q.text;
      var canvas = document.getElementById("graphCanvas");
      if (q.showGraph && q.graphFn) {
        canvas.style.display = "block";
        canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
        var ctx = canvas.getContext("2d");
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        q.graphFn(ctx, canvas.width, canvas.height);
      } else { canvas.style.display = "none"; }
      var grid = document.getElementById("optionsGrid"); grid.innerHTML = "";
      var labels = ["A", "B", "C", "D"];
      q.options.forEach(function(opt, i) {
        var btn = document.createElement("button");
        btn.className = "option-btn";
        btn.innerHTML = '<span class="option-label">' + labels[i] + '</span>' + opt;
        btn.onclick = function() { selectAnswer(i); };
        grid.appendChild(btn);
      });
      document.getElementById("feedback").className = "feedback-area";
      document.getElementById("feedback").innerHTML = "";
      document.getElementById("nextBtn").disabled = true;
      document.getElementById("hintBtn").disabled = false;
      document.getElementById("hintBtn").textContent = "\u63d0\u793a";
      document.getElementById("questionCard").className = "question-card";
    }

    function selectAnswer(idx) {
      if (answered) return; answered = true;
      var q = questions[currentQ];
      var btns = document.querySelectorAll(".option-btn");
      var feedback = document.getElementById("feedback");
      var card = document.getElementById("questionCard");
      btns.forEach(function(btn, i) {
        btn.classList.add("disabled");
        if (i === q.answer) btn.classList.add("correct");
        if (i === idx && idx !== q.answer) btn.classList.add("wrong");
      });
      if (idx === q.answer) {
        var points = 10 + streakCount * 2;
        score += points; streakCount++; correctTotal++;
        if (streakCount > maxStreakCount) maxStreakCount = streakCount;
        card.classList.add("correct-flash");
        feedback.className = "feedback-area show correct-feedback";
        feedback.innerHTML = "<strong>\u56de\u7b54\u6b63\u786e\uff01+" + points + " \u5206</strong><br>" + q.explanation;
        showScoreFloat(points);
        if (streakCount === 3) showAchievement("\u4e09\u8fde\u51fb\uff01");
        if (streakCount === 5) showAchievement("\u4e94\u8fde\u51fb\uff01\u592a\u5f3a\u4e86\uff01");
        if (correctTotal === 10) showAchievement("\u5168\u90e8\u7b54\u5bf9\uff01\u5b8c\u7f8e\uff01");
        answers.push({ correct: true, qIdx: currentQ });
      } else {
        streakCount = 0; wrongTotal++;
        card.classList.add("wrong-flash");
        feedback.className = "feedback-area show wrong-feedback";
        feedback.innerHTML = "<strong>\u56de\u7b54\u9519\u8bef</strong>\uff0c\u6b63\u786e\u7b54\u6848\u662f <strong>" + ["A","B","C","D"][q.answer] + "</strong><br>" + q.explanation;
        answers.push({ correct: false, qIdx: currentQ, chose: idx });
      }
      updateStats();
      document.getElementById("nextBtn").disabled = false;
      document.getElementById("hintBtn").disabled = true;
    }

    function showHint() {
      var q = questions[currentQ];
      var feedback = document.getElementById("feedback");
      feedback.className = "feedback-area show";
      feedback.style.background = "rgba(245,158,11,0.1)";
      feedback.style.borderColor = "rgba(245,158,11,0.3)";
      feedback.style.color = "#fbbf24";
      feedback.innerHTML = "<strong>\u63d0\u793a\uff1a</strong>" + q.hint;
      document.getElementById("hintBtn").disabled = true;
      document.getElementById("hintBtn").textContent = "\u5df2\u63d0\u793a";
    }

    function nextQuestion() {
      currentQ++;
      if (currentQ >= questions.length) { showResults(); return; }
      renderQuestion(); updateStats();
    }

    function updateStats() {
      document.getElementById("score").textContent = score;
      document.getElementById("streak").textContent = streakCount;
      document.getElementById("progressText").textContent = Math.min(currentQ + 1, questions.length) + "/10";
      document.getElementById("progressBar").style.width = ((currentQ + (answered ? 1 : 0)) / questions.length * 100) + "%";
    }

    function showResults() {
      document.getElementById("quizArea").style.display = "none";
      document.getElementById("resultCard").style.display = "block";
      var pct = Math.round(correctTotal / questions.length * 100);
      document.getElementById("finalScore").textContent = score;
      document.getElementById("accuracy").textContent = "\u6b63\u786e\u7387: " + pct + "%";
      document.getElementById("correctCount").textContent = correctTotal;
      document.getElementById("wrongCount").textContent = wrongTotal;
      document.getElementById("maxStreak").textContent = maxStreakCount;
      var rating;
      if (pct === 100) rating = "\u5b8c\u7f8e\uff01\u4f60\u662f\u5e73\u884c\u56db\u8fb9\u5f62\u5927\u5e08\uff01";
      else if (pct >= 80) rating = "\u4f18\u79c0\uff01\u638c\u63e1\u5f97\u5f88\u597d\uff01";
      else if (pct >= 60) rating = "\u4e0d\u9519\uff01\u7ee7\u7eed\u52a0\u6cb9\uff01";
      else if (pct >= 40) rating = "\u8fd8\u9700\u8981\u591a\u7ec3\u4e60\uff01";
      else rating = "\u5efa\u8bae\u590d\u4e60\u4e00\u4e0b\u5e73\u884c\u56db\u8fb9\u5f62\u7684\u77e5\u8bc6\u70b9";
      document.getElementById("rating").textContent = rating;
      if (pct === 100) { document.getElementById("resultTitle").textContent = "\u6ee1\u5206\u901a\u5173\uff01"; celebrateConfetti(); }
      var reviewList = document.getElementById("reviewList"); reviewList.innerHTML = "";
      answers.forEach(function(a, i) {
        var q = questions[a.qIdx]; var div = document.createElement("div");
        div.className = "review-item " + (a.correct ? "review-correct" : "review-wrong");
        div.innerHTML = '<div class="review-q">\u7b2c ' + (i+1) + ' \u9898 [' + q.type + ']\uff1a' + (a.correct ? "\u6b63\u786e" : "\u9519\u8bef") + '</div>' +
          '<div class="review-a">' + (a.correct ? "" : "\u4f60\u9009\u4e86 " + ["A","B","C","D"][a.chose] + " | ") + "\u6b63\u786e\u7b54\u6848\uff1a" + ["A","B","C","D"][q.answer] + '</div>';
        reviewList.appendChild(div);
      });
    }

    function restartQuiz() {
      currentQ = 0; score = 0; streakCount = 0; maxStreakCount = 0;
      correctTotal = 0; wrongTotal = 0; answers = []; answered = false;
      document.getElementById("quizArea").style.display = "block";
      document.getElementById("resultCard").style.display = "none";
      renderQuestion(); updateStats();
    }

    function showScoreFloat(pts) {
      var el = document.createElement("div"); el.className = "score-float";
      el.textContent = "+" + pts;
      el.style.left = (window.innerWidth / 2 - 30) + "px";
      el.style.top = (window.innerHeight / 2 - 50) + "px";
      document.body.appendChild(el); setTimeout(function() { el.remove(); }, 1200);
    }

    function showAchievement(text) {
      var popup = document.createElement("div"); popup.className = "achievement-popup";
      popup.textContent = text; document.body.appendChild(popup);
      requestAnimationFrame(function() { popup.classList.add("show"); });
      setTimeout(function() { popup.classList.remove("show"); setTimeout(function() { popup.remove(); }, 500); }, 2500);
    }

    function celebrateConfetti() {
      var canvas = document.createElement("canvas"); canvas.className = "confetti-canvas";
      canvas.width = window.innerWidth; canvas.height = window.innerHeight;
      document.body.appendChild(canvas); var ctx = canvas.getContext("2d");
      var colors = ["#ef4444","#f59e0b","#22c55e","#3b82f6","#a855f7","#ec4899"];
      var pieces = [];
      for (var i = 0; i < 80; i++) pieces.push({
        x: Math.random()*canvas.width, y: -20-Math.random()*100,
        vx: (Math.random()-0.5)*6, vy: Math.random()*3+2,
        color: colors[Math.floor(Math.random()*colors.length)],
        size: Math.random()*8+4, rot: Math.random()*360, rotSpeed: (Math.random()-0.5)*12
      });
      var frame = 0;
      (function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height); var active = 0;
        pieces.forEach(function(p) {
          p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.rot += p.rotSpeed;
          if (p.y < canvas.height + 20) {
            active++; ctx.save(); ctx.translate(p.x, p.y);
            ctx.rotate(p.rot * Math.PI / 180); ctx.fillStyle = p.color;
            ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size); ctx.restore();
          }
        });
        frame++;
        if (active > 0 && frame < 300) requestAnimationFrame(animate);
        else canvas.remove();
      })();
    }

    renderQuestion(); updateStats();
  </script>
</body>
</html>
