<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>二次根式练习 - 八年级数学</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
      min-height: 100vh;
      color: #e0e0e0;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }
    .header h1 {
      font-size: 2.4em;
      background: linear-gradient(135deg, #43e97b, #38f9d7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .header p { color: #8892b0; font-size: 1.1em; }

    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 25px;
      flex-wrap: wrap;
    }
    .stat-box {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      padding: 12px 24px;
      border-radius: 14px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.1);
      min-width: 100px;
    }
    .stat-box .label { font-size: 0.85em; color: #8892b0; margin-bottom: 4px; }
    .stat-box .value { font-size: 1.6em; font-weight: bold; }
    .stat-box .value.score { color: #43e97b; }
    .stat-box .value.streak { color: #f97316; }
    .stat-box .value.progress { color: #38f9d7; }

    .progress-bar-container {
      width: 100%;
      height: 10px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      margin-bottom: 25px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #43e97b, #38f9d7);
      border-radius: 10px;
      transition: width 0.5s ease;
    }

    .question-card {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 35px;
      margin-bottom: 20px;
      transition: all 0.3s ease;
    }
    .question-card.correct-flash {
      border-color: #22c55e;
      box-shadow: 0 0 30px rgba(34,197,94,0.2);
    }
    .question-card.wrong-flash {
      border-color: #ef4444;
      box-shadow: 0 0 30px rgba(239,68,68,0.2);
    }

    .question-number {
      display: inline-block;
      background: linear-gradient(135deg, #43e97b, #38f9d7);
      color: #0f2027;
      padding: 5px 16px;
      border-radius: 20px;
      font-size: 0.9em;
      font-weight: bold;
      margin-bottom: 15px;
    }
    .question-type {
      display: inline-block;
      background: rgba(67,233,123,0.15);
      color: #43e97b;
      padding: 4px 12px;
      border-radius: 10px;
      font-size: 0.8em;
      margin-left: 8px;
    }

    .question-text {
      font-size: 1.25em;
      line-height: 1.8;
      margin-bottom: 20px;
      color: #f0f0f0;
    }
    .question-text .math {
      font-family: 'Cambria Math', 'Times New Roman', serif;
      font-style: italic;
      color: #93c5fd;
    }

    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 15px;
    }
    @media (max-width: 600px) {
      .options-grid { grid-template-columns: 1fr; }
    }

    .option-btn {
      background: rgba(255,255,255,0.05);
      border: 2px solid rgba(255,255,255,0.12);
      color: #e0e0e0;
      padding: 14px 20px;
      border-radius: 12px;
      font-size: 1.05em;
      cursor: pointer;
      transition: all 0.25s ease;
      text-align: left;
    }
    .option-btn:hover:not(.disabled) {
      background: rgba(67,233,123,0.15);
      border-color: #43e97b;
      transform: translateY(-2px);
    }
    .option-btn.selected {
      background: rgba(67,233,123,0.25);
      border-color: #43e97b;
    }
    .option-btn.correct {
      background: rgba(34,197,94,0.2);
      border-color: #22c55e;
      color: #86efac;
    }
    .option-btn.wrong {
      background: rgba(239,68,68,0.2);
      border-color: #ef4444;
      color: #fca5a5;
    }
    .option-btn.disabled { cursor: default; opacity: 0.7; }
    .option-btn .option-label {
      display: inline-block;
      background: rgba(255,255,255,0.1);
      width: 28px;
      height: 28px;
      line-height: 28px;
      text-align: center;
      border-radius: 50%;
      margin-right: 10px;
      font-weight: bold;
      font-size: 0.9em;
    }

    .feedback-area {
      min-height: 50px;
      margin-top: 15px;
      padding: 15px;
      border-radius: 12px;
      display: none;
      line-height: 1.7;
    }
    .feedback-area.show { display: block; }
    .feedback-area.correct-feedback {
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.3);
      color: #86efac;
    }
    .feedback-area.wrong-feedback {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
    }

    .nav-buttons {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 20px;
    }
    .nav-btn {
      background: linear-gradient(135deg, #43e97b, #38f9d7);
      color: #0f2027;
      border: none;
      padding: 14px 36px;
      font-size: 1.1em;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.25s ease;
    }
    .nav-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(67,233,123,0.4); }
    .nav-btn:active { transform: translateY(0); }
    .nav-btn:disabled { opacity: 0.4; cursor: default; transform: none; box-shadow: none; }
    .nav-btn.hint-btn {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: white;
    }
    .nav-btn.hint-btn:hover { box-shadow: 0 8px 25px rgba(245,158,11,0.4); }

    .result-card {
      display: none;
      text-align: center;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 50px 35px;
    }
    .result-card h2 { font-size: 2.2em; margin-bottom: 10px; }
    .result-card .big-score {
      font-size: 4em;
      font-weight: bold;
      background: linear-gradient(135deg, #43e97b, #38f9d7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 15px 0;
    }
    .result-card .accuracy { font-size: 1.3em; color: #8892b0; margin-bottom: 20px; }
    .result-card .rating { font-size: 1.8em; margin: 15px 0; }
    .result-card .details {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin: 25px 0;
    }
    .result-card .detail-item {
      background: rgba(255,255,255,0.05);
      padding: 15px;
      border-radius: 12px;
    }
    .result-card .detail-item .d-label { font-size: 0.85em; color: #8892b0; }
    .result-card .detail-item .d-value { font-size: 1.5em; font-weight: bold; margin-top: 5px; }

    .review-section {
      margin-top: 30px;
      text-align: left;
    }
    .review-section h3 { margin-bottom: 15px; font-size: 1.3em; }
    .review-item {
      background: rgba(255,255,255,0.04);
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 12px;
      border-left: 4px solid;
    }
    .review-item.review-correct { border-left-color: #22c55e; }
    .review-item.review-wrong { border-left-color: #ef4444; }
    .review-item .review-q { font-weight: bold; margin-bottom: 6px; }
    .review-item .review-a { font-size: 0.95em; color: #8892b0; }

    .confetti-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
    }

    .achievement-popup {
      position: fixed;
      top: 20px;
      right: 20px;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: #1a1a2e;
      padding: 18px 28px;
      border-radius: 14px;
      font-weight: bold;
      font-size: 1.1em;
      box-shadow: 0 10px 40px rgba(245,158,11,0.4);
      transform: translateX(400px);
      transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 1000;
    }
    .achievement-popup.show { transform: translateX(0); }

    .score-float {
      position: fixed;
      font-size: 1.8em;
      font-weight: bold;
      color: #43e97b;
      pointer-events: none;
      z-index: 1000;
      text-shadow: 0 2px 10px rgba(67,233,123,0.5);
      animation: floatUp 1.2s ease-out forwards;
    }
    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-80px) scale(1.3); }
    }

    /* 数学公式样式增强 */
    .radical { white-space: nowrap; }
    .radical-sign {
      font-size: 1.1em;
      position: relative;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>二次根式专项练习</h1>
      <p>八年级数学 | 10 道精选题目 | 互动学习</p>
    </div>

    <div class="stats-bar">
      <div class="stat-box">
        <div class="label">得分</div>
        <div class="value score" id="score">0</div>
      </div>
      <div class="stat-box">
        <div class="label">连击</div>
        <div class="value streak" id="streak">0</div>
      </div>
      <div class="stat-box">
        <div class="label">进度</div>
        <div class="value progress" id="progressText">0/10</div>
      </div>
    </div>

    <div class="progress-bar-container">
      <div class="progress-bar-fill" id="progressBar" style="width: 0%"></div>
    </div>

    <div id="quizArea">
      <div class="question-card" id="questionCard">
        <div>
          <span class="question-number" id="qNumber">第 1 题</span>
          <span class="question-type" id="qType">概念</span>
        </div>
        <div class="question-text" id="qText"></div>
        <div class="options-grid" id="optionsGrid"></div>
        <div class="feedback-area" id="feedback"></div>
        <div class="nav-buttons">
          <button class="nav-btn hint-btn" id="hintBtn" onclick="showHint()">提示 💡</button>
          <button class="nav-btn" id="nextBtn" onclick="nextQuestion()" disabled>下一题 →</button>
        </div>
      </div>
    </div>

    <div class="result-card" id="resultCard">
      <h2 id="resultTitle">练习完成！</h2>
      <div class="big-score" id="finalScore">0</div>
      <div class="accuracy" id="accuracy">正确率: 0%</div>
      <div class="rating" id="rating"></div>
      <div class="details">
        <div class="detail-item">
          <div class="d-label">正确</div>
          <div class="d-value" id="correctCount" style="color:#22c55e">0</div>
        </div>
        <div class="detail-item">
          <div class="d-label">错误</div>
          <div class="d-value" id="wrongCount" style="color:#ef4444">0</div>
        </div>
        <div class="detail-item">
          <div class="d-label">最长连击</div>
          <div class="d-value" id="maxStreak" style="color:#f97316">0</div>
        </div>
      </div>
      <button class="nav-btn" onclick="restartQuiz()" style="margin-top: 10px">重新练习 🔄</button>
      <div class="review-section" id="reviewSection">
        <h3>答题回顾</h3>
        <div id="reviewList"></div>
      </div>
    </div>
  </div>

  <script>
    const questions = [
      {
        type: "概念理解",
        text: '下列各式中，是二次根式的是：',
        options: [
          "<span class='math'>√(−4)</span>",
          "<span class='math'>√9</span>",
          "<span class='math'>∛8</span>",
          "<span class='math'>1 / √0</span>"
        ],
        answer: 1,
        hint: "二次根式的定义是 √a（a ≥ 0），被开方数必须是非负数，且必须是二次方根（不是三次方根）。",
        explanation: "√(−4) 中被开方数为负数，不是二次根式；∛8 是三次方根，不属于二次根式；1/√0 无意义。<br>只有 √9 满足二次根式的定义（被开方数 9 ≥ 0），所以答案是 B。"
      },
      {
        type: "有意义条件",
        text: '使二次根式 <span class="math">√(2x − 6)</span> 有意义的 <span class="math">x</span> 的取值范围是：',
        options: [
          "<span class='math'>x ≥ 3</span>",
          "<span class='math'>x &gt; 3</span>",
          "<span class='math'>x ≤ 3</span>",
          "<span class='math'>x &lt; 3</span>"
        ],
        answer: 0,
        hint: "二次根式 √a 有意义的条件是 a ≥ 0，即被开方数大于或等于零。",
        explanation: "要使 √(2x − 6) 有意义，需要：<br>2x − 6 ≥ 0<br>2x ≥ 6<br>x ≥ 3<br>所以 x 的取值范围是 x ≥ 3。"
      },
      {
        type: "性质运用",
        text: '计算 <span class="math">√(−5)²</span> 的值是：',
        options: [
          "<span class='math'>−5</span>",
          "<span class='math'>5</span>",
          "<span class='math'>±5</span>",
          "<span class='math'>25</span>"
        ],
        answer: 1,
        hint: "利用二次根式的重要性质：√(a²) = |a|，即结果取绝对值。",
        explanation: "根据性质 √(a²) = |a|：<br>√(−5)² = √25 = |−5| = 5<br><br>注意：√(a²) 的结果一定是非负数，所以不是 −5 也不是 ±5。"
      },
      {
        type: "化简",
        text: '化简 <span class="math">√48</span> 的结果是：',
        options: [
          "<span class='math'>4√3</span>",
          "<span class='math'>2√12</span>",
          "<span class='math'>6√2</span>",
          "<span class='math'>8√3</span>"
        ],
        answer: 0,
        hint: "将被开方数分解因数，找出最大的完全平方因数：48 = 16 × 3。",
        explanation: "√48 = √(16 × 3) = √16 × √3 = 4√3<br><br>化简步骤：先将 48 分解为 16 × 3（16 是最大的完全平方因数），然后利用 √(ab) = √a · √b 进行化简。"
      },
      {
        type: "加减运算",
        text: '计算 <span class="math">3√2 + 5√2 − 2√2</span> 的结果是：',
        options: [
          "<span class='math'>6√2</span>",
          "<span class='math'>6√6</span>",
          "<span class='math'>8√2</span>",
          "<span class='math'>6</span>"
        ],
        answer: 0,
        hint: "同类二次根式（被开方数相同）可以合并，就像合并同类项一样，系数相加减。",
        explanation: "3√2 + 5√2 − 2√2<br>= (3 + 5 − 2)√2<br>= 6√2<br><br>这三个都是同类二次根式（被开方数都是 2），可以直接合并系数。"
      },
      {
        type: "乘法运算",
        text: '计算 <span class="math">√6 × √3</span> 的结果是：',
        options: [
          "<span class='math'>3</span>",
          "<span class='math'>3√2</span>",
          "<span class='math'>√9</span>",
          "<span class='math'>9</span>"
        ],
        answer: 1,
        hint: "利用二次根式的乘法法则：√a × √b = √(a×b)，然后化简结果。",
        explanation: "√6 × √3 = √(6 × 3) = √18<br>= √(9 × 2) = √9 × √2 = 3√2<br><br>先利用 √a · √b = √(ab) 合并，再化简。"
      },
      {
        type: "除法运算",
        text: '计算 <span class="math">√12 ÷ √3</span> 的结果是：',
        options: [
          "<span class='math'>√3</span>",
          "<span class='math'>2</span>",
          "<span class='math'>4</span>",
          "<span class='math'>√4</span>"
        ],
        answer: 1,
        hint: "利用二次根式的除法法则：√a ÷ √b = √(a÷b)。",
        explanation: "√12 ÷ √3 = √(12 ÷ 3) = √4 = 2<br><br>注意：选项 D 的 √4 虽然等于 2，但还没有化简到最终结果，所以正确答案是化简后的 2。"
      },
      {
        type: "分母有理化",
        text: '将 <span class="math">6 / √3</span> 进行分母有理化，结果是：',
        options: [
          "<span class='math'>2√3</span>",
          "<span class='math'>6√3</span>",
          "<span class='math'>3√2</span>",
          "<span class='math'>√3 / 6</span>"
        ],
        answer: 0,
        hint: "分母有理化：分子分母同时乘以 √3，使分母变为有理数。",
        explanation: "6 / √3 = (6 × √3) / (√3 × √3)<br>= 6√3 / 3<br>= 2√3<br><br>分母有理化的关键：分子分母同乘以分母中的根式。"
      },
      {
        type: "最简根式",
        text: '下列二次根式中，是最简二次根式的是：',
        options: [
          "<span class='math'>√12</span>",
          "<span class='math'>√(1/2)</span>",
          "<span class='math'>√8</span>",
          "<span class='math'>√5</span>"
        ],
        answer: 3,
        hint: "最简二次根式需满足：① 被开方数不含分母；② 被开方数中不含能开得尽的因数或因式。",
        explanation: "√12 = 2√3（含完全平方因数 4）❌<br>√(1/2) = √2/2（被开方数含分母）❌<br>√8 = 2√2（含完全平方因数 4）❌<br>√5 被开方数为 5，不含完全平方因数，也不含分母 ✅<br><br>只有 √5 是最简二次根式。"
      },
      {
        type: "综合运算",
        text: '计算 <span class="math">(√3 + √2)(√3 − √2)</span> 的结果是：',
        options: [
          "<span class='math'>1</span>",
          "<span class='math'>5</span>",
          "<span class='math'>√5</span>",
          "<span class='math'>7</span>"
        ],
        answer: 0,
        hint: "利用平方差公式：(a + b)(a − b) = a² − b²。",
        explanation: "利用平方差公式 (a + b)(a − b) = a² − b²：<br>(√3 + √2)(√3 − √2)<br>= (√3)² − (√2)²<br>= 3 − 2<br>= 1<br><br>这是二次根式中平方差公式的经典应用。"
      }
    ];

    let currentQ = 0;
    let score = 0;
    let streakCount = 0;
    let maxStreakCount = 0;
    let correctTotal = 0;
    let wrongTotal = 0;
    let answers = [];
    let answered = false;

    function renderQuestion() {
      const q = questions[currentQ];
      answered = false;

      document.getElementById("qNumber").textContent = `第 ${currentQ + 1} 题`;
      document.getElementById("qType").textContent = q.type;
      document.getElementById("qText").innerHTML = q.text;

      const grid = document.getElementById("optionsGrid");
      grid.innerHTML = "";
      const labels = ["A", "B", "C", "D"];
      q.options.forEach((opt, i) => {
        const btn = document.createElement("button");
        btn.className = "option-btn";
        btn.innerHTML = `<span class="option-label">${labels[i]}</span>${opt}`;
        btn.onclick = () => selectAnswer(i);
        grid.appendChild(btn);
      });

      document.getElementById("feedback").className = "feedback-area";
      document.getElementById("feedback").innerHTML = "";
      document.getElementById("nextBtn").disabled = true;
      document.getElementById("hintBtn").disabled = false;
      document.getElementById("hintBtn").textContent = "提示 💡";

      document.getElementById("questionCard").className = "question-card";
    }

    function selectAnswer(idx) {
      if (answered) return;
      answered = true;

      const q = questions[currentQ];
      const btns = document.querySelectorAll(".option-btn");
      const feedback = document.getElementById("feedback");
      const card = document.getElementById("questionCard");

      btns.forEach((btn, i) => {
        btn.classList.add("disabled");
        if (i === q.answer) btn.classList.add("correct");
        if (i === idx && idx !== q.answer) btn.classList.add("wrong");
      });

      if (idx === q.answer) {
        const points = 10 + streakCount * 2;
        score += points;
        streakCount++;
        correctTotal++;
        if (streakCount > maxStreakCount) maxStreakCount = streakCount;

        card.classList.add("correct-flash");
        feedback.className = "feedback-area show correct-feedback";
        feedback.innerHTML = `✅ <strong>回答正确！+${points} 分</strong><br>${q.explanation}`;
        showScoreFloat(points);

        if (streakCount === 3) showAchievement("🔥 三连击！");
        if (streakCount === 5) showAchievement("⚡ 五连击！太强了！");
        if (correctTotal === 10) showAchievement("🏆 全部答对！完美！");

        answers.push({ correct: true, qIdx: currentQ });
      } else {
        streakCount = 0;
        wrongTotal++;

        card.classList.add("wrong-flash");
        feedback.className = "feedback-area show wrong-feedback";
        feedback.innerHTML = `❌ <strong>回答错误</strong>，正确答案是 <strong>${["A","B","C","D"][q.answer]}</strong><br>${q.explanation}`;

        answers.push({ correct: false, qIdx: currentQ, chose: idx });
      }

      updateStats();
      document.getElementById("nextBtn").disabled = false;
      document.getElementById("hintBtn").disabled = true;
    }

    function showHint() {
      const q = questions[currentQ];
      const feedback = document.getElementById("feedback");
      feedback.className = "feedback-area show";
      feedback.style.background = "rgba(245,158,11,0.1)";
      feedback.style.borderColor = "rgba(245,158,11,0.3)";
      feedback.style.color = "#fbbf24";
      feedback.innerHTML = `💡 <strong>提示：</strong>${q.hint}`;
      document.getElementById("hintBtn").disabled = true;
      document.getElementById("hintBtn").textContent = "已提示";
    }

    function nextQuestion() {
      currentQ++;
      if (currentQ >= questions.length) {
        showResults();
        return;
      }
      renderQuestion();
      updateStats();
    }

    function updateStats() {
      document.getElementById("score").textContent = score;
      document.getElementById("streak").textContent = streakCount;
      document.getElementById("progressText").textContent = `${Math.min(currentQ + 1, questions.length)}/10`;
      document.getElementById("progressBar").style.width = `${((currentQ + (answered ? 1 : 0)) / questions.length) * 100}%`;
    }

    function showResults() {
      document.getElementById("quizArea").style.display = "none";
      document.getElementById("resultCard").style.display = "block";

      const pct = Math.round((correctTotal / questions.length) * 100);
      document.getElementById("finalScore").textContent = score;
      document.getElementById("accuracy").textContent = `正确率: ${pct}%`;
      document.getElementById("correctCount").textContent = correctTotal;
      document.getElementById("wrongCount").textContent = wrongTotal;
      document.getElementById("maxStreak").textContent = maxStreakCount;

      let rating;
      if (pct === 100) rating = "🏆 完美！你是二次根式大师！";
      else if (pct >= 80) rating = "⭐ 优秀！掌握得很好！";
      else if (pct >= 60) rating = "👍 不错！继续加油！";
      else if (pct >= 40) rating = "💪 还需要多练习！";
      else rating = "📖 建议复习一下二次根式的知识点";
      document.getElementById("rating").textContent = rating;

      if (pct === 100) {
        document.getElementById("resultTitle").textContent = "🎉 满分通关！";
        celebrateConfetti();
      }

      const reviewList = document.getElementById("reviewList");
      reviewList.innerHTML = "";
      answers.forEach((a, i) => {
        const q = questions[a.qIdx];
        const div = document.createElement("div");
        div.className = `review-item ${a.correct ? "review-correct" : "review-wrong"}`;
        div.innerHTML = `
          <div class="review-q">第 ${i + 1} 题 [${q.type}]：${a.correct ? "✅ 正确" : "❌ 错误"}</div>
          <div class="review-a">${a.correct ? "" : "你选了 " + ["A","B","C","D"][a.chose] + " | "}正确答案：${["A","B","C","D"][q.answer]}. ${q.options[q.answer]}</div>
        `;
        reviewList.appendChild(div);
      });
    }

    function restartQuiz() {
      currentQ = 0;
      score = 0;
      streakCount = 0;
      maxStreakCount = 0;
      correctTotal = 0;
      wrongTotal = 0;
      answers = [];
      answered = false;

      document.getElementById("quizArea").style.display = "block";
      document.getElementById("resultCard").style.display = "none";
      renderQuestion();
      updateStats();
    }

    function showScoreFloat(pts) {
      const el = document.createElement("div");
      el.className = "score-float";
      el.textContent = `+${pts}`;
      el.style.left = `${window.innerWidth / 2 - 30}px`;
      el.style.top = `${window.innerHeight / 2 - 50}px`;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1200);
    }

    function showAchievement(text) {
      const popup = document.createElement("div");
      popup.className = "achievement-popup";
      popup.textContent = text;
      document.body.appendChild(popup);
      requestAnimationFrame(() => popup.classList.add("show"));
      setTimeout(() => {
        popup.classList.remove("show");
        setTimeout(() => popup.remove(), 500);
      }, 2500);
    }

    function celebrateConfetti() {
      const canvas = document.createElement("canvas");
      canvas.className = "confetti-canvas";
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      document.body.appendChild(canvas);
      const ctx = canvas.getContext("2d");

      const colors = ["#ef4444","#f59e0b","#22c55e","#3b82f6","#a855f7","#ec4899"];
      const pieces = Array.from({ length: 80 }, () => ({
        x: Math.random() * canvas.width,
        y: -20 - Math.random() * 100,
        vx: (Math.random() - 0.5) * 6,
        vy: Math.random() * 3 + 2,
        color: colors[Math.floor(Math.random() * colors.length)],
        size: Math.random() * 8 + 4,
        rot: Math.random() * 360,
        rotSpeed: (Math.random() - 0.5) * 12
      }));

      let frame = 0;
      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let active = 0;
        pieces.forEach(p => {
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.08;
          p.rot += p.rotSpeed;
          if (p.y < canvas.height + 20) {
            active++;
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rot * Math.PI / 180);
            ctx.fillStyle = p.color;
            ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
            ctx.restore();
          }
        });
        frame++;
        if (active > 0 && frame < 300) requestAnimationFrame(animate);
        else canvas.remove();
      }
      animate();
    }

    // 初始化
    renderQuestion();
    updateStats();
  </script>
</body>
</html>
