<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>一次函数练习 - 八年级数学</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      color: #e0e0e0;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }
    .header h1 {
      font-size: 2.4em;
      background: linear-gradient(135deg, #e2b714, #f7971e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .header p { color: #8892b0; font-size: 1.1em; }

    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 25px;
      flex-wrap: wrap;
    }
    .stat-box {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      padding: 12px 24px;
      border-radius: 14px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.1);
      min-width: 100px;
    }
    .stat-box .label { font-size: 0.85em; color: #8892b0; margin-bottom: 4px; }
    .stat-box .value { font-size: 1.6em; font-weight: bold; }
    .stat-box .value.score { color: #e2b714; }
    .stat-box .value.streak { color: #f97316; }
    .stat-box .value.progress { color: #22d3ee; }

    .progress-bar-container {
      width: 100%;
      height: 10px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      margin-bottom: 25px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #22d3ee, #6366f1);
      border-radius: 10px;
      transition: width 0.5s ease;
    }

    .question-card {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 35px;
      margin-bottom: 20px;
      transition: all 0.3s ease;
    }
    .question-card.correct-flash {
      border-color: #22c55e;
      box-shadow: 0 0 30px rgba(34,197,94,0.2);
    }
    .question-card.wrong-flash {
      border-color: #ef4444;
      box-shadow: 0 0 30px rgba(239,68,68,0.2);
    }

    .question-number {
      display: inline-block;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      padding: 5px 16px;
      border-radius: 20px;
      font-size: 0.9em;
      font-weight: bold;
      margin-bottom: 15px;
    }
    .question-type {
      display: inline-block;
      background: rgba(226,183,20,0.15);
      color: #e2b714;
      padding: 4px 12px;
      border-radius: 10px;
      font-size: 0.8em;
      margin-left: 8px;
    }

    .question-text {
      font-size: 1.25em;
      line-height: 1.8;
      margin-bottom: 20px;
      color: #f0f0f0;
    }
    .question-text .math {
      font-family: 'Cambria Math', 'Times New Roman', serif;
      font-style: italic;
      color: #93c5fd;
    }

    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 15px;
    }
    @media (max-width: 600px) {
      .options-grid { grid-template-columns: 1fr; }
    }

    .option-btn {
      background: rgba(255,255,255,0.05);
      border: 2px solid rgba(255,255,255,0.12);
      color: #e0e0e0;
      padding: 14px 20px;
      border-radius: 12px;
      font-size: 1.05em;
      cursor: pointer;
      transition: all 0.25s ease;
      text-align: left;
    }
    .option-btn:hover:not(.disabled) {
      background: rgba(99,102,241,0.15);
      border-color: #6366f1;
      transform: translateY(-2px);
    }
    .option-btn.selected {
      background: rgba(99,102,241,0.25);
      border-color: #6366f1;
    }
    .option-btn.correct {
      background: rgba(34,197,94,0.2);
      border-color: #22c55e;
      color: #86efac;
    }
    .option-btn.wrong {
      background: rgba(239,68,68,0.2);
      border-color: #ef4444;
      color: #fca5a5;
    }
    .option-btn.disabled { cursor: default; opacity: 0.7; }
    .option-btn .option-label {
      display: inline-block;
      background: rgba(255,255,255,0.1);
      width: 28px;
      height: 28px;
      line-height: 28px;
      text-align: center;
      border-radius: 50%;
      margin-right: 10px;
      font-weight: bold;
      font-size: 0.9em;
    }

    .feedback-area {
      min-height: 50px;
      margin-top: 15px;
      padding: 15px;
      border-radius: 12px;
      display: none;
      line-height: 1.7;
    }
    .feedback-area.show { display: block; }
    .feedback-area.correct-feedback {
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.3);
      color: #86efac;
    }
    .feedback-area.wrong-feedback {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
    }

    .nav-buttons {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 20px;
    }
    .nav-btn {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      border: none;
      padding: 14px 36px;
      font-size: 1.1em;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.25s ease;
    }
    .nav-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(99,102,241,0.4); }
    .nav-btn:active { transform: translateY(0); }
    .nav-btn:disabled { opacity: 0.4; cursor: default; transform: none; box-shadow: none; }
    .nav-btn.hint-btn {
      background: linear-gradient(135deg, #f59e0b, #d97706);
    }
    .nav-btn.hint-btn:hover { box-shadow: 0 8px 25px rgba(245,158,11,0.4); }

    .canvas-area {
      width: 100%;
      height: 300px;
      background: #0d1117;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      margin: 15px 0;
    }

    .result-card {
      display: none;
      text-align: center;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 50px 35px;
    }
    .result-card h2 { font-size: 2.2em; margin-bottom: 10px; }
    .result-card .big-score {
      font-size: 4em;
      font-weight: bold;
      background: linear-gradient(135deg, #e2b714, #f7971e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 15px 0;
    }
    .result-card .accuracy { font-size: 1.3em; color: #8892b0; margin-bottom: 20px; }
    .result-card .rating { font-size: 1.8em; margin: 15px 0; }
    .result-card .details {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin: 25px 0;
    }
    .result-card .detail-item {
      background: rgba(255,255,255,0.05);
      padding: 15px;
      border-radius: 12px;
    }
    .result-card .detail-item .d-label { font-size: 0.85em; color: #8892b0; }
    .result-card .detail-item .d-value { font-size: 1.5em; font-weight: bold; margin-top: 5px; }

    .review-section {
      margin-top: 30px;
      text-align: left;
    }
    .review-section h3 { margin-bottom: 15px; font-size: 1.3em; }
    .review-item {
      background: rgba(255,255,255,0.04);
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 12px;
      border-left: 4px solid;
    }
    .review-item.review-correct { border-left-color: #22c55e; }
    .review-item.review-wrong { border-left-color: #ef4444; }
    .review-item .review-q { font-weight: bold; margin-bottom: 6px; }
    .review-item .review-a { font-size: 0.95em; color: #8892b0; }

    .confetti-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
    }

    .achievement-popup {
      position: fixed;
      top: 20px;
      right: 20px;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: #1a1a2e;
      padding: 18px 28px;
      border-radius: 14px;
      font-weight: bold;
      font-size: 1.1em;
      box-shadow: 0 10px 40px rgba(245,158,11,0.4);
      transform: translateX(400px);
      transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 1000;
    }
    .achievement-popup.show { transform: translateX(0); }

    .score-float {
      position: fixed;
      font-size: 1.8em;
      font-weight: bold;
      color: #e2b714;
      pointer-events: none;
      z-index: 1000;
      text-shadow: 0 2px 10px rgba(226,183,20,0.5);
      animation: floatUp 1.2s ease-out forwards;
    }
    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-80px) scale(1.3); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>一次函数专项练习</h1>
      <p>八年级数学 | 10 道精选题目 | 互动学习</p>
    </div>

    <div class="stats-bar">
      <div class="stat-box">
        <div class="label">得分</div>
        <div class="value score" id="score">0</div>
      </div>
      <div class="stat-box">
        <div class="label">连击</div>
        <div class="value streak" id="streak">0</div>
      </div>
      <div class="stat-box">
        <div class="label">进度</div>
        <div class="value progress" id="progressText">0/10</div>
      </div>
    </div>

    <div class="progress-bar-container">
      <div class="progress-bar-fill" id="progressBar" style="width: 0%"></div>
    </div>

    <div id="quizArea">
      <div class="question-card" id="questionCard">
        <div>
          <span class="question-number" id="qNumber">第 1 题</span>
          <span class="question-type" id="qType">概念</span>
        </div>
        <div class="question-text" id="qText"></div>
        <canvas class="canvas-area" id="graphCanvas" style="display:none"></canvas>
        <div class="options-grid" id="optionsGrid"></div>
        <div class="feedback-area" id="feedback"></div>
        <div class="nav-buttons">
          <button class="nav-btn hint-btn" id="hintBtn" onclick="showHint()">提示 💡</button>
          <button class="nav-btn" id="nextBtn" onclick="nextQuestion()" disabled>下一题 →</button>
        </div>
      </div>
    </div>

    <div class="result-card" id="resultCard">
      <h2 id="resultTitle">练习完成！</h2>
      <div class="big-score" id="finalScore">0</div>
      <div class="accuracy" id="accuracy">正确率: 0%</div>
      <div class="rating" id="rating"></div>
      <div class="details">
        <div class="detail-item">
          <div class="d-label">正确</div>
          <div class="d-value" id="correctCount" style="color:#22c55e">0</div>
        </div>
        <div class="detail-item">
          <div class="d-label">错误</div>
          <div class="d-value" id="wrongCount" style="color:#ef4444">0</div>
        </div>
        <div class="detail-item">
          <div class="d-label">最长连击</div>
          <div class="d-value" id="maxStreak" style="color:#f97316">0</div>
        </div>
      </div>
      <button class="nav-btn" onclick="restartQuiz()" style="margin-top: 10px">重新练习 🔄</button>
      <div class="review-section" id="reviewSection">
        <h3>答题回顾</h3>
        <div id="reviewList"></div>
      </div>
    </div>
  </div>

  <script>
    const questions = [
      {
        type: "概念理解",
        text: '一次函数 <span class="math">y = kx + b</span> 中，当 <span class="math">k &lt; 0</span>，<span class="math">b &gt; 0</span> 时，函数图像经过哪几个象限？',
        options: ["第一、二、三象限", "第一、二、四象限", "第一、三、四象限", "第二、三、四象限"],
        answer: 1,
        hint: "k < 0 表示直线从左往右下降，b > 0 表示直线与 y 轴的交点在原点上方。",
        explanation: "当 k < 0 时，y 随 x 增大而减小，图像从左上向右下倾斜；b > 0 表示与 y 轴交于正半轴。所以图像经过第一、二、四象限。",
        showGraph: true,
        graphFn: (ctx, w, h) => drawLinearGraph(ctx, w, h, -1, 2, "#93c5fd")
      },
      {
        type: "求解析式",
        text: '已知一次函数 <span class="math">y = kx + b</span> 的图像经过点 <span class="math">A(2, 5)</span> 和点 <span class="math">B(-1, -1)</span>，求该函数的解析式。',
        options: [
          "<span class='math'>y = 2x + 1</span>",
          "<span class='math'>y = 3x - 1</span>",
          "<span class='math'>y = 2x - 1</span>",
          "<span class='math'>y = x + 3</span>"
        ],
        answer: 0,
        hint: "将两个点的坐标分别代入 y = kx + b，得到关于 k 和 b 的方程组。",
        explanation: "代入 A(2,5)：5 = 2k + b ①<br>代入 B(-1,-1)：-1 = -k + b ②<br>① - ②：6 = 3k，所以 k = 2<br>代入 ②：b = k - 1 = 1<br>所以 y = 2x + 1",
        showGraph: true,
        graphFn: (ctx, w, h) => {
          drawLinearGraph(ctx, w, h, 2, 1, "#93c5fd");
          drawPoint(ctx, w, h, 2, 5, "A(2,5)");
          drawPoint(ctx, w, h, -1, -1, "B(-1,-1)");
        }
      },
      {
        type: "图像性质",
        text: '将一次函数 <span class="math">y = 3x - 2</span> 的图像向上平移 4 个单位，得到的函数解析式是什么？',
        options: [
          "<span class='math'>y = 3x + 2</span>",
          "<span class='math'>y = 3x - 6</span>",
          "<span class='math'>y = 7x - 2</span>",
          "<span class='math'>y = 3x + 4</span>"
        ],
        answer: 0,
        hint: "图像上下平移只改变截距 b，不改变斜率 k。向上平移 n 个单位，b 增加 n。",
        explanation: "向上平移 4 个单位：y = 3x - 2 + 4 = 3x + 2<br>平移只改变 b 值，k 不变。",
        showGraph: true,
        graphFn: (ctx, w, h) => {
          drawLinearGraph(ctx, w, h, 3, -2, "rgba(147,197,253,0.4)");
          drawLinearGraph(ctx, w, h, 3, 2, "#93c5fd");
          drawLabel(ctx, w, h, 1.5, 2.5, "y=3x-2", "rgba(147,197,253,0.5)");
          drawLabel(ctx, w, h, -0.5, 1, "y=3x+2", "#93c5fd");
        }
      },
      {
        type: "求交点",
        text: '一次函数 <span class="math">y = 2x + 1</span> 与 <span class="math">y = -x + 4</span> 的交点坐标是多少？',
        options: ["(1, 3)", "(2, 5)", "(3, 1)", "(0, 4)"],
        answer: 0,
        hint: "交点就是两个方程的公共解，令两个函数值相等：2x + 1 = -x + 4。",
        explanation: "令 2x + 1 = -x + 4<br>3x = 3，x = 1<br>y = 2(1) + 1 = 3<br>交点坐标为 (1, 3)",
        showGraph: true,
        graphFn: (ctx, w, h) => {
          drawLinearGraph(ctx, w, h, 2, 1, "#93c5fd");
          drawLinearGraph(ctx, w, h, -1, 4, "#f9a8d4");
          drawPoint(ctx, w, h, 1, 3, "(1,3)");
        }
      },
      {
        type: "k 和 b 的意义",
        text: '已知一次函数 <span class="math">y = kx + b</span> 的图像如图所示（过第二、三、四象限），则下列结论正确的是：',
        options: ["k > 0, b > 0", "k > 0, b < 0", "k < 0, b > 0", "k < 0, b < 0"],
        answer: 3,
        hint: "图像过第二、三、四象限意味着：直线从左上到右下倾斜（k < 0），且与 y 轴交于负半轴（b < 0）。",
        explanation: "过第二、三、四象限：<br>· 经过第二、四象限 → 直线从左上到右下 → k < 0<br>· 经过第三象限且不经过第一象限 → 与 y 轴交于负半轴 → b < 0<br>所以 k < 0, b < 0",
        showGraph: true,
        graphFn: (ctx, w, h) => drawLinearGraph(ctx, w, h, -1.5, -1, "#93c5fd")
      },
      {
        type: "实际应用",
        text: '小明从家出发匀速步行去学校，他离家的距离 <span class="math">y</span>（千米）与时间 <span class="math">x</span>（分钟）之间满足 <span class="math">y = 0.08x</span>。当 <span class="math">x = 25</span> 分钟时，小明离家多远？',
        options: ["1.5 千米", "2 千米", "2.5 千米", "3 千米"],
        answer: 1,
        hint: "这是一个正比例函数，直接将 x = 25 代入 y = 0.08x 即可。",
        explanation: "y = 0.08 × 25 = 2（千米）<br>小明在 25 分钟后离家 2 千米。",
        showGraph: false
      },
      {
        type: "增减性",
        text: '一次函数 <span class="math">y = -2x + 6</span>，当 <span class="math">x</span> 取何值时，<span class="math">y &gt; 0</span>？',
        options: [
          "<span class='math'>x &lt; 3</span>",
          "<span class='math'>x &gt; 3</span>",
          "<span class='math'>x &lt; -3</span>",
          "<span class='math'>x &gt; -3</span>"
        ],
        answer: 0,
        hint: "令 y > 0，即 -2x + 6 > 0，解这个不等式。",
        explanation: "-2x + 6 > 0<br>-2x > -6<br>x < 3（注意两边除以负数要变号）<br>当 x < 3 时，y > 0",
        showGraph: true,
        graphFn: (ctx, w, h) => {
          drawLinearGraph(ctx, w, h, -2, 6, "#93c5fd");
          drawPoint(ctx, w, h, 3, 0, "(3,0)");
        }
      },
      {
        type: "平行线",
        text: '已知直线 <span class="math">y = 2x + 3</span> 与直线 <span class="math">y = ax - 1</span> 平行，则 <span class="math">a</span> 的值为：',
        options: ["2", "-2", "3", "1/2"],
        answer: 0,
        hint: "两条直线平行的条件是：斜率相等且截距不等，即 k₁ = k₂ 且 b₁ ≠ b₂。",
        explanation: "两直线平行 ⇔ 斜率相等且截距不等<br>y = 2x + 3 的斜率 k₁ = 2<br>y = ax - 1 的斜率 k₂ = a<br>平行条件：a = 2（且 3 ≠ -1，成立）<br>所以 a = 2",
        showGraph: true,
        graphFn: (ctx, w, h) => {
          drawLinearGraph(ctx, w, h, 2, 3, "#93c5fd");
          drawLinearGraph(ctx, w, h, 2, -1, "#f9a8d4");
          drawLabel(ctx, w, h, 0.5, 4.5, "y=2x+3", "#93c5fd");
          drawLabel(ctx, w, h, 1.5, 1.5, "y=2x-1", "#f9a8d4");
        }
      },
      {
        type: "截距",
        text: '一次函数 <span class="math">y = -3x + 9</span> 与 x 轴的交点坐标和与 y 轴的交点坐标分别是什么？',
        options: ["(3, 0) 和 (0, 9)", "(9, 0) 和 (0, 3)", "(-3, 0) 和 (0, 9)", "(3, 0) 和 (0, -9)"],
        answer: 0,
        hint: "与 x 轴的交点令 y = 0 求 x；与 y 轴的交点令 x = 0 求 y。",
        explanation: "与 x 轴交点：令 y = 0，-3x + 9 = 0，x = 3 → (3, 0)<br>与 y 轴交点：令 x = 0，y = 9 → (0, 9)",
        showGraph: true,
        graphFn: (ctx, w, h) => {
          drawLinearGraph(ctx, w, h, -3, 9, "#93c5fd");
          drawPoint(ctx, w, h, 3, 0, "(3,0)");
          drawPoint(ctx, w, h, 0, 9, "(0,9)");
        }
      },
      {
        type: "综合",
        text: '已知一次函数 <span class="math">y = kx + b</span> 经过点 <span class="math">(1, 2)</span>，且与正比例函数 <span class="math">y = -3x</span> 的图像平行，求 <span class="math">k + b</span> 的值。',
        options: ["2", "5", "-3", "0"],
        answer: 0,
        hint: "与 y = -3x 平行，说明 k = -3。再利用经过点 (1, 2) 求 b。",
        explanation: "与 y = -3x 平行 → k = -3<br>经过 (1, 2)：2 = -3(1) + b → b = 5<br>k + b = -3 + 5 = 2",
        showGraph: true,
        graphFn: (ctx, w, h) => {
          drawLinearGraph(ctx, w, h, -3, 0, "rgba(147,197,253,0.4)");
          drawLinearGraph(ctx, w, h, -3, 5, "#93c5fd");
          drawPoint(ctx, w, h, 1, 2, "(1,2)");
        }
      }
    ];

    let currentQ = 0;
    let score = 0;
    let streakCount = 0;
    let maxStreakCount = 0;
    let correctTotal = 0;
    let wrongTotal = 0;
    let answers = [];
    let answered = false;

    function drawLinearGraph(ctx, w, h, k, b, color) {
      const cx = w / 2, cy = h / 2;
      const scale = Math.min(w, h) / 14;

      ctx.strokeStyle = "rgba(255,255,255,0.08)";
      ctx.lineWidth = 1;
      for (let i = -6; i <= 6; i++) {
        ctx.beginPath();
        ctx.moveTo(cx + i * scale, 0);
        ctx.lineTo(cx + i * scale, h);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, cy + i * scale);
        ctx.lineTo(w, cy + i * scale);
        ctx.stroke();
      }

      ctx.strokeStyle = "rgba(255,255,255,0.3)";
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(w, cy); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, h); ctx.stroke();

      ctx.fillStyle = "rgba(255,255,255,0.4)";
      ctx.font = "12px sans-serif";
      ctx.textAlign = "center";
      for (let i = -6; i <= 6; i++) {
        if (i === 0) continue;
        ctx.fillText(i, cx + i * scale, cy + 16);
        ctx.fillText(i, cx - 18, cy - i * scale + 4);
      }
      ctx.fillText("O", cx - 12, cy + 16);
      ctx.fillText("x", w - 12, cy + 16);
      ctx.fillText("y", cx + 10, 14);

      ctx.strokeStyle = color;
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      for (let px = 0; px < w; px++) {
        const x = (px - cx) / scale;
        const y = k * x + b;
        const py = cy - y * scale;
        if (px === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.stroke();
    }

    function drawPoint(ctx, w, h, x, y, label) {
      const cx = w / 2, cy = h / 2;
      const scale = Math.min(w, h) / 14;
      const px = cx + x * scale;
      const py = cy - y * scale;

      ctx.fillStyle = "#f59e0b";
      ctx.beginPath();
      ctx.arc(px, py, 5, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#fbbf24";
      ctx.font = "bold 13px sans-serif";
      ctx.textAlign = "left";
      ctx.fillText(label, px + 8, py - 8);
    }

    function drawLabel(ctx, w, h, x, y, text, color) {
      const cx = w / 2, cy = h / 2;
      const scale = Math.min(w, h) / 14;
      const px = cx + x * scale;
      const py = cy - y * scale;
      ctx.fillStyle = color;
      ctx.font = "bold 13px sans-serif";
      ctx.textAlign = "left";
      ctx.fillText(text, px, py);
    }

    function renderQuestion() {
      const q = questions[currentQ];
      answered = false;

      document.getElementById("qNumber").textContent = `第 ${currentQ + 1} 题`;
      document.getElementById("qType").textContent = q.type;
      document.getElementById("qText").innerHTML = q.text;

      const canvas = document.getElementById("graphCanvas");
      if (q.showGraph) {
        canvas.style.display = "block";
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        const ctx = canvas.getContext("2d");
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        q.graphFn(ctx, canvas.width, canvas.height);
      } else {
        canvas.style.display = "none";
      }

      const grid = document.getElementById("optionsGrid");
      grid.innerHTML = "";
      const labels = ["A", "B", "C", "D"];
      q.options.forEach((opt, i) => {
        const btn = document.createElement("button");
        btn.className = "option-btn";
        btn.innerHTML = `<span class="option-label">${labels[i]}</span>${opt}`;
        btn.onclick = () => selectAnswer(i);
        grid.appendChild(btn);
      });

      document.getElementById("feedback").className = "feedback-area";
      document.getElementById("feedback").innerHTML = "";
      document.getElementById("nextBtn").disabled = true;
      document.getElementById("hintBtn").disabled = false;
      document.getElementById("hintBtn").textContent = "提示 💡";

      document.getElementById("questionCard").className = "question-card";
    }

    function selectAnswer(idx) {
      if (answered) return;
      answered = true;

      const q = questions[currentQ];
      const btns = document.querySelectorAll(".option-btn");
      const feedback = document.getElementById("feedback");
      const card = document.getElementById("questionCard");

      btns.forEach((btn, i) => {
        btn.classList.add("disabled");
        if (i === q.answer) btn.classList.add("correct");
        if (i === idx && idx !== q.answer) btn.classList.add("wrong");
      });

      if (idx === q.answer) {
        const points = 10 + streakCount * 2;
        score += points;
        streakCount++;
        correctTotal++;
        if (streakCount > maxStreakCount) maxStreakCount = streakCount;

        card.classList.add("correct-flash");
        feedback.className = "feedback-area show correct-feedback";
        feedback.innerHTML = `✅ <strong>回答正确！+${points} 分</strong><br>${q.explanation}`;
        showScoreFloat(points);

        if (streakCount === 3) showAchievement("🔥 三连击！");
        if (streakCount === 5) showAchievement("⚡ 五连击！太强了！");
        if (correctTotal === 10) showAchievement("🏆 全部答对！完美！");

        answers.push({ correct: true, qIdx: currentQ });
      } else {
        streakCount = 0;
        wrongTotal++;

        card.classList.add("wrong-flash");
        feedback.className = "feedback-area show wrong-feedback";
        feedback.innerHTML = `❌ <strong>回答错误</strong>，正确答案是 <strong>${["A","B","C","D"][q.answer]}</strong><br>${q.explanation}`;

        answers.push({ correct: false, qIdx: currentQ, chose: idx });
      }

      updateStats();
      document.getElementById("nextBtn").disabled = false;
      document.getElementById("hintBtn").disabled = true;
    }

    function showHint() {
      const q = questions[currentQ];
      const feedback = document.getElementById("feedback");
      feedback.className = "feedback-area show";
      feedback.style.background = "rgba(245,158,11,0.1)";
      feedback.style.borderColor = "rgba(245,158,11,0.3)";
      feedback.style.color = "#fbbf24";
      feedback.innerHTML = `💡 <strong>提示：</strong>${q.hint}`;
      document.getElementById("hintBtn").disabled = true;
      document.getElementById("hintBtn").textContent = "已提示";
    }

    function nextQuestion() {
      currentQ++;
      if (currentQ >= questions.length) {
        showResults();
        return;
      }
      renderQuestion();
      updateStats();
    }

    function updateStats() {
      document.getElementById("score").textContent = score;
      document.getElementById("streak").textContent = streakCount;
      document.getElementById("progressText").textContent = `${Math.min(currentQ + 1, questions.length)}/10`;
      document.getElementById("progressBar").style.width = `${((currentQ + (answered ? 1 : 0)) / questions.length) * 100}%`;
    }

    function showResults() {
      document.getElementById("quizArea").style.display = "none";
      document.getElementById("resultCard").style.display = "block";

      const pct = Math.round((correctTotal / questions.length) * 100);
      document.getElementById("finalScore").textContent = score;
      document.getElementById("accuracy").textContent = `正确率: ${pct}%`;
      document.getElementById("correctCount").textContent = correctTotal;
      document.getElementById("wrongCount").textContent = wrongTotal;
      document.getElementById("maxStreak").textContent = maxStreakCount;

      let rating;
      if (pct === 100) rating = "🏆 完美！你是一次函数大师！";
      else if (pct >= 80) rating = "⭐ 优秀！掌握得很好！";
      else if (pct >= 60) rating = "👍 不错！继续加油！";
      else if (pct >= 40) rating = "💪 还需要多练习！";
      else rating = "📖 建议复习一下一次函数的知识点";
      document.getElementById("rating").textContent = rating;

      if (pct === 100) {
        document.getElementById("resultTitle").textContent = "🎉 满分通关！";
        celebrateConfetti();
      }

      const reviewList = document.getElementById("reviewList");
      reviewList.innerHTML = "";
      answers.forEach((a, i) => {
        const q = questions[a.qIdx];
        const div = document.createElement("div");
        div.className = `review-item ${a.correct ? "review-correct" : "review-wrong"}`;
        div.innerHTML = `
          <div class="review-q">第 ${i + 1} 题 [${q.type}]：${a.correct ? "✅ 正确" : "❌ 错误"}</div>
          <div class="review-a">${a.correct ? "" : "你选了 " + ["A","B","C","D"][a.chose] + " | "}正确答案：${["A","B","C","D"][q.answer]}. ${q.options[q.answer]}</div>
        `;
        reviewList.appendChild(div);
      });
    }

    function restartQuiz() {
      currentQ = 0;
      score = 0;
      streakCount = 0;
      maxStreakCount = 0;
      correctTotal = 0;
      wrongTotal = 0;
      answers = [];
      answered = false;

      document.getElementById("quizArea").style.display = "block";
      document.getElementById("resultCard").style.display = "none";
      renderQuestion();
      updateStats();
    }

    function showScoreFloat(pts) {
      const el = document.createElement("div");
      el.className = "score-float";
      el.textContent = `+${pts}`;
      el.style.left = `${window.innerWidth / 2 - 30}px`;
      el.style.top = `${window.innerHeight / 2 - 50}px`;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1200);
    }

    function showAchievement(text) {
      const popup = document.createElement("div");
      popup.className = "achievement-popup";
      popup.textContent = text;
      document.body.appendChild(popup);
      requestAnimationFrame(() => popup.classList.add("show"));
      setTimeout(() => {
        popup.classList.remove("show");
        setTimeout(() => popup.remove(), 500);
      }, 2500);
    }

    function celebrateConfetti() {
      const canvas = document.createElement("canvas");
      canvas.className = "confetti-canvas";
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      document.body.appendChild(canvas);
      const ctx = canvas.getContext("2d");

      const colors = ["#ef4444","#f59e0b","#22c55e","#3b82f6","#a855f7","#ec4899"];
      const pieces = Array.from({ length: 80 }, () => ({
        x: Math.random() * canvas.width,
        y: -20 - Math.random() * 100,
        vx: (Math.random() - 0.5) * 6,
        vy: Math.random() * 3 + 2,
        color: colors[Math.floor(Math.random() * colors.length)],
        size: Math.random() * 8 + 4,
        rot: Math.random() * 360,
        rotSpeed: (Math.random() - 0.5) * 12
      }));

      let frame = 0;
      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let active = 0;
        pieces.forEach(p => {
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.08;
          p.rot += p.rotSpeed;
          if (p.y < canvas.height + 20) {
            active++;
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rot * Math.PI / 180);
            ctx.fillStyle = p.color;
            ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
            ctx.restore();
          }
        });
        frame++;
        if (active > 0 && frame < 300) requestAnimationFrame(animate);
        else canvas.remove();
      }
      animate();
    }

    renderQuestion();
    updateStats();
  </script>
</body>
</html>
