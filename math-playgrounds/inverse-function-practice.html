<html lang="zh-CN">
<head>
  <meta charset="UTF-8">

  <style>

      -webkit-background-clip: text;

    .stats-bar {

    .stat-box {

      backdrop-filter: blur(10px);

      border-radius: 14px;
      text-align: center;

    .stat-box .value { font-size: 1.6em; font-weight: bold; }
    .stat-box .value.score { color: #e2b714; }
    .stat-box .value.streak { color: #f97316; }
    .stat-box .value.progress { color: #22d3ee; }

    .progress-bar-container {

      margin-bottom: 25px;

    .progress-bar-fill {

      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);

    .question-number {

    .question-type {
      display: inline-block;
      background: rgba(226,183,20,0.15);
      color: #e2b714;
      padding: 4px 12px;

    .question-text {

      line-height: 1.8;
      margin-bottom: 20px;

    }
    .question-text .math {
      font-family: 'Cambria Math', 'Times New Roman', serif;

      color: #93c5fd;

    .canvas-area {
      width: 100%;
      height: 320px;
      background: rgba(13,17,23,0.6);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      margin: 15px 0;
    }

    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 15px;
    }
    @media (max-width: 600px) { .options-grid { grid-template-columns: 1fr; } }

    .option-btn {
      background: rgba(255,255,255,0.05);
      border: 2px solid rgba(255,255,255,0.12);
      color: #e0e0e0;
      padding: 14px 20px;
      border-radius: 12px;
      font-size: 1.05em;
      cursor: pointer;
      transition: all 0.25s ease;
      text-align: left;

    .option-btn:hover:not(.disabled) {
      background: rgba(99,102,241,0.15);
      border-color: #6366f1;

    .option-btn.selected { background: rgba(99,102,241,0.25); border-color: #6366f1; }
    .option-btn.correct { background: rgba(34,197,94,0.2); border-color: #22c55e; color: #86efac; }
    .option-btn.wrong { background: rgba(239,68,68,0.2); border-color: #ef4444; color: #fca5a5; }
    .option-btn.disabled { cursor: default; opacity: 0.7; }
    .option-btn .option-label {
      display: inline-block;
      background: rgba(255,255,255,0.1);
      width: 28px; height: 28px;
      line-height: 28px;
      text-align: center;
      border-radius: 50%;
      margin-right: 10px;
      font-weight: bold;
      font-size: 0.9em;
    }

    .feedback-area {
      min-height: 50px;
      margin-top: 15px;
      padding: 15px;
      border-radius: 12px;
      display: none;
      line-height: 1.7;
    }
    .feedback-area.show { display: block; }
    .feedback-area.correct-feedback {
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.3);
      color: #86efac;
    }
    .feedback-area.wrong-feedback {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
    }

    .knowledge-card {
      margin-top: 15px;
      padding: 20px;
      background: rgba(34,197,94,0.08);
      border-left: 4px solid #22c55e;
      border-radius: 8px;
      display: none;
    }
    .knowledge-card h4 {
      color: #4ade80;
      font-size: 1.1em;
      margin-bottom: 10px;
    }
    .knowledge-card p {
      font-size: 0.95em;
      line-height: 1.7;
      color: #d1d5db;
    }
    .knowledge-card .math {
      font-family: 'Cambria Math', 'Times New Roman', serif;
      color: #93c5fd;
      font-style: italic;
    }

    .nav-buttons {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 20px;
    }
    .nav-btn {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      border: none;
      padding: 14px 36px;
      font-size: 1.1em;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.25s ease;
    }
    .nav-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(99,102,241,0.4); }
    .nav-btn:disabled { opacity: 0.4; cursor: default; transform: none; }
    .nav-btn.hint-btn { background: linear-gradient(135deg, #f59e0b, #d97706); }
    .nav-btn.hint-btn:hover { box-shadow: 0 8px 25px rgba(245,158,11,0.4); }

    .result-card {
      display: none;
      text-align: center;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 50px 35px;
    }
    .result-card h2 { font-size: 2.2em; margin-bottom: 10px; }
    .result-card .big-score {
      font-size: 4em;
      font-weight: bold;
      background: linear-gradient(135deg, #e2b714, #f7971e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 15px 0;
    }
    .result-card .accuracy { font-size: 1.3em; color: #8892b0; margin-bottom: 20px; }
    .result-card .rating { font-size: 1.8em; margin: 15px 0; }
    .result-card .details {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin: 25px 0;
    }
    .result-card .detail-item {
      background: rgba(255,255,255,0.05);
      padding: 15px;
      border-radius: 12px;
    }
    .result-card .detail-item .d-label { font-size: 0.85em; color: #8892b0; }
    .result-card .detail-item .d-value { font-size: 1.5em; font-weight: bold; margin-top: 5px; }

    .confetti-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 9999;
    }

    .achievement-popup {
      position: fixed;
      top: 20px;
      right: 20px;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: #1a1a2e;
      padding: 18px 28px;
      border-radius: 14px;
      font-weight: bold;
      font-size: 1.1em;
      box-shadow: 0 10px 40px rgba(245,158,11,0.4);
      transform: translateX(400px);
      transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 1000;
    }
    .achievement-popup.show { transform: translateX(0); }

    .mode-notice {
      background: rgba(99,102,241,0.15);
      border: 1px solid rgba(99,102,241,0.3);
      padding: 15px 25px;
      border-radius: 12px;
      text-align: center;
      margin-bottom: 25px;
    }
    .mode-notice a {
      color: #93c5fd;
      font-weight: bold;
      text-decoration: none;
    }
    .mode-notice a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <canvas class="confetti-canvas" id="confetti"></canvas>
  
  <div class="container">
    <div class="header">
      <h1>📝 反比例函数练习</h1>
      <p>10 道精选题 | 互动图像 | 知识点学习 | 即时反馈</p>
    </div>

    <div class="mode-notice">
      💡 想先自由探索？试试 <a href="inverse-function-explorer.html">反比例函数探索器</a> →
    </div>

    <div class="stats-bar">
      <div class="stat-box">
        <div class="label">得分</div>
        <div class="value score" id="score">0</div>
      </div>
      <div class="stat-box">
        <div class="label">正确</div>

    <div id="questions-container"></div>

    <div class="result-card" id="result">
      <h2>🎉 练习完成！</h2>
      <div class="big-score" id="final-score">0</div>

      <div class="details">
        <div class="detail-item">
          <div class="d-label">答对题数</div>

          <div class="d-label">总用时</div>
          <div class="d-value" id="final-time">0s</div>

      <button class="nav-btn" onclick="restartQuiz()">🔄 重新练习</button>

      </div>

  <script>
    // ===== 反比例函数图像绘制函数 =====
    function drawInverseGraph(ctx, w, h, k, color, dashed) {
      var cx = w / 2, cy = h / 2;
      var scale = Math.min(w, h) / 14;

      // 绘制网格
      ctx.strokeStyle = "rgba(255,255,255,0.06)";
      ctx.lineWidth = 1;
      for (var i = -7; i <= 7; i++) {
        ctx.beginPath();
        ctx.moveTo(cx + i * scale, 0);
        ctx.lineTo(cx + i * scale, h);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, cy + i * scale);
        ctx.lineTo(w, cy + i * scale);
        ctx.stroke();
      }

      // 绘制坐标轴
      ctx.strokeStyle = "rgba(255,255,255,0.4)";
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(w, cy); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, h); ctx.stroke();

      // 坐标轴标签
      ctx.fillStyle = "rgba(255,255,255,0.5)";
      ctx.font = "12px sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("x", w - 15, cy + 18);
      ctx.fillText("y", cx + 12, 18);
      ctx.fillText("O", cx - 12, cy + 16);

      // 绘制反比例函数图像（双曲线）
      ctx.strokeStyle = color;
      ctx.lineWidth = 2.5;
      if (dashed) ctx.setLineDash([5, 5]);
      else ctx.setLineDash([]);

      // 第一、三象限或第二、四象限
      ctx.beginPath();
      for (var px = 1; px <= 7; px += 0.1) {
        var x = px;
        var y = k / x;
        if (Math.abs(y) <= 7) {
          var plotX = cx + x * scale;
          var plotY = cy - y * scale;
          if (px === 1) ctx.moveTo(plotX, plotY);
          else ctx.lineTo(plotX, plotY);
        }
      }
      ctx.stroke();

      ctx.beginPath();
      for (var px = -1; px >= -7; px -= 0.1) {
        var x = px;
        var y = k / x;
        if (Math.abs(y) <= 7) {
          var plotX = cx + x * scale;
          var plotY = cy - y * scale;
          if (px === -1) ctx.moveTo(plotX, plotY);
          else ctx.lineTo(plotX, plotY);
        }
      }
      ctx.stroke();

      ctx.setLineDash([]);
    }

    function drawPoint(ctx, w, h, x, y, label, color) {
      var cx = w / 2, cy = h / 2;
      var scale = Math.min(w, h) / 14;
      var px = cx + x * scale;
      var py = cy - y * scale;

      ctx.fillStyle = color || "#f59e0b";
      ctx.beginPath();
      ctx.arc(px, py, 6, 0, Math.PI * 2);
      ctx.fill();

      if (label) {
        ctx.fillStyle = "#fbbf24";
        ctx.font = "bold 13px sans-serif";
        ctx.textAlign = "left";
        ctx.fillText(label, px + 10, py - 10);
      }
    }

    function drawRectangle(ctx, w, h, points, color) {
      var cx = w / 2, cy = h / 2;
      var scale = Math.min(w, h) / 14;
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(cx + points[0][0] * scale, cy - points[0][1] * scale);
      for (var i = 1; i < points.length; i++) {
        ctx.lineTo(cx + points[i][0] * scale, cy - points[i][1] * scale);
      }
      ctx.closePath();
      ctx.fill();
    }

    // ===== 题目数据 =====
    const questions = [
      {
        id: 1,
        question: "下列函数中，属于反比例函数的是（  ）",
        type: "概念辨析",
        options: ["y = 2x", "y = x²", "y = 3/x", "y = x + 1"],
        correct: 2,
        hint: "反比例函数的一般形式是 y = k/x（k 为常数，k ≠ 0）",
        knowledge: {
          title: "反比例函数的定义",
          content: "反比例函数的一般形式为 <span class='math'>y = k/x</span>（k 为常数，k ≠ 0）。其中 k 称为比例系数。也可以写成 <span class='math'>xy = k</span> 或 <span class='math'>y = kx⁻¹</span> 的形式。"
        },
        showGraph: false
      },
      {
        id: 2,
        question: "反比例函数 <span class='math'>y = 6/x</span> 的图像经过点（2，3），则当 <span class='math'>x = -3</span> 时，y 的值为（  ）",
        type: "计算应用",
        options: ["-2", "2", "-3", "3"],
        correct: 0,
        hint: "将 x = -3 直接代入函数解析式计算即可",
        knowledge: {
          title: "反比例函数的点坐标关系",
          content: "对于反比例函数 <span class='math'>y = k/x</span>，图像上任意一点 (x, y) 都满足 <span class='math'>xy = k</span>。已知 k = 6，当 x = -3 时，<span class='math'>y = 6/(-3) = -2</span>。"
        },
        showGraph: true,
        graphFn: function(ctx, w, h) {
          drawInverseGraph(ctx, w, h, 6, "#93c5fd", false);
          drawPoint(ctx, w, h, 2, 3, "(2,3)", "#f59e0b");
          drawPoint(ctx, w, h, -3, -2, "(-3,-2)", "#f59e0b");
        }
      },
      {
        id: 3,
        question: "反比例函数 <span class='math'>y = -4/x</span> 的图像位于（  ）",
        type: "图像性质",
        options: ["第一、三象限", "第二、四象限", "第一、二象限", "第三、四象限"],
        correct: 1,
        hint: "当 k < 0 时，图像在第二、四象限",
        knowledge: {
          title: "反比例函数图像的位置",
          content: "当 <span class='math'>k > 0</span> 时，图像位于<strong>第一、三象限</strong>；当 <span class='math'>k < 0</span> 时，图像位于<strong>第二、四象限</strong>。本题 k = -4 < 0，所以在第二、四象限。"
        },
        showGraph: true,
        graphFn: function(ctx, w, h) {
          drawInverseGraph(ctx, w, h, -4, "#f9a8d4", false);
        }
      },
      {
        id: 4,
        question: "已知反比例函数 <span class='math'>y = k/x</span> 的图像经过点 A(-2, 4)，则 k 的值为（  ）",
        type: "参数求解",
        options: ["8", "-8", "2", "-2"],
        correct: 1,
        hint: "将点坐标代入，k = x × y",
        knowledge: {
          title: "求反比例函数的比例系数",
          content: "将已知点坐标代入：<span class='math'>4 = k/(-2)</span>，解得 <span class='math'>k = -8</span>。也可以直接用 <span class='math'>k = xy = (-2) × 4 = -8</span>。"
        },
        showGraph: true,
        graphFn: function(ctx, w, h) {
          drawInverseGraph(ctx, w, h, -8, "#93c5fd", false);
          drawPoint(ctx, w, h, -2, 4, "A(-2,4)", "#f59e0b");
        }
      },
      {
        id: 5,
        question: "对于反比例函数 <span class='math'>y = 2/x</span>，当 <span class='math'>x > 0</span> 时，y 随 x 的增大而（  ）",
        type: "增减性",
        options: ["增大", "减小", "不变", "先增大后减小"],
        correct: 1,
        hint: "k > 0 时，在每个象限内 y 随 x 增大而减小",
        knowledge: {
          title: "反比例函数的增减性",
          content: "当 <span class='math'>k > 0</span> 时，在<strong>每个象限内</strong>，y 随 x 的增大而减小；当 <span class='math'>k < 0</span> 时，在每个象限内，y 随 x 的增大而增大。本题 k = 2 > 0，在第一象限内 y 随 x 增大而减小。"
        },
        showGraph: true,
        graphFn: function(ctx, w, h) {
          drawInverseGraph(ctx, w, h, 2, "#93c5fd", false);
          drawPoint(ctx, w, h, 1, 2, "(1,2)", "#f59e0b");
          drawPoint(ctx, w, h, 2, 1, "(2,1)", "#f59e0b");
          drawPoint(ctx, w, h, 4, 0.5, "(4,0.5)", "#f59e0b");
        }
      },
      {
        id: 6,
        question: "正比例函数 <span class='math'>y = 2x</span> 与反比例函数 <span class='math'>y = 8/x</span> 的图像交点坐标为（  ）",
        type: "函数交点",
        options: ["(2, 4)", "(4, 8)", "(2, 4) 和 (-2, -4)", "(4, 8) 和 (-4, -8)"],
        correct: 2,
        hint: "联立方程 2x = 8/x，解出 x 后求 y",
        knowledge: {
          title: "正比例与反比例函数的交点",
          content: "联立方程：<span class='math'>2x = 8/x</span>，得 <span class='math'>2x² = 8</span>，<span class='math'>x² = 4</span>，<span class='math'>x = ±2</span>。当 x = 2 时，y = 4；当 x = -2 时，y = -4。交点为 <strong>(2, 4) 和 (-2, -4)</strong>，关于原点对称。"
        },
        showGraph: true,
        graphFn: function(ctx, w, h) {
          // 绘制正比例函数
          var cx = w / 2, cy = h / 2;
          var scale = Math.min(w, h) / 14;
          ctx.strokeStyle = "#f9a8d4";
          ctx.lineWidth = 2.5;
          ctx.beginPath();
          ctx.moveTo(0, cy);
          ctx.lineTo(w, cy - 14 * scale);
          ctx.stroke();
          
          drawInverseGraph(ctx, w, h, 8, "#93c5fd", false);
          drawPoint(ctx, w, h, 2, 4, "(2,4)", "#f59e0b");
          drawPoint(ctx, w, h, -2, -4, "(-2,-4)", "#f59e0b");
        }
      },
      {
        id: 7,
        question: "已知点 A(x₁, y₁)、B(x₂, y₂) 在反比例函数 <span class='math'>y = 3/x</span> 的图像上，若 <span class='math'>x₁ < x₂ < 0</span>，则（  ）",
        type: "性质应用",
        options: ["y₁ < y₂", "y₁ > y₂", "y₁ = y₂", "无法确定"],
        correct: 0,
        hint: "两点都在第三象限，k > 0 时第三象限内 y 随 x 增大而减小",
        knowledge: {
          title: "反比例函数的单调性（同象限）",
          content: "k = 3 > 0，图像在第一、三象限。当 x < 0 时，两点都在第三象限。在第三象限内，y 随 x 的增大而减小。因为 <span class='math'>x₁ < x₂</span>，所以 <strong>y₁ < y₂</strong>。"
        },
        showGraph: true,
        graphFn: function(ctx, w, h) {
          drawInverseGraph(ctx, w, h, 3, "#93c5fd", false);
          drawPoint(ctx, w, h, -3, -1, "A", "#f59e0b");
          drawPoint(ctx, w, h, -1, -3, "B", "#f59e0b");
        }
      },
      {
        id: 8,
        question: "如图，点 P 在反比例函数 <span class='math'>y = k/x</span> 的图像上，过 P 作 x 轴、y 轴的垂线，垂足分别为 M、N。若矩形 PMON 的面积为 6，则 k 的值为（  ）",
        type: "几何应用",
        options: ["3", "6", "12", "无法确定"],
        correct: 1,
        hint: "矩形面积 = |x| × |y| = |xy| = |k|",
        knowledge: {
          title: "反比例函数的几何意义",
          content: "对于反比例函数 <span class='math'>y = k/x</span> 图像上任意一点 P(x, y)，过 P 作 x 轴、y 轴的垂线，所得矩形面积为 <span class='math'>|x| × |y| = |xy| = |k|</span>。本题面积为 6，所以 <span class='math'>|k| = 6</span>。由图像在第一、三象限可知 k > 0，因此 k = 6。"
        },
        showGraph: true,
        graphFn: function(ctx, w, h) {
          drawInverseGraph(ctx, w, h, 6, "#93c5fd", false);
          var cx = w / 2, cy = h / 2;
          var scale = Math.min(w, h) / 14;
          var px = cx + 3 * scale;
          var py = cy - 2 * scale;
          ctx.fillStyle = "rgba(147,197,253,0.15)";
          ctx.fillRect(cx, py, 3 * scale, -2 * scale);
          ctx.strokeStyle = "rgba(147,197,253,0.5)";
          ctx.lineWidth = 1.5;
          ctx.strokeRect(cx, py, 3 * scale, -2 * scale);
          drawPoint(ctx, w, h, 3, 2, "P(3,2)", "#f59e0b");
          ctx.fillStyle = "#93c5fd";
          ctx.font = "12px sans-serif";
          ctx.fillText("M", cx + 3 * scale, cy + 16);
          ctx.fillText("N", cx - 25, cy - 2 * scale);
          ctx.fillText("O", cx - 12, cy + 16);
        }
      },
      {
        id: 9,
        question: "矩形面积为 12，若一边长为 x，另一边长为 y，则 y 与 x 的函数关系是（  ）",
        type: "实际应用",
        options: ["y = 12x", "y = x/12", "y = 12/x", "y = 12 - x"],
        correct: 2,
        hint: "矩形面积 = 长 × 宽 = xy",
        knowledge: {
          title: "反比例函数的实际应用",
          content: "矩形面积 = 长 × 宽，即 <span class='math'>xy = 12</span>，所以 <span class='math'>y = 12/x</span>。这是典型的反比例关系：当面积一定时，一边长与另一边长成反比例。"
        },
        showGraph: true,
        graphFn: function(ctx, w, h) {
          drawInverseGraph(ctx, w, h, 12, "#93c5fd", false);
          drawPoint(ctx, w, h, 3, 4, "(3,4)", "#f59e0b");
          drawPoint(ctx, w, h, 4, 3, "(4,3)", "#f59e0b");
          drawPoint(ctx, w, h, 6, 2, "(6,2)", "#f59e0b");
        }
      },
      {
        id: 10,
        question: "反比例函数 <span class='math'>y = k/x</span> 的图像关于（  ）对称",
        type: "对称性",
        options: ["x 轴", "y 轴", "原点", "直线 y = x"],
        correct: 2,
        hint: "反比例函数是奇函数，满足 f(-x) = -f(x)",
        knowledge: {
          title: "反比例函数的对称性",
          content: "反比例函数是<strong>奇函数</strong>，满足 <span class='math'>f(-x) = -f(x)</span>，图像关于<strong>原点中心对称</strong>。同时也关于直线 y = x 和 y = -x 对称。"
        },
        showGraph: true,
        graphFn: function(ctx, w, h) {
          drawInverseGraph(ctx, w, h, 4, "#93c5fd", false);
          drawPoint(ctx, w, h, 2, 2, "A(2,2)", "#f59e0b");
          drawPoint(ctx, w, h, -2, -2, "A'(-2,-2)", "#f9a8d4");
        }
      }
    ];

    let currentQuestion = 0;
    let score = 0;
    let correctCount = 0;
    let streak = 0;
    let maxStreak = 0;
    let answered = false;
    let startTime = Date.now();

    function renderQuestions() {
      const container = document.getElementById('questions-container');
      container.innerHTML = '';
      
      questions.forEach((q, index) => {
        const card = document.createElement('div');
        card.className = `question-card ${index === 0 ? 'active' : ''}`;
        card.id = `question-${index}`;
        card.style.display = index === 0 ? 'block' : 'none';
        card.innerHTML = `
          <div class="question-number">第 ${index + 1} 题</div>
          <span class="question-type">${q.type}</span>
          <div class="question-text">${q.question}</div>
          ${q.showGraph ? `<canvas class="canvas-area" id="canvas-${index}"></canvas>` : ''}
          <div class="options-grid">
            ${q.options.map((opt, i) => `
              <button class="option-btn" onclick="selectOption(${index}, ${i})">
                <span class="option-label">${String.fromCharCode(65 + i)}</span>
                ${opt}
              </button>
            `).join('')}
          </div>
          <div class="feedback-area" id="feedback-${index}"></div>
          <div class="knowledge-card" id="knowledge-${index}">
            <h4>📚 ${q.knowledge.title}</h4>
            <p>${q.knowledge.content}</p>
          </div>
          <div class="nav-buttons">
            <button class="nav-btn hint-btn" onclick="showHint(${index})" ${answered ? 'disabled' : ''}>💡 提示</button>
            <button class="nav-btn" onclick="nextQuestion()" id="next-${index}" style="display: none;">
              ${index === questions.length - 1 ? '查看结果' : '下一题 →'}
            </button>
          </div>
        `;
        container.appendChild(card);
        
        // 绘制图像
        if (q.showGraph && q.graphFn) {
          setTimeout(() => {
            const canvas = document.getElementById(`canvas-${index}`);
            if (canvas) {
              canvas.width = canvas.offsetWidth;
              canvas.height = canvas.offsetHeight;
              const ctx = canvas.getContext('2d');
              q.graphFn(ctx, canvas.width, canvas.height);
            }
          }, 100);
        }
      });
    }

    function showHint(questionIndex) {
      const q = questions[questionIndex];
      const feedback = document.getElementById(`feedback-${questionIndex}`);
      feedback.className = 'feedback-area show';
      feedback.style.background = 'rgba(245,158,11,0.1)';
      feedback.style.border = '1px solid rgba(245,158,11,0.3)';
      feedback.style.color = '#fbbf24';
      feedback.innerHTML = `💡 <strong>提示：</strong>${q.hint}`;
    }

    function selectOption(questionIndex, optionIndex) {
      if (answered) return;
      
      const question = questions[questionIndex];
      const card = document.getElementById(`question-${questionIndex}`);
      const options = card.querySelectorAll('.option-btn');
      
      options.forEach(opt => opt.classList.add('disabled'));
      options[optionIndex].classList.add('selected');
      
      const feedback = document.getElementById(`feedback-${questionIndex}`);
      const knowledge = document.getElementById(`knowledge-${questionIndex}`);
      const nextBtn = document.getElementById(`next-${questionIndex}`);
      
      if (optionIndex === question.correct) {
        options[optionIndex].classList.add('correct');
        card.classList.add('correct-flash');
        feedback.className = 'feedback-area show correct-feedback';
        feedback.innerHTML = '✅ 回答正确！';
        score += 10 + streak * 2;
        correctCount++;
        streak++;
        if (streak > maxStreak) maxStreak = streak;
        if (streak >= 5) showAchievement('🔥 连击达人！');
      } else {
        options[optionIndex].classList.add('wrong');
        options[question.correct].classList.add('correct');
        card.classList.add('wrong-flash');
        feedback.className = 'feedback-area show wrong-feedback';
        feedback.innerHTML = `❌ 回答错误。正确答案是：<strong>${String.fromCharCode(65 + question.correct)}</strong>`;
        streak = 0;
      }
      
      answered = true;
      knowledge.style.display = 'block';
      nextBtn.style.display = 'inline-block';
      
      updateStats();
      updateProgress();
    }

    function nextQuestion() {
      if (currentQuestion < questions.length - 1) {
        document.getElementById(`question-${currentQuestion}`).style.display = 'none';
        currentQuestion++;
        document.getElementById(`question-${currentQuestion}`).style.display = 'block';
        answered = false;
      } else {
        showResult();
      }
    }

    function updateStats() {
      document.getElementById('score').textContent = score;
      document.getElementById('correct').textContent = `${correctCount}/${questions.length}`;
      document.getElementById('streak').textContent = streak;
    }

    function updateProgress() {
      const progress = ((currentQuestion + 1) / questions.length) * 100;
      document.getElementById('progress').style.width = `${progress}%`;
    }

    function showResult() {
      document.getElementById('questions-container').style.display = 'none';
      document.querySelector('.progress-bar-container').style.display = 'none';
      document.querySelector('.stats-bar').style.display = 'none';
      
      const result = document.getElementById('result');
      result.style.display = 'block';
      
      const accuracy = Math.round(correctCount / questions.length * 100);
      document.getElementById('final-score').textContent = score;
      document.getElementById('final-accuracy').textContent = `正确率：${accuracy}%`;
      document.getElementById('final-correct').textContent = correctCount;
      document.getElementById('final-streak').textContent = maxStreak;
      
      const timeUsed = Math.round((Date.now() - startTime) / 1000);
      document.getElementById('final-time').textContent = `${timeUsed}s`;
      
      let rating = '';
      if (accuracy === 100) rating = '🏆 完美！数学大师！';
      else if (accuracy >= 80) rating = '🌟 优秀！继续保持！';
      else if (accuracy >= 60) rating = '👍 不错！加油！';
      else rating = '📚 继续努力！';
      document.getElementById('rating').textContent = rating;
      
      if (accuracy >= 80) startConfetti();
    }

    function restartQuiz() {
      currentQuestion = 0;
      score = 0;
      correctCount = 0;
      streak = 0;
      maxStreak = 0;
      answered = false;
      startTime = Date.now();
      
      document.getElementById('questions-container').style.display = 'block';
      document.querySelector('.progress-bar-container').style.display = 'block';
      document.querySelector('.stats-bar').style.display = 'flex';
      document.getElementById('result').style.display = 'none';
      
      updateStats();
      updateProgress();
      renderQuestions();
    }

    function showAchievement(text) {
      const achievement = document.createElement('div');
      achievement.className = 'achievement-popup';
      achievement.textContent = text;
      document.body.appendChild(achievement);
      setTimeout(() => achievement.classList.add('show'), 10);
      setTimeout(() => achievement.remove(), 3000);
    }

    function startConfetti() {
      const canvas = document.getElementById('confetti');
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      
      const particles = [];
      for (let i = 0; i < 150; i++) {
        particles.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height - canvas.height,
          color: ['#e2b714', '#f7971e', '#22d3ee', '#6366f1', '#22c55e'][Math.floor(Math.random() * 5)],
          size: Math.random() * 8 + 4,
          speed: Math.random() * 3 + 2,
          angle: Math.random() * Math.PI * 2
        });
      }
      
      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => {
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fill();
          p.y += p.speed;
          p.x += Math.sin(p.angle) * 2;
          if (p.y > canvas.height) p.y = -10;
        });
        requestAnimationFrame(animate);
      }
      animate();
      setTimeout(() => canvas.width = 0, 5000);
    }

    renderQuestions();
    updateStats();
  </script>
</body>
</html>
