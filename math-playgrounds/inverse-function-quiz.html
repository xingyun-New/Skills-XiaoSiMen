<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>反比例函数专项练习 - 10 道精选题</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .header {
            background: rgba(255,255,255,0.95);
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .header h1 {
            color: #667eea;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 16px;
        }
        
        .stats-bar {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .stat-item {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px 25px;
            border-radius: 12px;
            text-align: center;
            flex: 1;
            min-width: 120px;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
        }
        
        .stat-label {
            font-size: 12px;
            opacity: 0.9;
        }
        
        .question-card {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: none;
        }
        
        .question-card.active {
            display: block;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .question-number {
            display: inline-block;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        
        .question-text {
            font-size: 18px;
            color: #333;
            margin-bottom: 25px;
            line-height: 1.6;
        }
        
        .options {
            display: grid;
            gap: 12px;
        }
        
        .option {
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
        }
        
        .option:hover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
        }
        
        .option.selected {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }
        
        .option.correct {
            border-color: #4ade80;
            background: #4ade80;
            color: white;
        }
        
        .option.incorrect {
            border-color: #f87171;
            background: #f87171;
            color: white;
        }
        
        .feedback {
            margin-top: 20px;
            padding: 20px;
            border-radius: 12px;
            display: none;
        }
        
        .feedback.correct {
            background: rgba(74, 222, 128, 0.2);
            border: 2px solid #4ade80;
            display: block;
        }
        
        .feedback.incorrect {
            background: rgba(248, 113, 113, 0.2);
            border: 2px solid #f87171;
            display: block;
        }
        
        .knowledge-card {
            background: linear-gradient(135deg, #f0f9ff, #e0f2fe);
            border-left: 4px solid #0284c7;
            padding: 20px;
            margin-top: 20px;
            border-radius: 0 12px 12px 0;
            display: none;
        }
        
        .knowledge-card h4 {
            color: #0284c7;
            margin-bottom: 10px;
            font-size: 16px;
        }
        
        .knowledge-card p {
            color: #333;
            line-height: 1.6;
            font-size: 14px;
        }
        
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            gap: 10px;
        }
        
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #d0d0d0;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .progress-bar {
            background: rgba(255,255,255,0.3);
            height: 8px;
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        
        .progress-fill {
            background: linear-gradient(90deg, #4ade80, #22c55e);
            height: 100%;
            transition: width 0.3s ease;
            width: 0%;
        }
        
        .summary-card {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: none;
        }
        
        .summary-card h2 {
            color: #667eea;
            font-size: 32px;
            margin-bottom: 20px;
        }
        
        .summary-score {
            font-size: 72px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .summary-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        
        .summary-stat {
            padding: 20px;
            background: linear-gradient(135deg, #f0f9ff, #e0f2fe);
            border-radius: 12px;
        }
        
        .summary-stat-value {
            font-size: 36px;
            font-weight: bold;
            color: #667eea;
        }
        
        .summary-stat-label {
            color: #666;
            margin-top: 5px;
        }
        
        .graph-container {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin: 15px 0;
            text-align: center;
        }
        
        canvas {
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 反比例函数专项练习</h1>
            <p>10 道精选题 | 配套知识点卡片 | 即时反馈</p>
            
            <div class="stats-bar">
                <div class="stat-item">
                    <div class="stat-value" id="score">0</div>
                    <div class="stat-label">得分</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="correct">0/10</div>
                    <div class="stat-label">正确</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="streak">0</div>
                    <div class="stat-label">连击</div>
                </div>
            </div>
        </div>
        
        <div class="progress-bar">
            <div class="progress-fill" id="progress"></div>
        </div>
        
        <div id="questions-container"></div>
        
        <div class="summary-card" id="summary">
            <h2>🎉 练习完成！</h2>
            <div class="summary-score" id="final-score">0</div>
            <div class="summary-stats">
                <div class="summary-stat">
                    <div class="summary-stat-value" id="final-correct">0</div>
                    <div class="summary-stat-label">答对题数</div>
                </div>
                <div class="summary-stat">
                    <div class="summary-stat-value" id="final-accuracy">0%</div>
                    <div class="summary-stat-label">正确率</div>
                </div>
                <div class="summary-stat">
                    <div class="summary-stat-value" id="final-streak">0</div>
                    <div class="summary-stat-label">最高连击</div>
                </div>
            </div>
            <button class="btn btn-primary" onclick="restartQuiz()" style="margin-top: 30px;">
                🔄 重新练习
            </button>
        </div>
    </div>

    <script>
        const questions = [
            {
                id: 1,
                question: "下列函数中，属于反比例函数的是（  ）",
                options: [
                    "A. y = 2x",
                    "B. y = x²",
                    "C. y = 3/x",
                    "D. y = x + 1"
                ],
                correct: 2,
                knowledge: {
                    title: "📌 反比例函数的定义",
                    content: "反比例函数的一般形式为 <strong>y = k/x</strong>（k 为常数，k ≠ 0）。其中 k 称为比例系数。反比例函数也可以写成 <strong>xy = k</strong> 或 <strong>y = kx⁻¹</strong> 的形式。"
                }
            },
            {
                id: 2,
                question: "反比例函数 y = 6/x 的图像经过点（2，3），则当 x = -3 时，y 的值为（  ）",
                options: [
                    "A. -2",
                    "B. 2",
                    "C. -3",
                    "D. 3"
                ],
                correct: 0,
                knowledge: {
                    title: "📌 反比例函数的点坐标关系",
                    content: "对于反比例函数 y = k/x，图像上任意一点 (x, y) 都满足 <strong>xy = k</strong>。已知 k = 6，当 x = -3 时，y = 6/(-3) = -2。反比例函数图像上的点关于原点对称。"
                }
            },
            {
                id: 3,
                question: "反比例函数 y = -4/x 的图像位于（  ）",
                options: [
                    "A. 第一、三象限",
                    "B. 第二、四象限",
                    "C. 第一、二象限",
                    "D. 第三、四象限"
                ],
                correct: 1,
                knowledge: {
                    title: "📌 反比例函数图像的位置",
                    content: "当 k > 0 时，反比例函数图像位于<strong>第一、三象限</strong>；当 k < 0 时，图像位于<strong>第二、四象限</strong>。本题 k = -4 < 0，所以图像在第二、四象限。"
                }
            },
            {
                id: 4,
                question: "已知反比例函数 y = k/x 的图像经过点 A(-2, 4)，则 k 的值为（  ）",
                options: [
                    "A. 8",
                    "B. -8",
                    "C. 2",
                    "D. -2"
                ],
                correct: 1,
                knowledge: {
                    title: "📌 求反比例函数的比例系数",
                    content: "将已知点坐标代入函数解析式：4 = k/(-2)，解得 k = -8。也可以直接用 <strong>k = xy</strong> 计算：k = (-2) × 4 = -8。"
                }
            },
            {
                id: 5,
                question: "对于反比例函数 y = 2/x，当 x > 0 时，y 随 x 的增大而（  ）",
                options: [
                    "A. 增大",
                    "B. 减小",
                    "C. 不变",
                    "D. 先增大后减小"
                ],
                correct: 1,
                knowledge: {
                    title: "📌 反比例函数的增减性",
                    content: "当 k > 0 时，在<strong>每个象限内</strong>，y 随 x 的增大而减小；当 k < 0 时，在每个象限内，y 随 x 的增大而增大。本题 k = 2 > 0，在第一象限内 y 随 x 增大而减小。"
                }
            },
            {
                id: 6,
                question: "正比例函数 y = 2x 与反比例函数 y = 8/x 的图像交点坐标为（  ）",
                options: [
                    "A. (2, 4)",
                    "B. (4, 8)",
                    "C. (2, 4) 和 (-2, -4)",
                    "D. (4, 8) 和 (-4, -8)"
                ],
                correct: 2,
                knowledge: {
                    title: "📌 正比例与反比例函数的交点",
                    content: "联立方程：2x = 8/x，得 2x² = 8，x² = 4，x = ±2。当 x = 2 时，y = 4；当 x = -2 时，y = -4。所以交点为 <strong>(2, 4) 和 (-2, -4)</strong>，两点关于原点对称。"
                }
            },
            {
                id: 7,
                question: "反比例函数 y = k/x 与一次函数 y = x + 1 的图像没有交点，则 k 的取值范围是（  ）",
                options: [
                    "A. k > -1/4",
                    "B. k < -1/4",
                    "C. k > 1/4",
                    "D. k < 1/4"
                ],
                correct: 1,
                knowledge: {
                    title: "📌 函数图像交点与方程根的关系",
                    content: "联立得：k/x = x + 1，整理得 x² + x - k = 0。无交点即方程无实根，判别式 Δ = 1 + 4k < 0，解得 <strong>k < -1/4</strong>。"
                }
            },
            {
                id: 8,
                question: "已知点 A(x₁, y₁)、B(x₂, y₂) 在反比例函数 y = 3/x 的图像上，若 x₁ < x₂ < 0，则（  ）",
                options: [
                    "A. y₁ < y₂",
                    "B. y₁ > y₂",
                    "C. y₁ = y₂",
                    "D. 无法确定"
                ],
                correct: 0,
                knowledge: {
                    title: "📌 反比例函数的单调性（同象限）",
                    content: "k = 3 > 0，图像在第一、三象限。当 x < 0 时，两点都在第三象限。在第三象限内，y 随 x 的增大而减小。因为 x₁ < x₂，所以 <strong>y₁ < y₂</strong>。"
                }
            },
            {
                id: 9,
                question: "矩形面积为 12，若一边长为 x，另一边长为 y，则 y 与 x 的函数关系是（  ）",
                options: [
                    "A. y = 12x",
                    "B. y = x/12",
                    "C. y = 12/x",
                    "D. y = 12 - x"
                ],
                correct: 2,
                knowledge: {
                    title: "📌 反比例函数的实际应用",
                    content: "矩形面积 = 长 × 宽，即 xy = 12，所以 <strong>y = 12/x</strong>。这是典型的反比例关系：当面积一定时，一边长与另一边长成反比例。"
                }
            },
            {
                id: 10,
                question: "反比例函数 y = k/x 的图像关于（  ）对称",
                options: [
                    "A. x 轴",
                    "B. y 轴",
                    "C. 原点",
                    "D. 直线 y = x"
                ],
                correct: 2,
                knowledge: {
                    title: "📌 反比例函数的对称性",
                    content: "反比例函数是<strong>奇函数</strong>，满足 f(-x) = -f(x)，图像关于<strong>原点中心对称</strong>。同时，反比例函数图像也关于直线 y = x 和 y = -x 对称（当 k > 0 时关于 y = x 对称，当 k < 0 时关于 y = -x 对称）。"
                }
            }
        ];

        let currentQuestion = 0;
        let score = 0;
        let correctCount = 0;
        let streak = 0;
        let maxStreak = 0;
        let answered = false;

        function renderQuestions() {
            const container = document.getElementById('questions-container');
            container.innerHTML = '';
            
            questions.forEach((q, index) => {
                const card = document.createElement('div');
                card.className = `question-card ${index === 0 ? 'active' : ''}`;
                card.id = `question-${index}`;
                card.innerHTML = `
                    <div class="question-number">第 ${index + 1} 题</div>
                    <div class="question-text">${q.question}</div>
                    <div class="options">
                        ${q.options.map((opt, i) => `
                            <div class="option" onclick="selectOption(${index}, ${i})">${opt}</div>
                        `).join('')}
                    </div>
                    <div class="feedback" id="feedback-${index}"></div>
                    <div class="knowledge-card" id="knowledge-${index}">
                        <h4>${q.knowledge.title}</h4>
                        <p>${q.knowledge.content}</p>
                    </div>
                    <div class="nav-buttons">
                        <button class="btn btn-secondary" onclick="prevQuestion()" ${index === 0 ? 'disabled' : ''}>
                            ← 上一题
                        </button>
                        <button class="btn btn-primary" onclick="nextQuestion()" id="next-${index}" style="display: none;">
                            ${index === questions.length - 1 ? '查看结果' : '下一题 →'}
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function selectOption(questionIndex, optionIndex) {
            if (answered) return;
            
            const question = questions[questionIndex];
            const card = document.getElementById(`question-${questionIndex}`);
            const options = card.querySelectorAll('.option');
            
            options.forEach(opt => opt.classList.remove('selected'));
            options[optionIndex].classList.add('selected');
            
            const feedback = document.getElementById(`feedback-${questionIndex}`);
            const knowledge = document.getElementById(`knowledge-${questionIndex}`);
            const nextBtn = document.getElementById(`next-${questionIndex}`);
            
            if (optionIndex === question.correct) {
                options[optionIndex].classList.add('correct');
                feedback.className = 'feedback correct';
                feedback.innerHTML = '✅ 回答正确！';
                score += 10 + streak * 2;
                correctCount++;
                streak++;
                if (streak > maxStreak) maxStreak = streak;
            } else {
                options[optionIndex].classList.add('incorrect');
                options[question.correct].classList.add('correct');
                feedback.className = 'feedback incorrect';
                feedback.innerHTML = `❌ 回答错误。正确答案是：${question.options[question.correct]}`;
                streak = 0;
            }
            
            answered = true;
            knowledge.style.display = 'block';
            nextBtn.style.display = 'inline-block';
            
            updateStats();
            updateProgress();
        }

        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                document.getElementById(`question-${currentQuestion}`).classList.remove('active');
                currentQuestion++;
                document.getElementById(`question-${currentQuestion}`).classList.add('active');
                answered = false;
            } else {
                showSummary();
            }
        }

        function prevQuestion() {
            if (currentQuestion > 0) {
                document.getElementById(`question-${currentQuestion}`).classList.remove('active');
                currentQuestion--;
                document.getElementById(`question-${currentQuestion}`).classList.add('active');
            }
        }

        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('correct').textContent = `${correctCount}/${questions.length}`;
            document.getElementById('streak').textContent = streak;
        }

        function updateProgress() {
            const progress = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progress').style.width = `${progress}%`;
        }

        function showSummary() {
            document.getElementById('questions-container').style.display = 'none';
            document.querySelector('.progress-bar').style.display = 'none';
            
            const summary = document.getElementById('summary');
            summary.style.display = 'block';
            
            document.getElementById('final-score').textContent = score;
            document.getElementById('final-correct').textContent = correctCount;
            document.getElementById('final-accuracy').textContent = `${Math.round(correctCount / questions.length * 100)}%`;
            document.getElementById('final-streak').textContent = maxStreak;
        }

        function restartQuiz() {
            currentQuestion = 0;
            score = 0;
            correctCount = 0;
            streak = 0;
            maxStreak = 0;
            answered = false;
            
            document.getElementById('questions-container').style.display = 'block';
            document.querySelector('.progress-bar').style.display = 'block';
            document.getElementById('summary').style.display = 'none';
            
            updateStats();
            updateProgress();
            renderQuestions();
        }

        // Initialize
        renderQuestions();
        updateStats();
    </script>
</body>
</html>
