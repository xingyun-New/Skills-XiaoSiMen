<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物理专项练习 - 弹簧与弹力（图解版）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .progress-bar {
            background: #e0e0e0;
            border-radius: 10px;
            height: 20px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .progress-fill {
            background: linear-gradient(90deg, #667eea, #764ba2);
            height: 100%;
            width: 0%;
            transition: width 0.3s;
            border-radius: 10px;
        }
        .progress-text {
            text-align: center;
            margin-bottom: 10px;
            color: #666;
            font-size: 14px;
        }
        .question-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 25px;
            border-left: 4px solid #667eea;
            display: none;
        }
        .question-card.active {
            display: block;
        }
        .question-number {
            background: #667eea;
            color: white;
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .question-text {
            font-size: 18px;
            line-height: 1.8;
            margin-bottom: 20px;
            color: #333;
        }
        .diagram-container {
            background: white;
            border: 2px dashed #ddd;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
        }
        .diagram-container svg {
            max-width: 100%;
            height: auto;
        }
        .hint-box {
            background: #fff3e0;
            border-left: 4px solid #ff9800;
            padding: 15px;
            margin: 20px 0;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .hint-box:hover {
            background: #ffe0b2;
        }
        .hint-title {
            color: #e65100;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .hint-content {
            display: none;
            color: #333;
            line-height: 1.6;
            margin-top: 10px;
        }
        .hint-content.show {
            display: block;
        }
        .options {
            list-style: none;
        }
        .option {
            background: white;
            padding: 15px 20px;
            margin-bottom: 10px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid #e0e0e0;
            transition: all 0.3s;
        }
        .option:hover {
            border-color: #667eea;
            background: #f0f0ff;
        }
        .option.selected {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }
        .option.correct {
            border-color: #4caf50;
            background: #4caf50;
            color: white;
        }
        .option.incorrect {
            border-color: #f44336;
            background: #f44336;
            color: white;
        }
        .feedback {
            margin-top: 20px;
            padding: 20px;
            background: #e8f5e9;
            border-radius: 8px;
            border-left: 4px solid #4caf50;
            display: none;
        }
        .feedback.incorrect {
            background: #ffebee;
            border-left-color: #f44336;
        }
        .feedback-title {
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 16px;
        }
        .feedback-text {
            line-height: 1.6;
            color: #333;
        }
        .btn {
            background: linear-gradient(90deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: scale(1.05);
        }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .result-screen {
            text-align: center;
            display: none;
        }
        .score-display {
            font-size: 48px;
            color: #667eea;
            margin: 30px 0;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 30px 0;
        }
        .stat-item {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
        }
        .stat-number {
            font-size: 32px;
            color: #667eea;
            font-weight: bold;
        }
        .stat-label {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }
        .knowledge-point {
            background: #fff3e0;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            border-left: 4px solid #ff9800;
        }
        .knowledge-title {
            font-weight: bold;
            color: #e65100;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔬 物理专项练习 - 弹簧与弹力</h1>
        <p class="subtitle">配图详解版 | 图像读数 · 弹力方向 · 双弹簧模型</p>
        
        <div id="quiz-screen">
            <div class="progress-text">第 <span id="current-q">1</span> 题 / 共 10 题</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            
            <div id="questions-container"></div>
            
            <button class="btn" id="next-btn" onclick="nextQuestion()" disabled>下一题</button>
        </div>
        
        <div id="result-screen" class="result-screen">
            <h2>🎉 练习完成！</h2>
            <div class="score-display">得分：<span id="final-score">0</span>/100</div>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-number" id="correct-count">0</div>
                    <div class="stat-label">正确题数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="accuracy">0%</div>
                    <div class="stat-label">准确率</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="time-taken">0</div>
                    <div class="stat-label">用时 (秒)</div>
                </div>
            </div>
            <button class="btn" onclick="location.reload()">重新练习</button>
        </div>
    </div>

    <script>
        const questions = [
            {
                number: 1,
                text: "一根弹簧原长为 10cm，当受到 5N 的拉力时，长度变为 12cm。如果受到 10N 的拉力，弹簧的长度为多少？（在弹性限度内）",
                diagram: `
                    <svg width="400" height="200" viewBox="0 0 400 200">
                        <!-- 情况 1: 5N 拉力 -->
                        <text x="20" y="30" font-size="14" fill="#333">情况 1：F=5N</text>
                        <line x1="50" y1="50" x2="150" y2="50" stroke="#333" stroke-width="3"/>
                        <circle cx="50" cy="50" r="8" fill="#667eea"/>
                        <circle cx="150" cy="50" r="8" fill="#667eea"/>
                        <path d="M 60 50 Q 70 40 80 50 T 100 50 T 120 50 T 140 50" stroke="#667eea" stroke-width="2" fill="none"/>
                        <text x="80" y="80" font-size="12" fill="#666">L=12cm</text>
                        <line x1="50" y1="90" x2="150" y2="90" stroke="#f44336" stroke-width="2" marker-end="url(#arrow)"/>
                        <text x="85" y="105" font-size="12" fill="#f44336">ΔL=2cm</text>
                        
                        <!-- 情况 2: 10N 拉力 -->
                        <text x="220" y="30" font-size="14" fill="#333">情况 2：F=10N</text>
                        <line x1="250" y1="50" x2="380" y2="50" stroke="#333" stroke-width="3"/>
                        <circle cx="250" cy="50" r="8" fill="#667eea"/>
                        <circle cx="380" cy="50" r="8" fill="#667eea"/>
                        <path d="M 260 50 Q 275 35 290 50 T 320 50 T 350 50 T 370 50" stroke="#667eea" stroke-width="2" fill="none"/>
                        <text x="300" y="80" font-size="12" fill="#666">L=? cm</text>
                        <line x1="250" y1="90" x2="380" y2="90" stroke="#f44336" stroke-width="2"/>
                        <text x="295" y="105" font-size="12" fill="#f44336">ΔL=? cm</text>
                        
                        <!-- 箭头定义 -->
                        <defs>
                            <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
                                <path d="M0,0 L0,6 L9,3 z" fill="#f44336"/>
                            </marker>
                        </defs>
                    </svg>
                `,
                hint: "💡 提示：根据胡克定律 F=kΔx，拉力与伸长量成正比。5N 伸长 2cm，10N 伸长多少？",
                options: ["14cm", "15cm", "20cm", "24cm"],
                correct: 0,
                feedback: "根据胡克定律 F=kΔx，5N 拉力伸长 2cm，则劲度系数 k=5N/0.02m=250N/m。当 F=10N 时，Δx=10/250=0.04m=4cm，总长度=10+4=14cm",
                knowledge: "胡克定律：F=kΔx，伸长量与拉力成正比（在弹性限度内）"
            },
            {
                number: 2,
                text: "关于弹簧的 L-F 图像（L 为总长度，F 为拉力），下列说法正确的是：",
                diagram: `
                    <svg width="400" height="300" viewBox="0 0 400 300">
                        <!-- 坐标轴 -->
                        <line x1="50" y1="250" x2="380" y2="250" stroke="#333" stroke-width="2"/>
                        <line x1="50" y1="250" x2="50" y2="30" stroke="#333" stroke-width="2"/>
                        <text x="360" y="270" font-size="14" fill="#333">L(cm)</text>
                        <text x="20" y="40" font-size="14" fill="#333">F(N)</text>
                        
                        <!-- 图像线 -->
                        <line x1="100" y1="250" x2="350" y2="50" stroke="#667eea" stroke-width="3"/>
                        <circle cx="100" cy="250" r="5" fill="#f44336"/>
                        <text x="85" y="270" font-size="12" fill="#f44336">L₀</text>
                        <text x="70" y="270" font-size="10" fill="#999">(原长)</text>
                        
                        <!-- 网格 -->
                        <line x1="100" y1="250" x2="100" y2="255" stroke="#333" stroke-width="1"/>
                        <text x="95" y="270" font-size="10" fill="#666">0</text>
                        
                        <!-- 说明 -->
                        <rect x="200" y="10" width="180" height="60" fill="#f8f9fa" stroke="#ddd"/>
                        <text x="210" y="30" font-size="12" fill="#333">📊 L-F 图像特点：</text>
                        <text x="210" y="50" font-size="11" fill="#666">• F=0 时，L=L₀(原长)</text>
                        <text x="210" y="65" font-size="11" fill="#666">• 横轴截距 = 原长</text>
                    </svg>
                `,
                hint: "💡 提示：观察图像，当 F=0 时，图像与横轴（L 轴）的交点表示什么？",
                options: ["图像过原点", "横轴截距表示弹簧原长", "纵轴截距表示弹簧原长", "图像斜率表示弹簧原长"],
                correct: 1,
                feedback: "L-F 图像中，当 F=0（不受力）时，弹簧的长度就是原长。图像与 L 轴（横轴）的交点 L₀ 就是原长，这叫横轴截距",
                knowledge: "L-F 图像解读：F=0 时的 L 值为原长，即横轴截距；斜率表示 1/k"
            },
            {
                number: 3,
                text: "某弹簧的 L-F 图像如图所示，当 F=0 时 L=8cm，当 F=6N 时 L=14cm。则该弹簧的劲度系数 k 为：",
                diagram: `
                    <svg width="400" height="300" viewBox="0 0 400 300">
                        <!-- 坐标轴 -->
                        <line x1="60" y1="250" x2="380" y2="250" stroke="#333" stroke-width="2"/>
                        <line x1="60" y1="250" x2="60" y2="30" stroke="#333" stroke-width="2"/>
                        <text x="360" y="270" font-size="14" fill="#333">L(cm)</text>
                        <text x="20" y="40" font-size="14" fill="#333">F(N)</text>
                        
                        <!-- 刻度 -->
                        <line x1="60" y1="250" x2="60" y2="255" stroke="#333" stroke-width="1"/>
                        <text x="55" y="270" font-size="11" fill="#666">0</text>
                        <line x1="140" y1="250" x2="140" y2="255" stroke="#333" stroke-width="1"/>
                        <text x="130" y="270" font-size="11" fill="#666">8</text>
                        <line x1="260" y1="250" x2="260" y2="255" stroke="#333" stroke-width="1"/>
                        <text x="250" y="270" font-size="11" fill="#666">14</text>
                        
                        <line x1="60" y1="250" x2="55" y2="250" stroke="#333" stroke-width="1"/>
                        <text x="40" y="255" font-size="11" fill="#666">0</text>
                        <line x1="60" y1="130" x2="55" y2="130" stroke="#333" stroke-width="1"/>
                        <text x="35" y="135" font-size="11" fill="#666">6</text>
                        
                        <!-- 图像线 -->
                        <line x1="140" y1="250" x2="260" y2="130" stroke="#667eea" stroke-width="3"/>
                        <circle cx="140" cy="250" r="5" fill="#f44336"/>
                        <circle cx="260" cy="130" r="5" fill="#f44336"/>
                        
                        <!-- 标注 -->
                        <line x1="140" y1="260" x2="260" y2="260" stroke="#ff9800" stroke-width="1" stroke-dasharray="5,5"/>
                        <line x1="260" y1="250" x2="260" y2="260" stroke="#ff9800" stroke-width="1"/>
                        <text x="185" y="280" font-size="11" fill="#ff9800">ΔL=6cm=0.06m</text>
                        
                        <line x1="270" y1="130" x2="270" y2="250" stroke="#ff9800" stroke-width="1" stroke-dasharray="5,5"/>
                        <text x="280" y="200" font-size="11" fill="#ff9800">F=6N</text>
                    </svg>
                `,
                hint: "💡 提示：k=F/Δx，先算出伸长量Δx=14-8=6cm，注意换算成米！",
                options: ["50N/m", "100N/m", "150N/m", "200N/m"],
                correct: 1,
                feedback: "Δx=14-8=6cm=0.06m，F=6N，根据 k=F/Δx=6/0.06=100N/m。⚠️ 注意单位换算：cm 要换成 m",
                knowledge: "劲度系数计算：k=F/Δx，注意单位换算（cm→m）"
            },
            {
                number: 4,
                text: "如图所示，弹簧一端固定在墙上，另一端受水平向右的拉力 F。关于弹簧对墙的弹力方向，正确的是：",
                diagram: `
                    <svg width="500" height="200" viewBox="0 0 500 200">
                        <!-- 墙 -->
                        <rect x="0" y="50" width="30" height="100" fill="#9e9e9e"/>
                        <line x1="0" y1="50" x2="0" y2="150" stroke="#333" stroke-width="2"/>
                        <text x="5" y="45" font-size="12" fill="#333">墙</text>
                        
                        <!-- 弹簧 -->
                        <line x1="30" y1="100" x2="250" y2="100" stroke="#333" stroke-width="3"/>
                        <path d="M 40 100 Q 50 85 60 100 T 80 100 T 100 100 T 120 100 T 140 100 T 160 100 T 180 100 T 200 100 T 220 100 T 240 100" stroke="#667eea" stroke-width="2" fill="none"/>
                        
                        <!-- 拉力 F -->
                        <line x1="250" y1="100" x2="350" y2="100" stroke="#f44336" stroke-width="3" marker-end="url(#arrow-red)"/>
                        <text x="280" y="90" font-size="14" fill="#f44336" font-weight="bold">F (拉力)</text>
                        
                        <!-- 弹簧对墙的弹力 -->
                        <line x1="30" y1="110" x2="80" y2="110" stroke="#4caf50" stroke-width="3" marker-end="url(#arrow-green)"/>
                        <text x="40" y="130" font-size="12" fill="#4caf50" font-weight="bold">弹力方向？</text>
                        
                        <!-- 问题框 -->
                        <rect x="280" y="30" width="200" height="50" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
                        <text x="290" y="50" font-size="12" fill="#333">❓ 思考：</text>
                        <text x="290" y="70" font-size="11" fill="#666">弹簧被拉伸，要恢复原长，</text>
                        <text x="290" y="85" font-size="11" fill="#666">对墙的弹力向哪边？</text>
                        
                        <defs>
                            <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
                                <path d="M0,0 L0,6 L9,3 z" fill="#f44336"/>
                            </marker>
                            <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
                                <path d="M0,0 L0,6 L9,3 z" fill="#4caf50"/>
                            </marker>
                        </defs>
                    </svg>
                `,
                hint: "💡 提示：弹簧被拉伸时，弹力指向恢复原长的方向。弹簧想收缩，会往哪边拉墙？",
                options: ["水平向右", "水平向左", "竖直向上", "竖直向下"],
                correct: 1,
                feedback: "弹簧被拉伸时，弹力指向恢复原长的方向（想收缩）。弹簧对墙的弹力向左（拉墙），墙对弹簧的弹力向右（拉弹簧），这是一对相互作用力",
                knowledge: "弹力方向：总是指向恢复原长的方向。拉伸时向内拉，压缩时向外推"
            },
            {
                number: 5,
                text: "一个弹簧振子在水平面上做简谐振动，O 为平衡位置，A、B 为最大位移处。小球从 A 运动到 O 的过程中，弹力：",
                diagram: `
                    <svg width="500" height="250" viewBox="0 0 500 250">
                        <!-- 墙面 -->
                        <rect x="0" y="80" width="30" height="80" fill="#9e9e9e"/>
                        
                        <!-- 弹簧（压缩状态在 A 点） -->
                        <path d="M 30 120 Q 40 105 50 120 T 70 120 T 90 120 T 110 120 T 130 120" stroke="#667eea" stroke-width="2" fill="none"/>
                        <text x="60" y="100" font-size="11" fill="#667eea">压缩</text>
                        
                        <!-- 小球在 A 点 -->
                        <circle cx="140" cy="120" r="25" fill="#667eea"/>
                        <text x="130" y="125" font-size="14" fill="white" font-weight="bold">A</text>
                        
                        <!-- 平衡位置 O -->
                        <line x1="250" y1="95" x2="250" y2="145" stroke="#ff9800" stroke-width="2" stroke-dasharray="5,5"/>
                        <text x="240" y="90" font-size="12" fill="#ff9800" font-weight="bold">O</text>
                        <text x="225" y="160" font-size="11" fill="#999">平衡位置</text>
                        
                        <!-- B 点 -->
                        <line x1="360" y1="95" x2="360" y2="145" stroke="#ff9800" stroke-width="2" stroke-dasharray="5,5"/>
                        <text x="350" y="90" font-size="12" fill="#ff9800" font-weight="bold">B</text>
                        
                        <!-- 运动方向 -->
                        <line x1="170" y1="120" x2="230" y2="120" stroke="#4caf50" stroke-width="3" marker-end="url(#arrow)"/>
                        <text x="180" y="110" font-size="11" fill="#4caf50">A→O 运动</text>
                        
                        <!-- 弹力方向 -->
                        <line x1="140" y1="150" x2="200" y2="150" stroke="#f44336" stroke-width="3" marker-end="url(#arrow-red)"/>
                        <text x="150" y="170" font-size="11" fill="#f44336">弹力向右（推）</text>
                        
                        <!-- 说明框 -->
                        <rect x="280" y="30" width="200" height="70" fill="#e8f5e9" stroke="#4caf50" stroke-width="2"/>
                        <text x="290" y="50" font-size="12" fill="#333" font-weight="bold">📌 A→O 过程分析：</text>
                        <text x="290" y="68" font-size="11" fill="#666">• 弹簧从压缩→恢复</text>
                        <text x="290" y="83" font-size="11" fill="#666">• 弹力方向：向右（推小球）</text>
                        <text x="290" y="98" font-size="11" fill="#666">• 压缩量减小→弹力变小</text>
                        
                        <defs>
                            <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
                                <path d="M0,0 L0,6 L9,3 z" fill="#4caf50"/>
                            </marker>
                            <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
                                <path d="M0,0 L0,6 L9,3 z" fill="#f44336"/>
                            </marker>
                        </defs>
                    </svg>
                `,
                hint: "💡 提示：A 点是压缩状态，弹簧要恢复原长会往哪边推小球？从 A 到 O 压缩量怎么变？",
                options: ["方向向右，大小变大", "方向向右，大小变小", "方向向左，大小变大", "方向向左，大小变小"],
                correct: 1,
                feedback: "从 A 到 O，弹簧从压缩状态恢复，弹力向右（推小球向平衡位置）。随着压缩量减小，弹力大小也变小",
                knowledge: "弹簧振子：压缩时弹力向外推，指向平衡位置；压缩量越大弹力越大"
            },
            {
                number: 6,
                text: "接上题，小球从 O 运动到 B 的过程中，弹力：",
                diagram: `

                    </ul>
                    <div class="feedback" id="feedback"></div>
                </div>
            `;
            
            document.getElementById('current-q').textContent = currentQuestion + 1;
            document.getElementById('progress-fill').style.width = `${(currentQuestion / questions.length) * 100}%`;
            document.getElementById('next-btn').disabled = true;
            selectedOption = null;
        }

        function toggleHint(hintBox) {
            const content = hintBox.querySelector('.hint-content');
            content.classList.toggle('show');
        }

        function selectOption(index) {
            if (document.getElementById('feedback').style.display === 'block') return;
            
            const options = document.querySelectorAll('.option');
            options.forEach((opt, i) => {
                opt.classList.remove('selected');
                if (i === index) opt.classList.add('selected');
            });
            
            selectedOption = index;
            document.getElementById('next-btn').disabled = false;
        }

        function nextQuestion() {
            const q = questions[currentQuestion];
            const feedback = document.getElementById('feedback');
            const options = document.querySelectorAll('.option');
            
            // 显示反馈
            options.forEach((opt, i) => {
                if (i === q.correct) opt.classList.add('correct');
                else if (i === selectedOption && i !== q.correct) opt.classList.add('incorrect');
            });
            
            if (selectedOption === q.correct) {
                score += 10;
                feedback.className = 'feedback';
                feedback.innerHTML = `
                    <div class="feedback-title">✅ 正确！</div>
                    <div class="feedback-text">${q.feedback}</div>
                    <div class="knowledge-point">
                        <div class="knowledge-title">📌 知识点</div>
                        ${q.knowledge}
                    </div>
                `;
            } else {
                feedback.className = 'feedback incorrect';
                feedback.innerHTML = `
                    <div class="feedback-title">❌ 错误</div>
                    <div class="feedback-text">${q.feedback}</div>
                    <div class="knowledge-point">
                        <div class="knowledge-title">📌 知识点</div>
                        ${q.knowledge}
                    </div>
                `;
            }
            
            feedback.style.display = 'block';
            
            setTimeout(() => {
                currentQuestion++;
                if (currentQuestion < questions.length) {
                    renderQuestion();
                } else {
                    showResult();
                }
            }, 4000);
        }

        function showResult() {
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            
            const timeTaken = Math.floor((Date.now() - startTime) / 1000);
            const accuracy = (score / 100);
            
            document.getElementById('final-score').textContent = score;
            document.getElementById('correct-count').textContent = score / 10;
            document.getElementById('accuracy').textContent = `${accuracy * 100}%`;
            document.getElementById('time-taken').textContent = timeTaken;
        }

        renderQuestion();
