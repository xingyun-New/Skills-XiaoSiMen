<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>反比例函数 - 探索与练习</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
            color: #e0e0e0;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        
        .header h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, #e2b714, #f7971e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #8892b0;
            font-size: 1.1em;
        }

        .mode-tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .mode-tab {
            background: rgba(99,102,241,0.2);
            border: 2px solid rgba(99,102,241,0.5);
            color: #e0e0e0;
            padding: 14px 32px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .mode-tab:hover {
            background: rgba(99,102,241,0.3);
            border-color: #6366f1;
            transform: translateY(-2px);
        }

        .mode-tab.active {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-color: #6366f1;
            color: white;
        }
        
        .score-board {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }
        
        .score-item {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 14px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            min-width: 120px;
        }
        
        .score-item .label {
            font-size: 0.85em;
            color: #8892b0;
            margin-bottom: 4px;
        }
        
        .score-item .value {
            font-size: 1.6em;
            font-weight: bold;
            color: #e2b714;
        }

        .mode-panel {
            display: none;
        }

        .mode-panel.active {
            display: block;
        }

        /* ===== 探索器样式 ===== */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        @media (max-width: 900px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
        
        .panel {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .panel h2 {
            color: #e2b714;
            margin-bottom: 20px;
            font-size: 1.5em;
        }
        
        .canvas-container {
            position: relative;
            width: 100%;
            height: 420px;
            background: rgba(13,17,23,0.6);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        #exploreCanvas {
            width: 100%;
            height: 100%;
        }
        
        .controls {
            display: grid;
            gap: 20px;
            margin-top: 20px;
        }
        
        .control-group {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 12px;
        }
        
        .control-group label {
            display: block;
            font-weight: bold;
            color: #f0f0f0;
            margin-bottom: 12px;
            font-size: 1.05em;
        }
        
        .slider-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        input[type="range"] {
            flex: 1;
            height: 8px;
            border-radius: 4px;
            background: rgba(99,102,241,0.3);
            outline: none;
            -webkit-appearance: none;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            cursor: pointer;
            box-shadow: 0 2px 10px rgba(99,102,241,0.5);
        }
        
        .value-display {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            min-width: 80px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1em;
        }
        
        .equation-display {
            background: rgba(147,197,253,0.1);
            border: 1px solid rgba(147,197,253,0.3);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin-top: 20px;
        }
        
        .equation-display .equation {
            font-size: 2em;
            color: #93c5fd;
            font-family: 'Cambria Math', 'Times New Roman', serif;
            font-style: italic;
        }
        
        .explanation {
            background: rgba(34,197,94,0.08);
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            border-left: 4px solid #22c55e;
        }
        
        .explanation h3 {
            color: #4ade80;
            margin-bottom: 12px;
            font-size: 1.2em;
        }
        
        .explanation p {
            color: #d1d5db;
            line-height: 1.8;
            font-size: 0.95em;
        }
        
        .explanation .math {
            font-family: 'Cambria Math', 'Times New Roman', serif;
            color: #93c5fd;
            font-style: italic;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        
        .info-box {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 10px;
            border-left: 3px solid #6366f1;
        }
        
        .info-box .info-label {
            font-size: 0.85em;
            color: #8892b0;
            margin-bottom: 5px;
        }
        
        .info-box .info-value {
            font-size: 1.3em;
            font-weight: bold;
            color: #e0e0e0;
        }

        /* ===== 练习题样式 ===== */
        .progress-bar-container {
            width: 100%; height: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin-bottom: 25px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #22d3ee, #6366f1);
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        .question-card {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 35px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }
        .question-card.correct-flash { border-color: #22c55e; box-shadow: 0 0 30px rgba(34,197,94,0.2); }
        .question-card.wrong-flash { border-color: #ef4444; box-shadow: 0 0 30px rgba(239,68,68,0.2); }

        .question-number {
            display: inline-block;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            padding: 5px 16px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .question-type {
            display: inline-block;
            background: rgba(226,183,20,0.15);
            color: #e2b714;
            padding: 4px 12px;
            border-radius: 10px;
            font-size: 0.8em;
            margin-left: 8px;
        }

        .question-text {
            font-size: 1.25em;
            line-height: 1.8;
            margin-bottom: 20px;
            color: #f0f0f0;
        }
        .question-text .math {
            font-family: 'Cambria Math', 'Times New Roman', serif;
            font-style: italic;
            color: #93c5fd;
        }

        .canvas-area {
            width: 100%;
            height: 320px;
            background: rgba(13,17,23,0.6);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            margin: 15px 0;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }
        @media (max-width: 600px) { .options-grid { grid-template-columns: 1fr; } }

        .option-btn {
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.12);
            color: #e0e0e0;
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 1.05em;
            cursor: pointer;
            transition: all 0.25s ease;
            text-align: left;
        }
        .option-btn:hover:not(.disabled) {
            background: rgba(99,102,241,0.15);
            border-color: #6366f1;
            transform: translateY(-2px);
        }
        .option-btn.selected { background: rgba(99,102,241,0.25); border-color: #6366f1; }
        .option-btn.correct { background: rgba(34,197,94,0.2); border-color: #22c55e; color: #86efac; }
        .option-btn.wrong { background: rgba(239,68,68,0.2); border-color: #ef4444; color: #fca5a5; }
        .option-btn.disabled { cursor: default; opacity: 0.7; }
        .option-btn .option-label {
            display: inline-block;
            background: rgba(255,255,255,0.1);
            width: 28px; height: 28px;
            line-height: 28px;
            text-align: center;
            border-radius: 50%;
            margin-right: 10px;
            font-weight: bold;
            font-size: 0.9em;
        }

        .feedback-area {
            min-height: 50px;
            margin-top: 15px;
            padding: 15px;
            border-radius: 12px;
            display: none;
            line-height: 1.7;
        }
        .feedback-area.show { display: block; }
        .feedback-area.correct-feedback {
            background: rgba(34,197,94,0.1);
            border: 1px solid rgba(34,197,94,0.3);
            color: #86efac;
        }
        .feedback-area.wrong-feedback {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            color: #fca5a5;
        }

        .knowledge-card {
            margin-top: 15px;
            padding: 20px;
            background: rgba(34,197,94,0.08);
            border-left: 4px solid #22c55e;
            border-radius: 8px;
            display: none;
        }
        .knowledge-card h4 {
            color: #4ade80;
            font-size: 1.1em;
            margin-bottom: 10px;
        }
        .knowledge-card p {
            font-size: 0.95em;
            line-height: 1.7;
            color: #d1d5db;
        }
        .knowledge-card .math {
            font-family: 'Cambria Math', 'Times New Roman', serif;
            color: #93c5fd;
            font-style: italic;
        }

        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }
        .nav-btn {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            padding: 14px 36px;
            font-size: 1.1em;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.25s ease;
        }
        .nav-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(99,102,241,0.4); }
        .nav-btn:disabled { opacity: 0.4; cursor: default; transform: none; }
        .nav-btn.hint-btn { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .nav-btn.hint-btn:hover { box-shadow: 0 8px 25px rgba(245,158,11,0.4); }

        .result-card {
            display: none;
            text-align: center;
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 50px 35px;
        }
        .result-card h2 { font-size: 2.2em; margin-bottom: 10px; }
        .result-card .big-score {
            font-size: 4em;
            font-weight: bold;
            background: linear-gradient(135deg, #e2b714, #f7971e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 15px 0;
        }
        .result-card .accuracy { font-size: 1.3em; color: #8892b0; margin-bottom: 20px; }
        .result-card .rating { font-size: 1.8em; margin: 15px 0; }
        .result-card .details {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 25px 0;
        }
        .result-card .detail-item {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 12px;
        }
        .result-card .detail-item .d-label { font-size: 0.85em; color: #8892b0; }
        .result-card .detail-item .d-value { font-size: 1.5em; font-weight: bold; margin-top: 5px; }

        .achievement-popup {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: #1a1a2e;
            padding: 18px 28px;
            border-radius: 14px;
            font-weight: bold;
            font-size: 1.1em;
            box-shadow: 0 10px 40px rgba(245,158,11,0.4);
            transform: translateX(400px);
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 1000;
        }
        .achievement-popup.show { transform: translateX(0); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 反比例函数</h1>
            <p>探索函数性质 · 挑战练习题</p>
        </div>

        <div class="mode-tabs">
            <div class="mode-tab active" onclick="switchMode('explore')">🔍 探索器</div>
            <div class="mode-tab" onclick="switchMode('practice')">📝 练习题</div>
        </div>

        <!-- 探索器面板 -->
        <div id="explorePanel" class="mode-panel active">
            <div class="score-board">
                <div class="score-item">
                    <div class="label">当前 k 值</div>
                    <div class="value" id="currentK">1</div>
                </div>
                <div class="score-item">
                    <div class="label">挑战得分</div>
                    <div class="value" id="exploreScore">0</div>
                </div>
            </div>

            <div class="main-content">
                <div class="panel">
                    <h2>📈 函数图像</h2>
                    <div class="canvas-container">
                        <canvas id="exploreCanvas"></canvas>
                    </div>
                    
                    <div class="equation-display">
                        <div class="equation" id="equation">y = 1/x</div>
                    </div>

                    <div class="info-grid">
                        <div class="info-box">
                            <div class="info-label">所在象限</div>
                            <div class="info-value" id="quadrantInfo">第一、三象限</div>
                        </div>
                        <div class="info-box">
                            <div class="info-label">增减性</div>
                            <div class="info-value" id="monotonicityInfo">每个象限内 y 随 x 增大而减小</div>
                        </div>
                    </div>
                </div>

                <div class="panel">
                    <h2>🎮 互动控制</h2>
                    
                    <div class="controls">
                        <div class="control-group">
                            <label>比例系数 k：</label>
                            <div class="slider-container">
                                <input type="range" id="kSlider" min="-10" max="10" step="0.5" value="1">
                                <div class="value-display" id="kValue">k = 1</div>
                            </div>
                        </div>
                    </div>

                    <div class="explanation">
                        <h3>📚 知识点</h3>
                        <p>反比例函数的一般形式为 <span class="math">y = k/x</span>（k 为常数，k ≠ 0）。</p>
                        <p style="margin-top: 10px;">
                            <strong>k 的作用：</strong><br>
                            • <span class="math">k > 0</span>：图像在第一、三象限<br>
                            • <span class="math">k < 0</span>：图像在第二、四象限<br>
                            • |k| 越大，图像离坐标轴越远
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 练习题面板 -->
        <div id="practicePanel" class="mode-panel">
            <div class="stats-bar">
                <div class="stat-box">
                    <div class="label">得分</div>
                    <div class="value score" id="score">0</div>
                </div>
                <div class="stat-box">
                    <div class="label">正确</div>
                    <div class="value progress" id="correct">0/10</div>
                </div>
                <div class="stat-box">
                    <div class="label">连击</div>
                    <div class="value streak" id="streak">0</div>
                </div>
            </div>

            <div class="progress-bar-container">
                <div class="progress-bar-fill" id="progress"></div>
            </div>

            <div id="questions-container"></div>

            <div class="result-card" id="result">
                <h2>🎉 练习完成！</h2>
                <div class="big-score" id="final-score">0</div>
                <div class="accuracy" id="final-accuracy">正确率：0%</div>
                <div class="rating" id="rating"></div>
                <div class="details">
                    <div class="detail-item">
                        <div class="d-label">答对题数</div>
                        <div class="d-value" id="final-correct">0</div>
                    </div>
                    <div class="detail-item">
                        <div class="d-label">最高连击</div>
                        <div class="d-value" id="final-streak">0</div>
                    </div>
                    <div class="detail-item">
                        <div class="d-label">总用时</div>
                        <div class="d-value" id="final-time">0s</div>
                    </div>
                </div>
                <button class="nav-btn" onclick="restartQuiz()">🔄 重新练习</button>
            </div>
        </div>
    </div>

    <div class="achievement-popup" id="achievement"></div>

    <script>
        // ===== 全局变量 =====
        let k = 1;
        let exploreScore = 0;
        let currentQuestion = 0;
        let score = 0;
        let correctCount = 0;
        let streak = 0;
        let maxStreak = 0;
        let answered = false;
        let startTime = Date.now();

        // ===== Canvas 设置 =====
        const exploreCanvas = document.getElementById('exploreCanvas');
        const exploreCtx = exploreCanvas.getContext('2d');
        
        function resizeExploreCanvas() {
            exploreCanvas.width = exploreCanvas.offsetWidth;
            exploreCanvas.height = exploreCanvas.offsetHeight;
            drawExploreGraph();
        }
        
        window.addEventListener('resize', resizeExploreCanvas);

        // ===== 探索器绘图函数 =====
        function drawExploreGraph() {
            const width = exploreCanvas.width;
            const height = exploreCanvas.height;
            
            exploreCtx.clearRect(0, 0, width, height);
            
            const coords = drawCoordinateSystem(exploreCtx, width, height);
            drawInverseFunction(exploreCtx, width, height, k, coords);
            drawPoints(exploreCtx, width, height, k, coords);
            
            updateExploreInfo();
        }

        function drawCoordinateSystem(ctx, width, height) {
            const cx = width / 2;
            const cy = height / 2;
            const scale = Math.min(width, height) / 16;

            // 网格
            ctx.strokeStyle = "rgba(255,255,255,0.06)";
            ctx.lineWidth = 1;
            for (let i = -8; i <= 8; i++) {
                ctx.beginPath();
                ctx.moveTo(cx + i * scale, 0);
                ctx.lineTo(cx + i * scale, height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, cy + i * scale);
                ctx.lineTo(width, cy + i * scale);
                ctx.stroke();
            }

            // 坐标轴
            ctx.strokeStyle = "rgba(255,255,255,0.4)";
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(0, cy);
            ctx.lineTo(width, cy);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(cx, 0);
            ctx.lineTo(cx, height);
            ctx.stroke();

            // 坐标轴标签
            ctx.fillStyle = "rgba(255,255,255,0.6)";
            ctx.font = "12px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText("x", width - 15, cy + 18);
            ctx.fillText("y", cx + 12, 18);
            ctx.fillText("O", cx - 12, cy + 16);

            // 刻度
            for (let i = -8; i <= 8; i++) {
                if (i === 0) continue;
                ctx.fillText(i.toString(), cx + i * scale, cy + 16);
                ctx.fillText(i.toString(), cx - 18, cy - i * scale + 4);
            }

            return { cx, cy, scale };
        }

        function drawInverseFunction(ctx, width, height, k, coords) {
            const { cx, cy, scale } = coords;
            
            ctx.strokeStyle = k > 0 ? "#93c5fd" : "#f9a8d4";
            ctx.lineWidth = 3;
            ctx.setLineDash([]);

            // 第一象限或第二象限分支
            ctx.beginPath();
            for (let px = 0.1; px <= 8; px += 0.05) {
                const x = px;
                const y = k / x;
                if (Math.abs(y) <= 8) {
                    const plotX = cx + x * scale;
                    const plotY = cy - y * scale;
                    if (px === 0.1) ctx.moveTo(plotX, plotY);
                    else ctx.lineTo(plotX, plotY);
                }
            }
            ctx.stroke();

            // 第三象限或第四象限分支
            ctx.beginPath();
            for (let px = -0.1; px >= -8; px -= 0.05) {
                const x = px;
                const y = k / x;
                if (Math.abs(y) <= 8) {
                    const plotX = cx + x * scale;
                    const plotY = cy - y * scale;
                    if (px === -0.1) ctx.moveTo(plotX, plotY);
                    else ctx.lineTo(plotX, plotY);
                }
            }
            ctx.stroke();

            ctx.setLineDash([]);
        }

        function drawPoints(ctx, width, height, k, coords) {
            const { cx, cy, scale } = coords;
            
            const points = [1, 2, 4, -1, -2, -4].filter(x => Math.abs(k/x) <= 8);
            
            points.forEach(x => {
                const y = k / x;
                const px = cx + x * scale;
                const py = cy - y * scale;
                
                ctx.fillStyle = "#f59e0b";
                ctx.beginPath();

        // ===== 练习题绘图函数 =====
        function drawInverseGraph(ctx, w, h, k, color) {
            var cx = w / 2, cy = h / 2;
            var scale = Math.min(w, h) / 14;

            // 绘制网格
            ctx.strokeStyle = "rgba(255,255,255,0.06)";
            ctx.lineWidth = 1;
            for (var i = -7; i <= 7; i++) {
                ctx.beginPath();
                ctx.moveTo(cx + i * scale, 0);
                ctx.lineTo(cx + i * scale, h);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, cy + i * scale);
                ctx.lineTo(w, cy + i * scale);
                ctx.stroke();
            }

            // 绘制坐标轴
            ctx.strokeStyle = "rgba(255,255,255,0.4)";
            ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(w, cy); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, h); ctx.stroke();

            // 坐标轴标签
            ctx.fillStyle = "rgba(255,255,255,0.5)";
            ctx.font = "12px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText("x", w - 15, cy + 18);
            ctx.fillText("y", cx + 12, 18);
            ctx.fillText("O", cx - 12, cy + 16);

            // 绘制反比例函数图像（双曲线）
            ctx.strokeStyle = color;
            ctx.lineWidth = 2.5;
            ctx.setLineDash([]);

            // 第一、三象限或第二、四象限
            ctx.beginPath();
            for (var px = 1; px <= 7; px += 0.1) {
                var x = px;
                var y = k / x;
                if (Math.abs(y) <= 7) {
                    var plotX = cx + x * scale;
                    var plotY = cy - y * scale;
                    if (px === 1) ctx.moveTo(plotX, plotY);
                    else ctx.lineTo(plotX, plotY);
                }
            }
            ctx.stroke();

            ctx.beginPath();
            for (var px = -1; px >= -7; px -= 0.1) {
                var x = px;
                var y = k / x;
                if (Math.abs(y) <= 7) {
                    var plotX = cx + x * scale;
                    var plotY = cy - y * scale;
                    if (px === -1) ctx.moveTo(plotX, plotY);
                    else ctx.lineTo(plotX, plotY);
                }
            }
            ctx.stroke();

            ctx.setLineDash([]);
        }

        function drawPoint(ctx, w, h, x, y, label, color) {
            var cx = w / 2, cy = h / 2;
            var scale = Math.min(w, h) / 14;
            var px = cx + x * scale;
            var py = cy - y * scale;

            ctx.fillStyle = color || "#f59e0b";
            ctx.beginPath();
            ctx.arc(px, py, 6, 0, Math.PI * 2);
            ctx.fill();

            if (label) {
                ctx.fillStyle = "#fbbf24";
                ctx.font = "bold 13px sans-serif";
                ctx.textAlign = "left";
                ctx.fillText(label, px + 10, py - 10);
            }
        }

        // ===== 模式切换 =====
        function switchMode(mode) {
            document.querySelectorAll('.mode-tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.mode-panel').forEach(panel => panel.classList.remove('active'));
            
            if (mode === 'explore') {
                document.querySelector('.mode-tab:nth-child(1)').classList.add('active');
                document.getElementById('explorePanel').classList.add('active');
                setTimeout(resizeExploreCanvas, 100);
            } else {
                document.querySelector('.mode-tab:nth-child(2)').classList.add('active');
                document.getElementById('practicePanel').classList.add('active');
                setTimeout(() => {
                    renderQuestions();
                    updatePracticeStats();
                }, 100);
            }
        }

        // ===== 练习题逻辑 =====
        function renderQuestions() {
            const container = document.getElementById('questions-container');
            container.innerHTML = '';
            
            questions.forEach((q, index) => {
                const card = document.createElement('div');
                card.className = `question-card ${index === 0 ? 'active' : ''}`;
                card.id = `question-${index}`;
                card.style.display = index === 0 ? 'block' : 'none';
                card.innerHTML = `
                    <div class="question-number">第 ${index + 1} 题</div>
                    <span class="question-type">${q.type}</span>
                    <div class="question-text">${q.question}</div>
                    ${q.showGraph ? `<canvas class="canvas-area" id="canvas-${index}"></canvas>` : ''}
                    <div class="options-grid">
                        ${q.options.map((opt, i) => `
                            <button class="option-btn" onclick="selectOption(${index}, ${i})">
                                <span class="option-label">${String.fromCharCode(65 + i)}</span>
                                ${opt}
                            </button>
                        `).join('')}
                    </div>
                    <div class="feedback-area" id="feedback-${index}"></div>
                    <div class="knowledge-card" id="knowledge-${index}">
                        <h4>📚 ${q.knowledge.title}</h4>
                        <p>${q.knowledge.content}</p>
                    </div>
                    <div class="nav-buttons">
                        <button class="nav-btn hint-btn" onclick="showHint(${index})" ${answered ? 'disabled' : ''}>💡 提示</button>
                        <button class="nav-btn" onclick="nextQuestion()" id="next-${index}" style="display: none;">
                            ${index === questions.length - 1 ? '查看结果' : '下一题 →'}
                        </button>
                    </div>
                `;
                container.appendChild(card);
                
                if (q.showGraph && q.graphFn) {
                    setTimeout(() => {
                        const canvas = document.getElementById(`canvas-${index}`);
                        if (canvas) {
                            canvas.width = canvas.offsetWidth;
                            canvas.height = canvas.offsetHeight;
                            const ctx = canvas.getContext('2d');
                            q.graphFn(ctx, canvas.width, canvas.height);
                        }
                    }, 100);
                }
            });
        }

        function showHint(questionIndex) {
            const q = questions[questionIndex];
            const feedback = document.getElementById(`feedback-${questionIndex}`);
            feedback.className = 'feedback-area show';
            feedback.style.background = 'rgba(245,158,11,0.1)';
            feedback.style.border = '1px solid rgba(245,158,11,0.3)';
            feedback.style.color = '#fbbf24';
            feedback.innerHTML = `💡 <strong>提示：</strong>${q.hint}`;
        }

        function selectOption(questionIndex, optionIndex) {
            if (answered) return;
            
            const question = questions[questionIndex];
            const card = document.getElementById(`question-${questionIndex}`);
            const options = card.querySelectorAll('.option-btn');
            
            options.forEach(opt => opt.classList.add('disabled'));
            options[optionIndex].classList.add('selected');
            
            const feedback = document.getElementById(`feedback-${questionIndex}`);
            const knowledge = document.getElementById(`knowledge-${questionIndex}`);
            const nextBtn = document.getElementById(`next-${questionIndex}`);
            
            if (optionIndex === question.correct) {
                options[optionIndex].classList.add('correct');
                card.classList.add('correct-flash');
                feedback.className = 'feedback-area show correct-feedback';
                feedback.innerHTML = '✅ 回答正确！';
                score += 10 + streak * 2;
                correctCount++;
                streak++;
                if (streak > maxStreak) maxStreak = streak;
                if (streak >= 5) showAchievement('🔥 连击达人！');
            } else {
                options[optionIndex].classList.add('wrong');
                options[question.correct].classList.add('correct');
                card.classList.add('wrong-flash');
                feedback.className = 'feedback-area show wrong-feedback';
                feedback.innerHTML = `❌ 回答错误。正确答案是：<strong>${String.fromCharCode(65 + question.correct)}</strong>`;
                streak = 0;
            }
            
            answered = true;
            knowledge.style.display = 'block';
            nextBtn.style.display = 'inline-block';
            
            updatePracticeStats();
            updateProgress();
        }

        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                document.getElementById(`question-${currentQuestion}`).style.display = 'none';
                currentQuestion++;
                document.getElementById(`question-${currentQuestion}`).style.display = 'block';
                answered = false;
            } else {
                showResult();
            }
        }

        function updatePracticeStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('correct').textContent = `${correctCount}/${questions.length}`;
            document.getElementById('streak').textContent = streak;
        }

        function updateProgress() {
            const progress = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progress').style.width = `${progress}%`;
        }

        function showResult() {
            document.getElementById('questions-container').style.display = 'none';
            document.querySelector('.progress-bar-container').style.display = 'none';
            document.querySelector('.stats-bar').style.display = 'none';
            
            const result = document.getElementById('result');
            result.style.display = 'block';
            
            const accuracy = Math.round(correctCount / questions.length * 100);
            document.getElementById('final-score').textContent = score;
            document.getElementById('final-accuracy').textContent = `正确率：${accuracy}%`;
            document.getElementById('final-correct').textContent = correctCount;
            document.getElementById('final-streak').textContent = maxStreak;
            
            const timeUsed = Math.round((Date.now() - startTime) / 1000);
            document.getElementById('final-time').textContent = `${timeUsed}s`;
            
            let rating = '';
            if (accuracy === 100) rating = '🏆 完美！数学大师！';
            else if (accuracy >= 80) rating = '🌟 优秀！继续保持！';
            else if (accuracy >= 60) rating = '👍 不错！加油！';
            else rating = '📚 继续努力！';
            document.getElementById('rating').textContent = rating;
        }

        function restartQuiz() {
            currentQuestion = 0;
            score = 0;
            correctCount = 0;
            streak = 0;
            maxStreak = 0;
            answered = false;
            startTime = Date.now();
            
            document.getElementById('questions-container').style.display = 'block';
            document.querySelector('.progress-bar-container').style.display = 'block';
            document.querySelector('.stats-bar').style.display = 'flex';
            document.getElementById('result').style.display = 'none';
            
            updatePracticeStats();
            updateProgress();
            renderQuestions();
        }

        function showAchievement(text) {
            const achievement = document.getElementById('achievement');
            achievement.textContent = text;
            achievement.classList.add('show');
            setTimeout(() => achievement.classList.remove('show'), 3000);
        }

        // ===== 初始化 =====
        resizeExploreCanvas();
        updateExploreInfo();
    </script>
