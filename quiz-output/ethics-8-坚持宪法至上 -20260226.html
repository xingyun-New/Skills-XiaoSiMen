        }

        }

        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 14px;
            color: #6c757d;
            margin-top: 5px;
        }

        .progress-container {
            padding: 20px;
            background: #fff;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e9ecef;
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s ease;
            width: 0%;
        }

        .question-container {
            padding: 40px;
        }

        .question-number {
            font-size: 14px;
            color: #667eea;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .question-text {
            font-size: 20px;
            line-height: 1.6;
            color: #212529;
            margin-bottom: 30px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option {
            padding: 20px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
        }

        .option:hover {
            border-color: #667eea;
            background: #f8f9ff;
            transform: translateX(5px);
        }

        .option.selected {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }

        .option.correct {
            border-color: #28a745;
            background: #28a745;
            color: white;
        }

        .option.incorrect {
            border-color: #dc3545;
            background: #dc3545;
            color: white;
        }

        .feedback {
            margin-top: 30px;
            padding: 25px;
            border-radius: 10px;
            display: none;
        }

        .feedback.correct {
            background: #d4edda;
            border: 2px solid #28a745;
            display: block;
        }

        .feedback.incorrect {
            background: #f8d7da;
            border: 2px solid #dc3545;
            display: block;
        }

        .feedback-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .feedback.correct .feedback-title {
            color: #155724;
        }

        .feedback.incorrect .feedback-title {
            color: #721c24;
        }

            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-top: 15px;
        }

        .knowledge-item {
            margin-bottom: 10px;
            line-height: 1.6;
        }

        .knowledge-item strong {
            color: #667eea;
        }

        .btn {
            padding: 15px 40px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
            width: 100%;

            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

        }

            margin-top: 20px;
            padding: 15px;
            background: #fff3cd;
            border: 2px solid #ffc107;
            border-radius: 8px;
            display: none;

            padding: 10px;
            background: white;
            border-radius: 5px;

        }

            text-align: center;

            font-size: 32px;
            color: #667eea;

            font-weight: bold;

</head>

            <button class="btn btn-primary hidden" id="next-btn" onclick="nextQuestion()">下一题</button>

            <div class="feedback" id="feedback"></div>
        </div>

        <div class="result-screen" id="result-screen">
            <div class="result-title">🎉 练习完成！</div>
            <div class="result-score" id="final-score"></div>
            <div class="result-stats">

                <div class="result-stat">
                    <div class="result-stat-value" id="final-accuracy">0%</div>

                </div>
                <div class="result-stat">
                    <div class="result-stat-value" id="final-streak">0</div>
                    <div class="result-stat-label">最高连对</div>
                </div>
            </div>
            <div class="weak-points" id="weak-points"></div>
            <button class="btn btn-primary" onclick="restartQuiz()">重新练习</button>
        </div>
    </div>

    <script>
        let currentQuestion = 0;
        let score = 0;
        let correctCount = 0;
        let streakCount = 0;
        let maxStreak = 0;
        let selectedOption = null;
        let answered = false;
        let wrongQuestions = [];

        const quizData = JSON.parse(document.getElementById('quiz-json').textContent);
        const questions = quizData.questions;

        function loadQuestion() {
            const question = questions[currentQuestion];
            document.getElementById('question-number').textContent = `第 ${currentQuestion + 1} 题`;
            document.getElementById('question-text').textContent = question.text;
            
            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';
            
            question.options.forEach((option, index) => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'option';
                optionDiv.textContent = `${String.fromCharCode(65 + index)}. ${option}`;
                optionDiv.onclick = () => selectOption(index);
                optionsContainer.appendChild(optionDiv);
            });

            document.getElementById('feedback').className = 'feedback';
            document.getElementById('feedback').innerHTML = '';
            document.getElementById('submit-btn').classList.remove('hidden');
            document.getElementById('submit-btn').disabled = true;
            document.getElementById('next-btn').classList.add('hidden');
            document.getElementById('hint-section').style.display = 'none';
            
            selectedOption = null;
            answered = false;
            
            updateProgress();
        }

        function selectOption(index) {
            if (answered) return;
            
            selectedOption = index;
            const options = document.querySelectorAll('.option');
            options.forEach((option, i) => {
                option.classList.remove('selected');
                if (i === index) {
                    option.classList.add('selected');
                }
            });
            
            document.getElementById('submit-btn').disabled = false;
        }

        function submitAnswer() {
            if (selectedOption === null || answered) return;
            
            answered = true;
            const question = questions[currentQuestion];
            const options = document.querySelectorAll('.option');
            const feedback = document.getElementById('feedback');
            
            options.forEach((option, index) => {
                if (index === question.answer) {
                    option.classList.add('correct');
                } else if (index === selectedOption && index !== question.answer) {
                    option.classList.add('incorrect');
                }
            });

            if (selectedOption === question.answer) {
                score += 5;
                correctCount++;
                streakCount++;
                if (streakCount > maxStreak) {
                    maxStreak = streakCount;
                }
                
                feedback.className = 'feedback correct';
                feedback.innerHTML = `
                    <div class="feedback-title">✅ 回答正确！</div>
                    <div class="knowledge-card">
                        <div class="knowledge-item"><strong>📚 考点：</strong>${question.knowledge.point}</div>
                        <div class="knowledge-item"><strong>📖 出处：</strong>${question.knowledge.source}</div>
                        <div class="knowledge-item"><strong>💡 关键记忆：</strong>${question.knowledge.key}</div>
                        <div class="knowledge-item"><strong>🔗 关联知识：</strong>${question.knowledge.link}</div>
                    </div>
                `;
                
                document.querySelector('.container').classList.add('celebrate');
                setTimeout(() => {
                    document.querySelector('.container').classList.remove('celebrate');
                }, 500);
            } else {
                streakCount = 0;
                wrongQuestions.push(question);
                
                feedback.className = 'feedback incorrect';
                feedback.innerHTML = `
                    <div class="feedback-title">❌ 回答错误</div>
                    <div class="knowledge-card">
                        <div class="knowledge-item"><strong>📚 考点：</strong>${question.knowledge.point}</div>
                        <div class="knowledge-item"><strong>📖 出处：</strong>${question.knowledge.source}</div>
                        <div class="knowledge-item"><strong>💡 关键记忆：</strong>${question.knowledge.key}</div>
                        <div class="knowledge-item"><strong>⚠️ 易错提醒：</strong>${question.knowledge.tip}</div>
                        <div class="knowledge-item"><strong>🔗 关联知识：</strong>${question.knowledge.link}</div>
                    </div>
                `;
            }

            updateStats();
            document.getElementById('submit-btn').classList.add('hidden');
            document.getElementById('next-btn').classList.remove('hidden');
        }

        function nextQuestion() {
            currentQuestion++;
            
            if (currentQuestion >= questions.length) {
                showResult();
            } else {
                loadQuestion();
            }
        }

        function updateStats() {
            document.getElementById('current-score').textContent = score;
            document.getElementById('correct-count').textContent = correctCount;
            document.getElementById('streak-count').textContent = streakCount;
        }

        function updateProgress() {
            const progress = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progress-fill').style.width = `${progress}%`;
            document.getElementById('progress-text').textContent = `${currentQuestion + 1}/${questions.length}`;
        }

        function showResult() {
            document.getElementById('question-container').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            
            const accuracy = Math.round((correctCount / questions.length) * 100);
            
            document.getElementById('final-score').textContent = `${score}分`;
            document.getElementById('final-correct').textContent = `${correctCount}/${questions.length}`;
            document.getElementById('final-accuracy').textContent = `${accuracy}%`;
            document.getElementById('final-streak').textContent = maxStreak;
            
            if (wrongQuestions.length > 0) {
                const weakPointsHtml = `
                    <h3>📝 需要加强的知识点</h3>
                    ${wrongQuestions.map(q => `
                        <div class="weak-point-item">
                            <strong>${q.knowledge.point}</strong><br>
                            <small>${q.knowledge.source}</small>
                        </div>
                    `).join('')}
                `;
                document.getElementById('weak-points').innerHTML = weakPointsHtml;
            } else {
                document.getElementById('weak-points').innerHTML = '<h3>🎉 太棒了！所有题目都答对了！</h3>';
            }
        }

        function restartQuiz() {
            currentQuestion = 0;
            score = 0;
            correctCount = 0;
            streakCount = 0;
            maxStreak = 0;
            wrongQuestions = [];
            answered = false;
            
            document.getElementById('result-screen').style.display = 'none';
            document.getElementById('question-container').style.display = 'block';
            
            updateStats();
            loadQuestion();
        }

        // 初始化
        loadQuestion();
    </script>
