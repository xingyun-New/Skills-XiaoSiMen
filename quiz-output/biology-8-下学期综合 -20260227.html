<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>八年级下学期生物练习题</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { font-size: 28px; margin-bottom: 10px; }
        .header p { opacity: 0.9; font-size: 14px; }
        .stats-bar {
            display: flex;
            justify-content: space-around;
            padding: 15px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }
        .stat-item { text-align: center; }
        .stat-value { font-size: 24px; font-weight: bold; color: #667eea; }
        .stat-label { font-size: 12px; color: #6c757d; }
        .progress-container {
            padding: 20px 30px;
            background: #fff;
        }
        .progress-bar {
            height: 8px;
            background: #e9ecef;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #11998e, #38ef7d);
            transition: width 0.3s ease;
            border-radius: 4px;
        }
        .progress-text {
            text-align: center;
            margin-top: 8px;
            font-size: 14px;
            color: #6c757d;
        }
        .question-container {
            padding: 30px;
        }
        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .question-number {
            font-size: 18px;
            font-weight: bold;
            color: #667eea;
        }
        .difficulty {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }
        .difficulty.easy { background: #d4edda; color: #155724; }
        .difficulty.medium { background: #fff3cd; color: #856404; }
        .difficulty.hard { background: #f8d7da; color: #721c24; }
        .question-text {
            font-size: 18px;
            line-height: 1.8;
            color: #212529;
            margin-bottom: 25px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            border-left: 4px solid #667eea;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option {
            padding: 15px 20px;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .option:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }
        .option.selected {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }
        .option.correct {
            border-color: #28a745;
            background: #28a745;
            color: white;
        }
        .option.incorrect {
            border-color: #dc3545;
            background: #dc3545;
            color: white;
        }
        .option-letter {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #e9ecef;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
        }
        .option.selected .option-letter,
        .option.correct .option-letter,
        .option.incorrect .option-letter {
            background: rgba(255,255,255,0.3);
            color: white;
        }
        .feedback {
            margin-top: 25px;
            padding: 20px;
            border-radius: 12px;
            display: none;
        }
        .feedback.correct {
            background: #d4edda;
            border: 2px solid #28a745;
            display: block;
        }
        .feedback.incorrect {
            background: #f8d7da;
            border: 2px solid #dc3545;
            display: block;
        }
        .feedback-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .knowledge-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-top: 15px;
        }
        .knowledge-card h4 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 16px;
        }
        .knowledge-item {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            font-size: 14px;
            line-height: 1.6;
        }
        .knowledge-item:last-child { margin-bottom: 0; }
        .knowledge-icon { flex-shrink: 0; }
        .btn-container {
            display: flex;
            gap: 12px;
            margin-top: 25px;
        }
        .btn {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        .btn-secondary:hover {
            background: #5a6268;
        }
        .hint-container {
            margin-top: 20px;
            padding: 15px;
            background: #fff3cd;
            border-radius: 12px;
            border-left: 4px solid #ffc107;
            display: none;
        }
        .hint-title {
            font-weight: bold;
            color: #856404;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .hint-text {
            color: #856404;
            font-size: 14px;
            line-height: 1.6;
        }
        .result-screen {
            padding: 40px 30px;
            text-align: center;
            display: none;
        }
        .result-screen.show { display: block; }
        .result-title {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 20px;
        }
        .result-score {
            font-size: 72px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 30px;
        }
        .result-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .result-stat {
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
        }
        .result-stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
        }
        .result-stat-label {
            font-size: 14px;
            color: #6c757d;
            margin-top: 5px;
        }
        .wrong-questions {
            text-align: left;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
        }
        .wrong-questions h4 {
            color: #dc3545;
            margin-bottom: 15px;
        }
        .wrong-item {
            padding: 10px;
            background: white;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .wrong-item:last-child { margin-bottom: 0; }
        .celebration {
            font-size: 60px;
            margin-bottom: 20px;
            animation: bounce 0.6s ease infinite alternate;
        }
        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-20px); }
        }
        .hidden { display: none; }
        .quiz-container { display: block; }
        .quiz-container.hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧬 八年级下学期生物练习</h1>
            <p>遗传与变异 · 生命的起源与进化 · 生态系统</p>
        </div>

        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="score">0</div>
                <div class="stat-label">得分</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="correct-count">0</div>
                <div class="stat-label">正确</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="streak">0</div>
                <div class="stat-label">连击</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="hint-used">0</div>
                <div class="stat-label">提示</div>
            </div>
        </div>

        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
            </div>
            <div class="progress-text" id="progress-text">第 1 / 10 题</div>
        </div>

        <div class="quiz-container" id="quiz-container">
            <div class="question-container">
                <div class="question-header">
                    <div class="question-number" id="question-number">第 1 题</div>
                    <div class="difficulty medium" id="difficulty">★★☆</div>
                </div>
                <div class="question-text" id="question-text"></div>
                <div class="options" id="options"></div>
                
                <div class="hint-container" id="hint-container">
                    <div class="hint-title">💡 提示</div>
                    <div class="hint-text" id="hint-text"></div>
                </div>

                <div class="feedback" id="feedback">
                    <div class="feedback-title" id="feedback-title"></div>
                    <div class="knowledge-card" id="knowledge-card"></div>
                </div>

                <div class="btn-container">
                    <button class="btn btn-secondary" id="hint-btn" onclick="showHint()">💡 看提示</button>
                    <button class="btn btn-primary" id="submit-btn" onclick="submitAnswer()" disabled>提交答案</button>
                    <button class="btn btn-primary hidden" id="next-btn" onclick="nextQuestion()">下一题 →</button>
                </div>
            </div>
        </div>

        <div class="result-screen" id="result-screen">
            <div class="celebration">🎉</div>
            <div class="result-title">练习完成！</div>
            <div class="result-score" id="final-score">0</div>
            <div class="result-stats">
                <div class="result-stat">
                    <div class="result-stat-value" id="final-correct">0</div>
                    <div class="result-stat-label">答对题数</div>
                </div>
                <div class="result-stat">
                    <div class="result-stat-value" id="final-accuracy">0%</div>
                    <div class="result-stat-label">正确率</div>
                </div>
                <div class="result-stat">
                    <div class="result-stat-value" id="final-streak">0</div>
                    <div class="result-stat-label">最高连击</div>
                </div>
            </div>
            <div class="wrong-questions" id="wrong-questions-container">
                <h4>❌ 错题回顾</h4>
                <div id="wrong-questions-list"></div>
            </div>
            <button class="btn btn-primary" onclick="restartQuiz()">🔄 重新练习</button>
        </div>
    </div>

    <script>
        const quizData = JSON.parse(document.getElementById('quiz-json').textContent);
        let currentQuestion = 0;
        let score = 0;
        let correctCount = 0;
        let streak = 0;
        let maxStreak = 0;
        let hintUsed = 0;
        let selectedOption = null;
        let answered = false;
        let wrongQuestions = [];
        let hintLevel = 0;

        function loadQuestion() {
            const q = quizData.questions[currentQuestion];
            document.getElementById('question-number').textContent = `第 ${currentQuestion + 1} 题`;
            document.getElementById('difficulty').textContent = q.difficultyText;
            document.getElementById('difficulty').className = `difficulty ${q.difficulty}`;
            document.getElementById('question-text').textContent = q.text;
            document.getElementById('progress-text').textContent = `第 ${currentQuestion + 1} / ${quizData.questions.length} 题`;
            document.getElementById('progress-fill').style.width = `${((currentQuestion) / quizData.questions.length) * 100}%`;
            
            const optionsHtml = q.options.map((opt, i) => `
                <div class="option" onclick="selectOption(${i})">
                    <div class="option-letter">${String.fromCharCode(65 + i)}</div>
                    <div class="option-text">${opt}</div>
                </div>
            `).join('');
            document.getElementById('options').innerHTML = optionsHtml;
            
            document.getElementById('feedback').className = 'feedback';
            document.getElementById('hint-container').style.display = 'none';
            document.getElementById('submit-btn').disabled = true;
            document.getElementById('submit-btn').classList.remove('hidden');
            document.getElementById('next-btn').classList.add('hidden');
            
            selectedOption = null;
            answered = false;
            hintLevel = 0;
        }

        function selectOption(index) {
            if (answered) return;
            selectedOption = index;
            document.querySelectorAll('.option').forEach((opt, i) => {
                opt.classList.toggle('selected', i === index);
            });
            document.getElementById('submit-btn').disabled = false;
        }

        function showHint() {
            if (answered) return;
            const q = quizData.questions[currentQuestion];
            if (hintLevel >= q.hints.length) return;
            
            hintUsed++;
            document.getElementById('hint-used').textContent = hintUsed;
            document.getElementById('hint-text').textContent = q.hints[hintLevel];
            document.getElementById('hint-container').style.display = 'block';
            hintLevel++;
        }

        function submitAnswer() {
            if (selectedOption === null || answered) return;
            answered = true;
            
            const q = quizData.questions[currentQuestion];
            const isCorrect = selectedOption === q.answer;
            const options = document.querySelectorAll('.option');
            
            options.forEach((opt, i) => {
                opt.style.pointerEvents = 'none';
                if (i === q.answer) {
                    opt.classList.add('correct');
                } else if (i === selectedOption && !isCorrect) {
                    opt.classList.add('incorrect');
                }
            });
            
            const feedback = document.getElementById('feedback');
            const feedbackTitle = document.getElementById('feedback-title');
            const knowledgeCard = document.getElementById('knowledge-card');
            
            if (isCorrect) {
                score += 10;
                correctCount++;
                streak++;
                if (streak > maxStreak) maxStreak = streak;
                feedback.className = 'feedback correct';
                feedbackTitle.innerHTML = '✅ 回答正确！';
            } else {
                streak = 0;
                wrongQuestions.push(q);
                feedback.className = 'feedback incorrect';
                feedbackTitle.innerHTML = '❌ 回答错误';
            }
            
            knowledgeCard.innerHTML = `
                <h4>📚 知识点卡片</h4>
                <div class="knowledge-item"><span class="knowledge-icon">📖</span><span><strong>考点：</strong>${q.knowledge.point}</span></div>
                <div class="knowledge-item"><span class="knowledge-icon">📖</span><span><strong>出处：</strong>${q.knowledge.source}</span></div>
                <div class="knowledge-item"><span class="knowledge-icon">💡</span><span><strong>关键记忆：</strong>${q.knowledge.keyPoint}</span></div>
                <div class="knowledge-item"><span class="knowledge-icon">⚠️</span><span><strong>易错提醒：</strong>${q.knowledge.mistake}</span></div>
                <div class="knowledge-item"><span class="knowledge-icon">🔗</span><span><strong>关联知识：</strong>${q.knowledge.link}</span></div>
            `;
            
            document.getElementById('score').textContent = score;
            document.getElementById('correct-count').textContent = correctCount;
            document.getElementById('streak').textContent = streak;
            
            document.getElementById('submit-btn').classList.add('hidden');
            document.getElementById('next-btn').classList.remove('hidden');
        }

        function nextQuestion() {
            currentQuestion++;
            if (currentQuestion >= quizData.questions.length) {
                showResult();
            } else {
                loadQuestion();
            }
        }

        function showResult() {
            document.getElementById('quiz-container').classList.add('hidden');
            document.getElementById('result-screen').classList.add('show');
            document.getElementById('progress-fill').style.width = '100%';
            document.getElementById('progress-text').textContent = '练习完成！';
            
            const accuracy = Math.round((correctCount / quizData.questions.length) * 100);
            document.getElementById('final-score').textContent = score;
            document.getElementById('final-correct').textContent = `${correctCount}/${quizData.questions.length}`;
            document.getElementById('final-accuracy').textContent = `${accuracy}%`;
            document.getElementById('final-streak').textContent = maxStreak;
            
            const wrongList = document.getElementById('wrong-questions-list');
            if (wrongQuestions.length > 0) {
                wrongList.innerHTML = wrongQuestions.map(q => `
                    <div class="wrong-item">
                        <strong>第${q.id}题：</strong>${q.text.substring(0, 50)}...<br>
                        <span style="color: #28a745;">正确答案：${String.fromCharCode(65 + q.answer)}</span>
                    </div>
                `).join('');
            } else {
                document.getElementById('wrong-questions-container').style.display = 'none';
            }
        }

        function restartQuiz() {
            currentQuestion = 0;
            score = 0;
            correctCount = 0;
            streak = 0;
            maxStreak = 0;
            hintUsed = 0;
            wrongQuestions = [];
            
            document.getElementById('score').textContent = '0';
            document.getElementById('correct-count').textContent = '0';
            document.getElementById('streak').textContent = '0';
            document.getElementById('hint-used').textContent = '0';
            
            document.getElementById('result-screen').classList.remove('show');
            document.getElementById('quiz-container').classList.remove('hidden');
            document.getElementById('wrong-questions-container').style.display = 'block';
            
            loadQuestion();
        }

        loadQuestion();
    </script>
