            if (isNaN(answer)) {

            const q = questions[currentQuestion];
            const isCorrect = Math.abs(answer - q.correct) < 0.1;

                input.style.borderColor = '#4caf50';
                input.style.backgroundColor = '#e8f5e9';

                    yourAnswer: answer
                });
            }
            
            showFeedback(isCorrect);
        }

            document.getElementById('next-btn').disabled = false;
        }

            const feedbackBox = document.getElementById('feedback');
            const knowledgeBox = document.getElementById('knowledge');
            
            feedbackBox.style.display = 'block';
            knowledgeBox.style.display = 'block';
            
            if (isCorrect === false) {
                wrongList.push({
                    number: questions[currentQuestion].number,
                    text: questions[currentQuestion].text,
                    correctAnswer: questions[currentQuestion].options[questions[currentQuestion].correct]
                });
            }
            
            document.getElementById('next-btn').disabled = false;
        }

        function nextQuestion() {
            const q = questions[currentQuestion];
            
            if (q.type === '选择题' || q.type === '判断题') {
                const options = document.querySelectorAll('.option');
                const isCorrect = selectedOption === q.correct;
                
                if (isCorrect) {
                    score += 10;
                    options[selectedOption].classList.add('correct');
                } else {
                    options[selectedOption].classList.add('incorrect');
                    options[q.correct].classList.add('correct');
                    wrongList.push({
                        number: q.number,
                        text: q.text,
                        correctAnswer: q.options[q.correct]
                    });
                }
                
                options.forEach(opt => opt.style.cursor = 'default');
            }
            
            showFeedback(selectedOption === q.correct);
            
            setTimeout(() => {
                currentQuestion++;
                if (currentQuestion < questions.length) {
                    selectedOption = null;
                    document.getElementById('next-btn').disabled = true;
                    renderQuestion();
                } else {
                    showResult();
                }
            }, 1500);
        }

        function showResult() {
            document.getElementById('quiz-screen').style.display = 'none';

            const timeTaken = Math.floor((endTime - startTime) / 1000);

            document.getElementById('correct-count').textContent = Math.round(score / 10);
            document.getElementById('accuracy').textContent = Math.round((score / 100) * 100) + '%';
            document.getElementById('time-taken').textContent = timeTaken;

            // 飞书同步
            if (typeof FeishuSync !== 'undefined') {
                FeishuSync.submit({
                    practiceTitle: document.title,
                    questionCount: questions.length,
                    score: score / 10,
                    accuracy: Math.round((score / (questions.length * 10)) * 100),

                    statusElId: 'syncStatus',
                    textElId: 'syncText'
                });
                
                if (wrongList.length > 0) {
