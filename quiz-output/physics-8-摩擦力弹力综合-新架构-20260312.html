{"title":"八年级物理 · 摩擦力弹力综合练习","questions":[{"id":1,"type":"choice","difficulty":1,"question":"下列关于弹力的说法，正确的是","options":["只要两个物体接触就一定产生弹力","弹力的产生条件是物体相互接触并发生弹性形变","弹力的大小一定与物体的重力成正比","弹力只能由弹簧产生，其他物体不能产生弹力"],"answer":1,"diagram":{"type":"force","title":"弹簧挂重物受力示意图","scene":{"bodyLabel":"重物","surface":"none","forces":[{"direction":"up","label":"F弹","color":"#ff9800"},{"direction":"down","label":"G","color":"#ef5350"}]}},"hints":["💡 方向提示：本题考查弹力的产生条件，属于第七章「力」的内容","📖 关键知识：弹力产生需要同时满足两个条件——①物体相互接触 ②接触处发生弹性形变","🎯 解题思路：A选项只提到接触未提到形变，不完整；C、D说法过于绝对，只有B同时包含两个条件"],"knowledgeCard":{"topic":"弹力的产生条件","source":"人教版八年级下册 第七章 第2节","formula":"弹力产生条件：①直接接触 ②发生弹性形变","keyMemory":"弹力的产生需要两个条件同时满足：物体相互接触且发生弹性形变，缺一不可","commonMistake":"接触不一定有弹力，只有接触处发生了弹性形变才会产生弹力","relatedTopics":"弹簧测力计、弹性形变与塑性形变、重力与弹力的关系"}},{"id":2,"type":"choice","difficulty":1,"question":"使用弹簧测力计测量力时，下列操作正确的是","options":["可以超过量程使用，只需读数准确即可","测量前不需要校零，直接挂上物体测量","测量时应使弹簧测力计的弹簧轴线方向与被测力的方向一致","读数时视线可以斜着看刻度盘"],"answer":2,"diagram":{"type":"force","title":"弹簧测力计测量重力","scene":{"bodyLabel":"钩码","surface":"none","forces":[{"direction":"up","label":"F弹","color":"#ff9800"},{"direction":"down","label":"G","color":"#ef5350"}]}},"hints":["💡 方向提示：本题考查弹簧测力计的正确使用方法","📖 关键知识：弹簧测力计使用三要点——看量程、调零、弹簧轴线与力的方向一致","🎯 解题思路：A超量程会损坏弹簧；B不校零读数不准；D视线应垂直刻度盘；只有C是正确操作"],"knowledgeCard":{"topic":"弹簧测力计的使用","source":"人教版八年级下册 第七章 第2节","formula":"F = kx（胡克定律，弹簧测力计的工作原理）","keyMemory":"使用弹簧测力计三步骤：①观察量程和分度值 ②校零 ③使弹簧轴线与力的方向一致","commonMistake":"忘记校零导致读数偏大或偏小，或者弹簧轴线与力的方向不一致导致测量不准","relatedTopics":"弹力、胡克定律、力的测量"}},{"id":3,"type":"choice","difficulty":2,"question":"小明用弹簧测力计拉着木块在水平桌面上做匀速直线运动，以下哪种方法能增大木块受到的滑动摩擦力？","options":["在木块上面再放一个砝码","增大拉力使木块加速运动","减小木块与桌面的接触面积","增大木块的运动速度"],"answer":0,"diagram":{"type":"force","title":"木块在水平面上匀速运动受力图","scene":{"bodyLabel":"木块","surface":"rough","forces":[{"direction":"up","label":"F支","color":"#42a5f5"},{"direction":"down","label":"G","color":"#ef5350"},{"direction":"right","label":"F拉","color":"#ab47bc"},{"direction":"left","label":"f","color":"#66bb6a"}]}},"hints":["💡 方向提示：本题考查影响滑动摩擦力大小的因素","📖 关键知识：滑动摩擦力大小只与压力和接触面粗糙程度有关，与接触面积、速度无关","🎯 解题思路：放砝码增大了压力（正压力），从而增大摩擦力；B、D改变速度不影响摩擦力；C改变面积也不影响"],"knowledgeCard":{"topic":"影响滑动摩擦力大小的因素","source":"人教版八年级下册 第八章 第3节","formula":"f = μN（滑动摩擦力 = 动摩擦因数 × 正压力）","keyMemory":"滑动摩擦力只与两个因素有关：①压力大小 ②接触面粗糙程度。与接触面积和速度无关","commonMistake":"误以为接触面积越大摩擦力越大，或运动速度越快摩擦力越大","relatedTopics":"静摩擦力、增大和减小摩擦力的方法"}},{"id":4,"type":"choice","difficulty":2,"question":"一个木块放在粗糙水平面上，用逐渐增大的水平推力推木块，但木块始终静止不动。关于此时木块受到的摩擦力，下列说法正确的是","options":["木块受到的摩擦力大小始终不变","木块受到的摩擦力大于推力","木块没有受到摩擦力的作用","木块受到的静摩擦力随推力的增大而增大"],"answer":3,"diagram":{"type":"force","title":"木块静止在粗糙水平面上受力图","scene":{"bodyLabel":"木块","surface":"rough","forces":[{"direction":"up","label":"F支","color":"#42a5f5"},{"direction":"down","label":"G","color":"#ef5350"},{"direction":"right","label":"F推","color":"#ab47bc"},{"direction":"left","label":"f静","color":"#66bb6a"}]}},"hints":["💡 方向提示：本题考查静摩擦力的特点，注意物体处于静止平衡状态","📖 关键知识：静止的物体受力平衡，水平方向上推力与静摩擦力大小相等、方向相反","🎯 解题思路：物体静止说明合力为零，推力增大则静摩擦力也必须增大才能保持平衡，选D"],"knowledgeCard":{"topic":"静摩擦力的特点","source":"人教版八年级下册 第八章 第3节","formula":"物体静止时：F推 = f静（水平方向二力平衡）","keyMemory":"静摩擦力的大小会随外力的增大而增大，始终等于使物体运动趋势的外力，直到达到最大静摩擦力","commonMistake":"误以为静摩擦力是固定不变的，实际上静摩擦力是「被动力」，会随外力变化而变化","relatedTopics":"滑动摩擦力、力的平衡、最大静摩擦力"}},{"id":5,"type":"choice","difficulty":2,"question":"一个物体在水平地面上向右滑动，该物体受到的滑动摩擦力的方向是","options":["向右","向左","向上","向下"],"answer":1,"diagram":{"type":"force","title":"物体向右滑动时受力示意图","scene":{"bodyLabel":"物体","surface":"rough","forces":[{"direction":"up","label":"F支","color":"#42a5f5"},{"direction":"down","label":"G","color":"#ef5350"},{"direction":"left","label":"f","color":"#66bb6a"}]}},"hints":["💡 方向提示：本题考查滑动摩擦力方向的判断方法","📖 关键知识：滑动摩擦力的方向与物体相对运动方向相反","🎯 解题思路：物体向右滑动，相对运动方向向右，所以摩擦力方向向左，选B"],"knowledgeCard":{"topic":"摩擦力方向的判断","source":"人教版八年级下册 第八章 第3节","formula":"滑动摩擦力方向与物体相对运动方向相反","keyMemory":"判断摩擦力方向的关键词是「相对运动方向」，摩擦力总是阻碍物体间的相对运动","commonMistake":"误以为摩擦力一定与运动方向相反，实际应是与「相对运动方向」相反（如传送带上的物体）","relatedTopics":"滑动摩擦力、静摩擦力方向、二力平衡"}},{"id":6,"type":"truefalse","difficulty":1,"question":"自行车刹车时用力捏闸，是通过减小接触面粗糙程度来增大摩擦力的。","answer":false,"diagram":{"type":"force","title":"刹车片与车轮接触受力图","scene":{"bodyLabel":"刹车片","surface":"rough","forces":[{"direction":"up","label":"F支","color":"#42a5f5"},{"direction":"down","label":"F压","color":"#ab47bc"},{"direction":"left","label":"f","color":"#66bb6a"}]}},"hints":["💡 方向提示：本题考查增大摩擦力的方法，需要区分两种方式","📖 关键知识：增大摩擦力有两种方法——增大压力或增大接触面粗糙程度","🎯 解题思路：用力捏闸增大的是刹车片对车轮的压力，而不是改变粗糙程度，所以说法错误"],"knowledgeCard":{"topic":"增大和减小摩擦力的方法","source":"人教版八年级下册 第八章 第3节","formula":"f = μN，增大f的方法：增大μ（粗糙程度）或增大N（压力）","keyMemory":"捏闸 → 增大压力 → 增大摩擦力；轮胎花纹 → 增大粗糙程度 → 增大摩擦力","commonMistake":"混淆「增大压力」和「增大粗糙程度」两种增大摩擦力的方法","relatedTopics":"滑动摩擦力的影响因素、生活中的摩擦力应用"}},{"id":7,"type":"choice","difficulty":2,"question":"关于弹力和重力，下列说法正确的是","options":["弹力和重力都是由于地球吸引而产生的","物体受到的弹力方向总是竖直向上的","重力的施力物体是地球，弹力的施力物体是发生形变的物体","物体受到的弹力大小一定等于物体的重力"],"answer":2,"diagram":{"type":"force","title":"书本放在桌面上的受力图","scene":{"bodyLabel":"书本","surface":"smooth","forces":[{"direction":"up","label":"F支(弹力)","color":"#ff9800"},{"direction":"down","label":"G(重力)","color":"#ef5350"}]}},"hints":["💡 方向提示：本题考查弹力和重力的本质区别，需要从力的产生原因分析","📖 关键知识：重力是由于地球吸引产生的，弹力是由于物体弹性形变产生的，施力物体不同","🎯 解题思路：A错在弹力不是地球吸引产生的；B弹力方向不一定竖直向上；D只在特定条件下成立；C正确"],"knowledgeCard":{"topic":"弹力与重力的区别","source":"人教版八年级下册 第七章 第1-2节","formula":"G = mg（重力公式），弹力由弹性形变产生","keyMemory":"重力施力物体是地球、弹力施力物体是发生形变的物体；重力方向竖直向下、弹力方向与形变方向相反","commonMistake":"将支持力的施力物体误认为是地球，实际上支持力是弹力，施力物体是支撑面","relatedTopics":"力的分类、重力、弹力、力的三要素"}},{"id":8,"type":"choice","difficulty":3,"question":"一个重为10N的木块在水平桌面上被5N的水平拉力拉着做匀速直线运动。此时木块受到的滑动摩擦力大小为","options":["5N","10N","15N","0N"],"answer":0,"diagram":{"type":"force","title":"木块匀速直线运动受力分析","scene":{"bodyLabel":"木块","surface":"rough","forces":[{"direction":"up","label":"F支=10N","color":"#42a5f5"},{"direction":"down","label":"G=10N","color":"#ef5350"},{"direction":"right","label":"F拉=5N","color":"#ab47bc"},{"direction":"left","label":"f=?","color":"#66bb6a"}]}},"hints":["💡 方向提示：本题考查匀速直线运动中的二力平衡，属于力学核心考点","📖 关键知识：匀速直线运动的物体处于平衡状态，受到的合力为零。水平方向：F拉 = f","🎯 解题思路：匀速直线运动 → 合力为零 → 水平方向拉力与摩擦力平衡 → f = F拉 = 5N"],"knowledgeCard":{"topic":"二力平衡与匀速直线运动","source":"人教版八年级下册 第八章 第2节","formula":"匀速直线运动时：F合 = 0，即 F拉 = f（水平方向），F支 = G（竖直方向）","keyMemory":"匀速直线运动 = 平衡状态 = 合力为零。水平方向上拉力等于摩擦力，竖直方向上支持力等于重力","commonMistake":"误以为物体运动就需要拉力大于摩擦力。匀速直线运动时拉力恰好等于摩擦力","relatedTopics":"牛顿第一定律、惯性、力的平衡条件"}},{"id":9,"type":"fillblank","difficulty":2,"question":"在弹性限度内，弹簧的弹力大小与弹簧的______成正比，这就是胡克定律。已知一根弹簧的劲度系数为100N/m，当弹簧被拉长了0.05m时，弹簧的弹力大小为______N。","answer":["形变量；5"],"diagram":{"type":"force","title":"弹簧被拉伸时的受力图","scene":{"bodyLabel":"弹簧","surface":"none","forces":[{"direction":"left","label":"F固定","color":"#42a5f5"},{"direction":"right","label":"F拉","color":"#ab47bc"}]}},"hints":["💡 方向提示：本题考查胡克定律及其计算应用","📖 关键知识：胡克定律 F = kx，其中k是劲度系数，x是形变量（伸长量或压缩量）","🎯 解题思路：第一空填「形变量」；第二空用 F = kx = 100 × 0.05 = 5N"],"knowledgeCard":{"topic":"胡克定律","source":"人教版八年级下册 第七章 第2节","formula":"F = kx（F为弹力，k为劲度系数，x为形变量）","keyMemory":"在弹性限度内，弹簧弹力与形变量成正比。形变量 = 当前长度 - 原长","commonMistake":"混淆「形变量」和「弹簧长度」。形变量是弹簧伸长或压缩的量，不是弹簧的总长度","relatedTopics":"弹力、弹簧测力计原理、弹性限度"}},{"id":10,"type":"truefalse","difficulty":3,"question":"人走路时，后脚蹬地，地面对脚的摩擦力方向向前，这个摩擦力是静摩擦力。","answer":true,"diagram":{"type":"force","title":"人走路时后脚受力分析","scene":{"bodyLabel":"脚","surface":"rough","forces":[{"direction":"up","label":"F支","color":"#42a5f5"},{"direction":"down","label":"G","color":"#ef5350"},{"direction":"right","label":"f静","color":"#66bb6a"}]}},"hints":["💡 方向提示：本题考查生活中摩擦力的应用，需要判断摩擦力的类型和方向","📖 关键知识：走路时脚蹬地向后，脚相对地面有向后的运动趋势，地面给脚向前的静摩擦力","🎯 解题思路：走路时脚与地面没有相对滑动，所以是静摩擦力；脚蹬地向后，摩擦力方向向前，说法正确"],"knowledgeCard":{"topic":"生活中的摩擦力应用","source":"人教版八年级下册 第八章 第3节","formula":"静摩擦力方向与物体运动趋势方向相反","keyMemory":"人走路靠的是静摩擦力：脚蹬地向后 → 运动趋势向后 → 静摩擦力向前 → 人前进","commonMistake":"误以为走路时脚与地面之间是滑动摩擦力，或误认为摩擦力方向向后","relatedTopics":"静摩擦力与滑动摩擦力的区别、摩擦力的方向判断"}}]}

<script>
(function () {
  var quizData = JSON.parse(document.getElementById('quiz-json').textContent);
  var dirToAngle = { up: -90, down: 90, left: 180, right: 0, 'up-left': -135, 'up-right': -45, 'down-left': 135, 'down-right': 45 };

  function renderDiagram(diagram, question) {
    if (!diagram || typeof PhySVG === 'undefined') return '';
    var scene = diagram.scene || {};
    var forces = scene.forces || [];
    var ctx = PhySVG.createSVG(360, 220);
    var cx = 180, cy = 115;
    var hasGround = scene.surface && scene.surface !== 'none';
    if (hasGround) {
      PhySVG.ground(ctx, 70, 290, 165, scene.surface === 'rough');
      PhySVG.block(ctx, 135, 99, 90, 66, scene.bodyLabel || '物体');
      cy = 132;
    } else {
      var isCircle = /重物|钩码|球|质点/.test(scene.bodyLabel || '');
      if (isCircle) PhySVG.circle(ctx, 180, 115, 28, scene.bodyLabel);
      else PhySVG.block(ctx, 150, 85, 60, 60, scene.bodyLabel || '物体');
    }
    forces.forEach(function (f) {
      var angle = f.angle != null ? f.angle : (dirToAngle[f.direction] != null ? dirToAngle[f.direction] : -90);
      var len = f.length != null ? f.length : 52;
      PhySVG.forceArrow(ctx, cx, cy, angle, len, f.label || 'F', f.color || '#ef5350');
    });
    return ctx.svg.outerHTML;
  }

  QuizEngine.init({ data: quizData, renderDiagram: renderDiagram });
})();
</script>
