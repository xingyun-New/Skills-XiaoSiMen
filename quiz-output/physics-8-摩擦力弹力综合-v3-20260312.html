            const container = document.getElementById('questions-container');
            const q = questions[currentQuestion];
            container.innerHTML = `

                    <div class="question-number">第${q.number}题</div>
                    <div class="question-text">${q.text}</div>
                    ${q.diagram ? `<div class="diagram-container">${q.diagram}</div>` : ''}

                    </ul>
                    <div class="feedback" id="feedback"></div>
                </div>`;
            document.getElementById('current-q').textContent = currentQuestion + 1;
            document.getElementById('progress-fill').style.width = `${(currentQuestion / questions.length) * 100}%`;
            document.getElementById('next-btn').disabled = true;
            selectedOption = null;
        }

        function toggleHint(hintBox) {
            hintBox.querySelector('.hint-content').classList.toggle('show');
        }

        function selectOption(index) {
            if (document.getElementById('feedback').style.display === 'block') return;
            document.querySelectorAll('.option').forEach((opt, i) => {
                opt.classList.remove('selected');
                if (i === index) opt.classList.add('selected');
            });
            selectedOption = index;
            document.getElementById('next-btn').disabled = false;
        }

        function nextQuestion() {
            const q = questions[currentQuestion];
            const feedback = document.getElementById('feedback');
            document.querySelectorAll('.option').forEach((opt, i) => {
                if (i === q.correct) opt.classList.add('correct');
                else if (i === selectedOption && i !== q.correct) opt.classList.add('incorrect');
            });
            if (selectedOption === q.correct) {
                score += 10;
                feedback.className = 'feedback';
                feedback.innerHTML = `<div class="feedback-title">✅ 正确！</div><div class="feedback-text">${q.feedback}</div><div class="knowledge-point"><div class="knowledge-title">📌 知识点</div>${q.knowledge}</div>`;
            } else {
                wrongList.push({ question: q.text, correctAnswer: q.options[q.correct], studentAnswer: q.options[selectedOption], topic: q.knowledge });
                feedback.className = 'feedback incorrect';
                feedback.innerHTML = `<div class="feedback-title">❌ 错误（正确答案：${String.fromCharCode(65 + q.correct)}）</div><div class="feedback-text">${q.feedback}</div><div class="knowledge-point"><div class="knowledge-title">📌 知识点</div>${q.knowledge}</div>`;
            }
            feedback.style.display = 'block';
            setTimeout(() => { currentQuestion++; currentQuestion < questions.length ? renderQuestion() : showResult(); }, 4000);
        }

        function showResult() {
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            document.getElementById('progress-fill').style.width = '100%';
            const timeTaken = Math.floor((Date.now() - startTime) / 1000);
            const correctCount = score / 10;
            const acc = Math.round((correctCount / questions.length) * 100);
            document.getElementById('final-score').textContent = score;
            document.getElementById('correct-count').textContent = correctCount;
            document.getElementById('accuracy').textContent = acc + '%';
            document.getElementById('time-taken').textContent = timeTaken;
            if (typeof FeishuSync !== 'undefined') {
