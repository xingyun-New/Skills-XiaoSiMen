        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .header p {
            font-size: 16px;
            opacity: 0.95;
        }
        
        .progress-bar {
            background: #f0f0f0;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e0e0e0;
        }
        
        .progress-info {
            flex: 1;
        }
        
        .progress-text {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }
        
        .progress-track {
            background: #e0e0e0;
            height: 12px;
            border-radius: 6px;
            overflow: hidden;
        }
        
        .progress-fill {
            background: linear-gradient(90deg, #667eea, #764ba2);
            height: 100%;
            transition: width 0.5s ease;
            border-radius: 6px;
        }
        
        .stats {
            display: flex;
            gap: 20px;
            margin-left: 20px;
        }
        
        .stat-item {
            text-align: center;
            padding: 10px 15px;
            background: #f8f9fa;
            border-radius: 10px;
            min-width: 80px;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }
        
        .question-container {
            padding: 40px 30px;
            min-height: 400px;
        }
        
        .question {
            display: none;
        }
        
        .question.active {
            display: block;
        }
        
        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .question-type {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }
        
        .question-difficulty {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #666;
            font-size: 14px;
        }
        
        .stars {
            color: #ffc107;
            font-size: 18px;
        }
        
        .question-text {
            font-size: 18px;
            line-height: 1.8;
            margin-bottom: 25px;
            color: #2c3e50;
        }
        
        .options {
            display: grid;
            gap: 15px;
        }
        
        .option {
            padding: 18px 20px;
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
        }
        
        .option:hover {
            background: #e8e9ea;
            border-color: #667eea;
            transform: translateX(5px);
        }
        
        .option.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .option.correct {
            background: #4caf50;
            color: white;
            border-color: #4caf50;
        }
        
        .option.incorrect {
            background: #f44336;
            color: white;
            border-color: #f44336;
        }
        
        .feedback {
            margin-top: 25px;
            padding: 25px;
            border-radius: 12px;
            display: none;
        }
        
        .feedback.correct {
            background: #e8f5e9;
            border: 2px solid #4caf50;
            display: block;
        }
        
        .feedback.incorrect {
            background: #ffebee;
            border: 2px solid #f44336;
            display: block;
        }
        
        .feedback-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .feedback-title.correct {
            color: #2e7d32;
        }
        
        .feedback-title.incorrect {
            color: #c62828;
        }
        
        .knowledge-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-top: 15px;
        }
        
        .knowledge-item {
            margin-bottom: 12px;
            line-height: 1.6;
        }
        
        .knowledge-item strong {
            color: #667eea;
        }
        
        .hint-section {
            margin-top: 20px;
            padding: 20px;
            background: #fff3cd;
            border: 2px solid #ffc107;
            border-radius: 10px;
            display: none;
        }
        
        .hint-section.show {
            display: block;
        }
        
        .hint-title {
            font-weight: bold;
            color: #856404;
            margin-bottom: 10px;
        }
        
        .hint-content {
            color: #856404;
            line-height: 1.6;
        }
        
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #f0f0f0;
        }
        
        .hint-btn {
            background: #ffc107;
            color: #333;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .hint-btn:hover {
            background: #ffca2c;
            transform: translateY(-2px);
        }
        
        .hint-btn:disabled {
            background: #e0e0e0;
            cursor: not-allowed;
            transform: none;
        }
        
        .next-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .next-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        
        .next-btn:disabled {
            background: #e0e0e0;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .result-screen {
            display: none;
            padding: 40px 30px;
            text-align: center;
        }
        
        .result-screen.show {
            display: block;
        }
        
        .result-title {
            font-size: 36px;
            margin-bottom: 30px;
            color: #2c3e50;
        }
        
        .result-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .result-stat {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }
        
        .result-stat-value {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .result-stat-label {
            font-size: 16px;
            opacity: 0.9;
        }
        
        .weakness-section {
            background: #fff3cd;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            text-align: left;
        }
        
        .weakness-title {
            font-size: 20px;
            font-weight: bold;
            color: #856404;
            margin-bottom: 15px;
        }
        
        .weakness-list {
            list-style: none;
        }
        
        .weakness-list li {
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
            color: #856404;
        }
        
        .restart-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            padding: 16px 40px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .restart-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(245, 87, 108, 0.4);
        }
        
        .celebration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
            display: none;
        }
        
        .celebration.show {
            display: block;
        }
        
        @media (max-width: 768px) {
            .header h1 {
                font-size: 24px;
            }
            
            .stats {
                flex-wrap: wrap;
                gap: 10px;
            }
            
            .stat-item {
                min-width: 60px;
                padding: 8px 12px;
            }
            
            .question-text {
                font-size: 16px;
            }
            
            .option {
                padding: 14px 16px;
                font-size: 14px;
            }
        }
    </style>
</head>

        <div class="header">

        </div>

            </div>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="scoreValue">0</div>

                    <div class="stat-value" id="correctValue">0</div>

                <div class="stat-item">

            </div>
        </div>
        
        <div class="question-container" id="questionContainer">

        </div>
        
        <div class="result-screen" id="resultScreen">
            <h2 class="result-title">🎉 练习完成！</h2>
            <div class="result-stats">
                <div class="result-stat">
                    <div class="result-stat-value" id="finalScore">0</div>
                    <div class="result-stat-label">总得分</div>
                </div>

                <div class="result-stat">

                <ul class="weakness-list" id="weaknessList">
                </ul>
            </div>
            
            <button class="restart-btn" onclick="restartQuiz()">重新练习</button>
        </div>
    </div>
    
    <div class="celebration" id="celebration"></div>

        "关联知识": "《桃花源记》通假字：要→邀、具→俱"

        "A 项「要」通「邀」，B 项「具」通「俱」",
        "D 项出自《陈涉世家》，「唱」通「倡」"

      "text": "下列文学常识表述不正确的一项是（ ）",

        "B. 《桃花源记》是陶渊明的代表作之一，选自《陶渊明集》",
        "C. 陶渊明被称为「五柳先生」，是我国第一位山水诗人",
        "D. 「世外桃源」这个成语出自《桃花源记》，比喻理想中的美好世界"

      "answer": "C",
      "explanation": "C 项错误。陶渊明是我国第一位田园诗人，不是山水诗人。山水诗人的代表是谢灵运。",
      "knowledge": {

        "出处": "人教版八年级下册 第三单元 第 9 课",
        "关键记忆": "陶渊明：东晋、田园诗人、五柳先生、《归园田居》《饮酒》",
        "易错提醒": "区分「田园诗人」和「山水诗人」",
        "关联知识": "陶渊明其他作品：《归园田居》《饮酒》《归去来兮辞》"
      },
      "hints": [

        "「山水诗人」的代表人物是南朝的谢灵运",

        "B. 文章虚实结合，既写了桃花源的实景，又写了作者的想象",
        "C. 文章语言简洁生动，如「豁然开朗」「怡然自乐」「无人问津」等成语流传至今",
        "D. 文章采用对比手法，将桃花源的安宁和乐与外界的战乱动荡形成对比"

        "易错提醒": "桃花源是虚构的，不是真实存在的实景",
        "关联知识": "出自本文的成语：世外桃源、豁然开朗、怡然自乐、无人问津、落英缤纷"
      },
      "hints": [
        "思考：桃花源在现实中存在吗？",
        "作者写桃花源的目的是什么？",

    </script>
    
    <script>
        let quizData = JSON.parse(document.getElementById('quiz-json').textContent);
        let currentQuestionIndex = 0;
        let score = 0;
        let correctCount = 0;
        let streak = 0;
        let wrongQuestions = [];
        let knowledgePoints = {};
        
        function initQuiz() {
            const container = document.getElementById('questionContainer');
            container.innerHTML = '';
            
            quizData.questions.forEach((q, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = `question ${index === 0 ? 'active' : ''}`;
                questionDiv.id = `question-${index}`;
                
                let difficultyStars = '';
                for (let i = 0; i < 5; i++) {
                    difficultyStars += i < q.difficulty ? '★' : '☆';
                }
                
                let optionsHtml = '';
                if (q.type === '选择题' || q.type === '判断题') {
                    optionsHtml = '<div class="options">';
                    q.options.forEach((opt, optIndex) => {
                        const optionLabel = String.fromCharCode(65 + optIndex);
                        optionsHtml += `<div class="option" data-option="${optionLabel}" onclick="selectOption(this, '${optionLabel}')">${optionLabel}. ${opt}</div>`;
                    });
                    optionsHtml += '</div>';
                } else if (q.type === '填空题') {
                    optionsHtml = `
                        <div style="margin-bottom: 20px;">
                            <input type="text" id="fill-input-${index}" placeholder="请输入答案" 
                                style="width: 100%; padding: 15px; font-size: 16px; border: 2px solid #e0e0e0; border-radius: 8px;" />
                        </div>
                        <button onclick="submitFillAnswer()" class="next-btn" style="width: 100%;">提交答案</button>
                    `;
                } else if (q.type === '材料分析题') {
                    optionsHtml = '<div class="options">';
                    q.subQuestions.forEach((subQ, subIndex) => {
                        optionsHtml += `
                            <div style="margin-bottom: 20px;">
                                <p style="font-weight: bold; margin-bottom: 10px; color: #667eea;">第${subIndex + 1}小问：${subQ.text}</p>
                                <input type="text" id="material-input-${index}-${subIndex}" placeholder="请输入答案" 
                                    style="width: 100%; padding: 12px; font-size: 15px; border: 2px solid #e0e0e0; border-radius: 8px;" />
                            </div>
                        `;
                    });
                    optionsHtml += '</div>';
                    optionsHtml += `<button onclick="submitMaterialAnswer(${q.subQuestions.length})" class="next-btn" style="width: 100%;">提交答案</button>`;
                }
                
                questionDiv.innerHTML = `
                    <div class="question-header">
                        <span class="question-type">${q.type}</span>
                        <div class="question-difficulty">
                            <span>难度：</span>
                            <span class="stars">${difficultyStars}</span>
                        </div>
                    </div>
                    <div class="question-text">${q.text}</div>
                    ${optionsHtml}
                    <div class="feedback" id="feedback-${index}">
                        <div class="feedback-title" id="feedback-title-${index}"></div>
                        <div class="knowledge-card">
                            <div class="knowledge-item"><strong>📚 考点：</strong>${q.knowledge.考点}</div>
                            <div class="knowledge-item"><strong>📖 出处：</strong>${q.knowledge.出处}</div>
                            <div class="knowledge-item"><strong>💡 关键记忆：</strong>${q.knowledge.关键记忆}</div>
                            <div class="knowledge-item"><strong>⚠️ 易错提醒：</strong>${q.knowledge.易错提醒}</div>
                            <div class="knowledge-item"><strong>🔗 关联知识：</strong>${q.knowledge.关联知识}</div>
                        </div>
                    </div>
                    <div class="hint-section" id="hint-${index}">
                        <div class="hint-title">💡 提示（将扣除部分分数）：</div>
                        <div class="hint-content" id="hint-content-${index}"></div>
                    </div>
                    <div class="controls">
                        <button class="hint-btn" onclick="showHint(${index})" id="hint-btn-${index}">💡 使用提示</button>
                        <button class="next-btn" onclick="nextQuestion()" id="next-btn-${index}" disabled>下一题</button>
                    </div>
                `;
                
                container.appendChild(questionDiv);
            });
            
            updateProgress();
        }
        
        function selectOption(element, option) {
            const currentQuestion = quizData.questions[currentQuestionIndex];
            const options = element.parentElement.querySelectorAll('.option');
            options.forEach(opt => opt.classList.remove('selected'));
            element.classList.add('selected');
            
            const feedback = document.getElementById(`feedback-${currentQuestionIndex}`);
            const feedbackTitle = document.getElementById(`feedback-title-${currentQuestionIndex}`);
            const nextBtn = document.getElementById(`next-btn-${currentQuestionIndex}`);
            
            if (option === currentQuestion.answer) {
                element.classList.add('correct');
                feedback.className = 'feedback correct';
                feedbackTitle.className = 'feedback-title correct';
                feedbackTitle.innerHTML = '✅ 回答正确！';
                
                let hintCount = parseInt(element.dataset.hints || '0');
                let pointsEarned = 10 - hintCount * 3;
                if (pointsEarned < 1) pointsEarned = 1;
                
                score += pointsEarned;
                correctCount++;
                streak++;
                
                trackKnowledgePoint(currentQuestion.knowledge.考点, true);
                
                if (streak >= 3) {
                    showCelebration();
                }
            } else {
                element.classList.add('incorrect');
                options.forEach(opt => {
                    if (opt.dataset.option === currentQuestion.answer) {
                        opt.classList.add('correct');
                    }
                });
                feedback.className = 'feedback incorrect';
                feedbackTitle.className = 'feedback-title incorrect';
                feedbackTitle.innerHTML = '❌ 回答错误';
                
                streak = 0;
                wrongQuestions.push(currentQuestionIndex + 1);
                
                trackKnowledgePoint(currentQuestion.knowledge.考点, false);
            }
            
            nextBtn.disabled = false;
            updateStats();
        }
        
        function submitFillAnswer() {
            const input = document.getElementById(`fill-input-${currentQuestionIndex}`);
            const userAnswer = input.value.trim();
            const currentQuestion = quizData.questions[currentQuestionIndex];
            const nextBtn = document.getElementById(`next-btn-${currentQuestionIndex}`);
            const feedback = document.getElementById(`feedback-${currentQuestionIndex}`);
            const feedbackTitle = document.getElementById(`feedback-title-${currentQuestionIndex}`);
            
            if (!userAnswer) {
                alert('请先填写答案！');
                return;
            }
            
            input.disabled = true;
            
            if (userAnswer === currentQuestion.answer) {
                feedback.className = 'feedback correct';
                feedbackTitle.className = 'feedback-title correct';
                feedbackTitle.innerHTML = '✅ 回答正确！';
                
                let hintCount = parseInt(input.dataset.hints || '0');
                let pointsEarned = 10 - hintCount * 3;
                if (pointsEarned < 1) pointsEarned = 1;
                
                score += pointsEarned;
                correctCount++;
                streak++;
                
                trackKnowledgePoint(currentQuestion.knowledge.考点, true);
                
                if (streak >= 3) {
                    showCelebration();
                }
            } else {
                feedback.className = 'feedback incorrect';
                feedbackTitle.className = 'feedback-title incorrect';
                feedbackTitle.innerHTML = '❌ 回答错误';
                
                streak = 0;
                wrongQuestions.push(currentQuestionIndex + 1);
                
                trackKnowledgePoint(currentQuestion.knowledge.考点, false);
            }
            
            nextBtn.disabled = false;
            updateStats();
        }
        
        function submitMaterialAnswer(subCount) {
            const currentQuestion = quizData.questions[currentQuestionIndex];
            const feedback = document.getElementById(`feedback-${currentQuestionIndex}`);
            const feedbackTitle = document.getElementById(`feedback-title-${currentQuestionIndex}`);
            const nextBtn = document.getElementById(`next-btn-${currentQuestionIndex}`);
            
            let allCorrect = true;
            let correctSubCount = 0;
            
            for (let i = 0; i < subCount; i++) {
                const input = document.getElementById(`material-input-${currentQuestionIndex}-${i}`);
                const userAnswer = input.value.trim();
                const subQuestion = currentQuestion.subQuestions[i];
                
                input.disabled = true;
                
                if (userAnswer === subQuestion.answer) {
                    correctSubCount++;
                } else {
                    allCorrect = false;
                }
            }
            
            if (allCorrect) {
                feedback.className = 'feedback correct';
                feedbackTitle.className = 'feedback-title correct';
                feedbackTitle.innerHTML = '✅ 全部正确！';
                
                score += 10;
                correctCount++;
                streak++;
                
                trackKnowledgePoint(currentQuestion.knowledge.考点, true);
                
                if (streak >= 3) {
                    showCelebration();
                }
            } else {
                feedback.className = 'feedback incorrect';
                feedbackTitle.className = 'feedback-title incorrect';
                feedbackTitle.innerHTML = `⚠️ 答对${correctSubCount}/${subCount}小问`;
                
                streak = 0;
                wrongQuestions.push(currentQuestionIndex + 1);
                
                trackKnowledgePoint(currentQuestion.knowledge.考点, false);
            }
            
            nextBtn.disabled = false;
            updateStats();
        }
        
        function showHint(questionIndex) {
            const question = quizData.questions[questionIndex];
            const hintSection = document.getElementById(`hint-${questionIndex}`);
            const hintContent = document.getElementById(`hint-content-${questionIndex}`);
            const hintBtn = document.getElementById(`hint-btn-${questionIndex}`);
            const currentElement = document.querySelector(`#question-${questionIndex} .option.selected, #fill-input-${questionIndex}, #material-input-${questionIndex}-0`);
            
            if (!question.hints || question.hints.length === 0) {
                alert('本题没有提示哦~');
                return;
            }
            
            let currentHintIndex = parseInt(hintSection.dataset.currentHint || '0');
            
            if (currentHintIndex < question.hints.length) {
                hintSection.classList.add('show');
                hintContent.textContent = question.hints[currentHintIndex];
                hintSection.dataset.currentHint = currentHintIndex + 1;
                
                if (currentElement) {
                    currentElement.dataset.hints = currentHintIndex + 1;
                }
                
                if (currentHintIndex + 1 >= question.hints.length) {
                    hintBtn.disabled = true;
                    hintBtn.textContent = '提示已用完';
                }
            }
        }
        
        function nextQuestion() {
            const currentQuestionEl = document.getElementById(`question-${currentQuestionIndex}`);
            currentQuestionEl.classList.remove('active');
            
            currentQuestionIndex++;
            
            if (currentQuestionIndex < quizData.questions.length) {
                const nextQuestionEl = document.getElementById(`question-${currentQuestionIndex}`);
                nextQuestionEl.classList.add('active');
                updateProgress();
            } else {
                showResult();
            }
        }
        
        function updateProgress() {
            document.getElementById('currentQuestion').textContent = currentQuestionIndex + 1;
            const progress = ((currentQuestionIndex + 1) / quizData.questions.length) * 100;
            document.getElementById('progressFill').style.width = `${progress}%`;
        }
        
        function updateStats() {
            document.getElementById('scoreValue').textContent = score;
            document.getElementById('correctValue').textContent = correctCount;
            document.getElementById('streakValue').textContent = streak;
        }
        
        function trackKnowledgePoint(point, isCorrect) {
            if (!knowledgePoints[point]) {
                knowledgePoints[point] = { correct: 0, wrong: 0 };
            }
            if (isCorrect) {
                knowledgePoints[point].correct++;
            } else {
                knowledgePoints[point].wrong++;
            }
        }
        
        function showCelebration() {
            const celebration = document.getElementById('celebration');
            celebration.classList.add('show');
            
            const colors = ['#f093fb', '#f5576c', '#667eea', '#764ba2', '#4facfe', '#43e97b'];
            
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.style.cssText = `
                    position: absolute;
                    width: ${Math.random() * 10 + 5}px;
                    height: ${Math.random() * 10 + 5}px;
                    background: ${colors[Math.floor(Math.random() * colors.length)]};
                    left: ${Math.random() * 100}%;
                    top: -10px;
                    border-radius: ${Math.random() > 0.5 ? '50%' : '0'};
                    animation: fall ${Math.random() * 3 + 2}s linear forwards;
                    opacity: ${Math.random() * 0.5 + 0.5};
                `;
                celebration.appendChild(confetti);
            }
            
            setTimeout(() => {
                celebration.classList.remove('show');
                celebration.innerHTML = '';
            }, 3000);
        }
        
        function showResult() {
            document.getElementById('progressBar').style.display = 'none';
            document.getElementById('questionContainer').style.display = 'none';
            
            const resultScreen = document.getElementById('resultScreen');
            resultScreen.classList.add('show');
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalCorrect').textContent = `${correctCount}/${quizData.questions.length}`;
            
            const accuracy = Math.round((correctCount / quizData.questions.length) * 100);
            document.getElementById('finalAccuracy').textContent = `${accuracy}%`;
            
            const weaknessList = document.getElementById('weaknessList');
            weaknessList.innerHTML = '';
            
            const weakPoints = Object.entries(knowledgePoints)
                .filter(([_, stats]) => stats.wrong > 0)
                .sort((a, b) => b[1].wrong - a[1].wrong);
            
            if (weakPoints.length > 0) {
                document.getElementById('weaknessSection').style.display = 'block';
                weakPoints.forEach(([point, stats]) => {
                    const li = document.createElement('li');
                    li.textContent = `${point}（错误${stats.wrong}次）`;
                    weaknessList.appendChild(li);
                });
            } else {
                document.getElementById('weaknessSection').style.display = 'none';
            }
            
            if (correctCount === quizData.questions.length) {
                showCelebration();
            }
        }
        
        function restartQuiz() {
            currentQuestionIndex = 0;
            score = 0;
            correctCount = 0;
            streak = 0;
            wrongQuestions = [];
            knowledgePoints = {};
            
            document.getElementById('progressBar').style.display = 'flex';
            document.getElementById('questionContainer').style.display = 'block';
            document.getElementById('resultScreen').classList.remove('show');
            
            initQuiz();
        }
        
        document.addEventListener('keydown', (e) => {
            if (e.key >= 'A' && e.key <= 'D') {
                const currentQuestionEl = document.getElementById(`question-${currentQuestionIndex}`);
                const option = currentQuestionEl.querySelector(`.option[data-option="${e.key}"]`);
                if (option && !option.parentElement.querySelector('.correct, .incorrect')) {
                    selectOption(option, e.key);
                }
            }
            if (e.key === 'Enter') {
                const nextBtn = document.getElementById(`next-btn-${currentQuestionIndex}`);
                if (nextBtn && !nextBtn.disabled) {
                    nextQuestion();
                }
            }
        });
        
        initQuiz();
    </script>
    
    <style>
        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }
    </style>
</body>
